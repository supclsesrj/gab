  const navGrupo = (g, a) => {
    setGrupo(g); if(a) setAba(a);
    localStorage.setItem("doccheck_grupo", g);
    if(a) localStorage.setItem("doccheck_aba", a);
  };
  const toggleTheme = () => {
    const nd = !dark; setDark(nd);
    localStorage.setItem("doccheck_theme", nd ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", nd ? "dark" : "light");
  };
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  }, []);

  const grupos = [
    { id:"home",      label:"🏠 Início",   abas:[] },
    { id:"licitacao", label:"⚖️ Licitação", abas:[
      { id:"checklist",   label:"✓ Checklist" },
      { id:"comparador",  label:"🔀 Comparador TR" },
      { id:"impugnacao",  label:"⚖️ Impugnações/Recursos" },
    ]},
    { id:"contratos", label:"📑 Contratos", abas:[
      { id:"vencimentos", label:"📅 Vencimentos" },
      { id:"reajuste",    label:"📈 Reajuste" },
      { id:"repactuacao", label:"🔄 Repactuação" },
      { id:"checklist",   label:"✓ Checklist" },
    ]},
    { id:"pesquisa", label:"🔍 Pesquisa", abas:[
      { id:"pesquisa", label:"📊 Pesquisa ARP" },
      { id:"rapp",     label:"🔍 Background RAPP" },
      { id:"cnpj",     label:"🏢 Consulta CNPJ" },
    ]},
  ];

  const grupoAtivo = grupos.find(g => g.id === grupo) || grupos[0];

  return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", minHeight:"100vh", background:"var(--page-bg)", transition:"background .25s,color .25s" }}>

      {/* HEADER */}
      <header style={{ background:"var(--header-bg)", borderBottom:"1px solid var(--header-border)", position:"sticky", top:0, zIndex:200, boxShadow:"0 1px 12px var(--header-shadow)" }}>
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 20px", display:"flex", alignItems:"center", height:56, gap:8 }}>
          <button onClick={() => navGrupo("home")}
            style={{ display:"flex", alignItems:"center", gap:10, background:"none", border:"none", cursor:"pointer", padding:"4px 8px 4px 0", borderRadius:8, flexShrink:0 }}>
            <div style={{ width:32, height:32, borderRadius:9, background:"linear-gradient(135deg,#6366F1,#8B5CF6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color:"var(--card-bg)", fontWeight:900, boxShadow:"0 2px 8px rgba(99,102,241,.4)" }}>✓</div>
            <div style={{ lineHeight:1.2, textAlign:"left" }}>
              <div style={{ fontSize:14, fontWeight:900, color:"var(--text-primary)", letterSpacing:"-.02em" }}>DocCheck</div>
              <div style={{ fontSize:10, color:"var(--text-subtle)" }}>GAB · SUPCL/SESRJ</div>
            </div>
          </button>

          <div style={{ width:1, height:26, background:"var(--divider)", margin:"0 6px", flexShrink:0 }} />

          <nav style={{ display:"flex", gap:2, flex:1, overflowX:"auto", scrollbarWidth:"none" }}>
            {grupos.map(g => (
              <button key={g.id} onClick={() => navGrupo(g.id, g.abas[0]?.id)}
                style={{ padding:"6px 14px", borderRadius:8, border:"none", cursor:"pointer", whiteSpace:"nowrap", flexShrink:0, fontSize:13, fontWeight: grupo===g.id ? 700 : 500, transition:"all .15s",
                  background: grupo===g.id ? "var(--accent)" : "transparent",
                  color: grupo===g.id ? "var(--card-bg)" : "var(--header-muted)",
                }}>
                {g.label}
              </button>
            ))}
          </nav>

          <button onClick={toggleTheme}
            style={{ flexShrink:0, width:36, height:36, borderRadius:9, border:"1px solid var(--card-border)", background:"var(--surface-2)", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .15s" }}>
            {dark ? "☀️" : "🌙"}
          </button>
        </div>

        {/* Sub-nav */}
        {grupo !== "home" && grupoAtivo.abas.length > 0 && (
          <div style={{ background:"var(--subheader-bg)", borderTop:"1px solid var(--header-border)" }}>
            <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 20px", display:"flex", overflowX:"auto", scrollbarWidth:"none" }}>
              {grupoAtivo.abas.map((a,i) => (
                <button key={i} onClick={() => { setAba(a.id); localStorage.setItem("doccheck_aba", a.id); }}
                  style={{ padding:"9px 16px", border:"none", borderBottom: aba===a.id ? "2px solid var(--accent)" : "2px solid transparent", background:"transparent",
                    color: aba===a.id ? "var(--accent)" : "var(--text-muted)", fontSize:13, fontWeight: aba===a.id ? 700 : 400, cursor:"pointer", transition:"all .15s", whiteSpace:"nowrap",
                  }}>
                  {a.label}
                </button>
              ))}
            </div>
          </div>
        )}
      </header>

      <main>
        {grupo === "home" && <HomePage onNavigate={navGrupo} />}
        {grupo === "licitacao" && (
          <>
            <div style={{ display: aba==="checklist"   ? "block":"none" }}><App /></div>
            <div style={{ display: aba==="comparador"  ? "block":"none" }}><ComparadorTR /></div>
            <div style={{ display: aba==="impugnacao"  ? "block":"none" }}><ImpugnacaoModule /></div>
          </>
        )}
        {grupo === "contratos" && (
          <>
            <div style={{ display: aba==="vencimentos"  ? "block":"none" }}><VencimentosModule /></div>
            <div style={{ display: aba==="reajuste"     ? "block":"none" }}><ReajusteModule /></div>
            <div style={{ display: aba==="repactuacao"  ? "block":"none" }}><RepactuacaoModule /></div>
            <div style={{ display: aba==="checklist"    ? "block":"none" }}><App /></div>
          </>
        )}
        {grupo === "pesquisa" && (
          <>
            <div style={{ display: aba==="pesquisa" ? "block":"none" }}><PesquisaSemestral /></div>
            <div style={{ display: aba==="rapp"     ? "block":"none" }}><RappCheck /></div>
            <div style={{ display: aba==="cnpj"     ? "block":"none" }}><BackgroundCheck /></div>
          </>
        )}
      </main>
    </div>
  );
}

document.addEventListener("doccheck:auth", () => {
  const _root = ReactDOM.createRoot(document.getElementById("root"));
  _root.render(<Shell />);
});
