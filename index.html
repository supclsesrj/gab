  const lerPdf = (file) => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });

  const handleContrato = async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setPdfContrato(file); setB64Contrato(await lerPdf(file));
    setError(""); setContratoInfo(null); setEtapa(1);
  };

  const handleCct = async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setPdfCct(file); setB64Cct(await lerPdf(file));
  };



  const set = (k, v) => setCampos(prev => ({ ...prev, [k]: v }));

  const analisarDocs = async () => {
    if (!b64Contrato) { setError("Carregue o contrato inicial."); return; }
    if (!apiKeySet) { setError("Configure a chave da API Gemini."); return; }
    setLoading(true); setError("");
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

      // Analisa contrato
      const promptContrato = `Analise este contrato e retorne APENAS JSON puro sem markdown:
{
  "lei_aplicavel": "8666" | "14133" | "indeterminado",
  "numero_contrato": "número",
  "objeto": "objeto em até 10 palavras",
  "contratada": "nome da empresa",
  "data_assinatura": "DD/MM/AAAA ou null",
  "data_abertura_pregao": "DD/MM/AAAA ou null",
  "data_rapp": "DD/MM/AAAA ou null",
  "tem_clausula_repactuacao": true | false,
  "clausula_repactuacao": "texto resumido da cláusula ou null",
  "categoria_profissional": "categoria identificada (ex: vigilantes, limpeza, recepcionistas) ou null",
  "tem_planilha_custos": true | false,
  "justificativa_lei": "por que identificou essa lei",
  "observacoes": "alertas relevantes ou null"
}`;

      const r1 = await fetch(url, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ contents:[{ parts:[
          { inline_data:{ mime_type:"application/pdf", data:b64Contrato } },
          { text: promptContrato }
        ]}], generationConfig:{ temperature:0.1, maxOutputTokens:2048 } })
      });
      const d1 = await r1.json();
      const c1 = JSON.parse((d1.candidates?.[0]?.content?.parts?.[0]?.text || "{}").replace(/```json|```/g,"").trim());
      setContratoInfo(c1);

      // Analisa CCT se fornecida
      let cctParsed = null;
      if (b64Cct) {
        const promptCct = `Analise este documento (CCT/ACT/Lei do Piso/Convenção Coletiva) e retorne APENAS JSON puro sem markdown:
{
  "tipo": "CCT" | "ACT" | "Lei do Piso" | "outro",
  "descricao": "identificação completa (ex: CCT 2024 — Vigilantes RJ)",
  "data_publicacao": "DD/MM/AAAA ou null",
  "data_vigencia_inicio": "DD/MM/AAAA ou null",
  "data_base_categoria": "DD/MM/AAAA ou null",
  "categoria": "categoria profissional",
  "sindicato": "sindicato ou entidade",
  "percentual_reajuste": "percentual se informado ou null",
  "observacoes": "alertas relevantes ou null"
}`;
        const r2 = await fetch(url, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ contents:[{ parts:[
            { inline_data:{ mime_type:"application/pdf", data:b64Cct } },
            { text: promptCct }
          ]}], generationConfig:{ temperature:0.1, maxOutputTokens:1024 } })
        });
        const d2 = await r2.json();
        cctParsed = JSON.parse((d2.candidates?.[0]?.content?.parts?.[0]?.text || "{}").replace(/```json|```/g,"").trim());
        setCctInfo(cctParsed);
        setCampos(prev => ({
          ...prev,
          descricaoNovaCct: cctParsed.descricao || "",
          dataNovaCct: cctParsed.data_publicacao || cctParsed.data_vigencia_inicio || "",
          categoriaProfissional: cctParsed.categoria || "",
        }));
      }

      // Pré-preenche campos do contrato
      setCampos(prev => ({
        ...prev,
        dataReferencia: c1.lei_aplicavel === "8666" ? (c1.data_abertura_pregao || "") : (c1.data_rapp || ""),
        categoriaProfissional: c1.categoria_profissional || prev.categoriaProfissional,
      }));
      setEtapa(2);
    } catch(e) { setError("Erro: " + e.message); }
    finally { setLoading(false); }
  };

  const calcular = () => {
    setError("");
    const parseDate = (s) => {
      if (!s) return null;
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d,m,y]=s.split("/"); return new Date(`${y}-${m}-${d}`); }
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s);
      return null;
    };
    const fmtDate = (d) => d ? d.toLocaleDateString("pt-BR") : "—";
    const addDays = (d, n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
    const hoje = new Date(); hoje.setHours(0,0,0,0);

    const dataRef = parseDate(campos.dataReferencia);
    const dataNovaCct = parseDate(campos.dataNovaCct);
    const dataPedido = campos.dataPedido ? parseDate(campos.dataPedido) : hoje;

    if (!dataRef) { setError(`Informe a data de referência (${contratoInfo?.lei_aplicavel === "8666" ? "abertura do pregão" : "RAPP"}).`); return; }
    if (!dataNovaCct) { setError("Informe a data da nova CCT/ACT/Lei do Piso."); return; }

    // Direitos: um por cada nova CCT posterior à data de referência
    // Simplificado: calcula 1 direito por nova CCT informada
    // O pedido pode gerar múltiplos direitos acumulados (anos anteriores)

    const prazoRetro = addDays(dataNovaCct, 60);
    const temRetro = dataPedido <= prazoRetro;
    const adquirido = dataNovaCct <= hoje;

    const efeitosFinanceiros = temRetro
      ? `A partir de ${fmtDate(dataNovaCct)} (retroativo à publicação da ${campos.descricaoNovaCct || "nova CCT/ACT"})`
      : `A partir de ${fmtDate(dataPedido)} (sem retroatividade — prazo de 60 dias expirado em ${fmtDate(prazoRetro)})`;

    const lei = contratoInfo?.lei_aplicavel;
    const alertas = [
      !contratoInfo?.tem_clausula_repactuacao && "⚠️ Contrato não possui cláusula expressa de repactuação — verificar previsão editalícia.",
      !contratoInfo?.tem_planilha_custos && "⚠️ Planilha de custos e formação de preços não identificada — é documento essencial para a repactuação.",
      contratoInfo?.observacoes,
      cctInfo?.observacoes,
      lei === "indeterminado" && "⚠️ Lei aplicável não identificada com certeza — confirme manualmente.",
    ].filter(Boolean);

    setResultado({
      tipo: "repactuacao",
      lei,
      contrato: contratoInfo,
      cct: cctInfo,
      dataReferencia: fmtDate(dataRef),
      tipoReferencia: lei === "8666" ? "abertura do pregão" : "elaboração do RAPP",
      descricaoCctAnterior: campos.descricaoCct,
      descricaoNovaCct: campos.descricaoNovaCct || cctInfo?.descricao || "Nova CCT/ACT/Lei do Piso",
      dataNovaCct: fmtDate(dataNovaCct),
      prazoRetroatividade: fmtDate(prazoRetro),
      temRetroatividade: temRetro,
      dataPedido: fmtDate(dataPedido),
      adquirido,
      efeitosFinanceiros,
      categoriaProfissional: campos.categoriaProfissional,
      alertas,
    });
    setEtapa(3);
  };

  const Input = ({ label, k, placeholder, hint, full }) => (
    <div style={{ marginBottom:14, gridColumn: full ? "1 / -1" : undefined }}>
      <label className="label-text" style={{ display:"block", marginBottom:5 }}>{label}</label>
      <input value={campos[k]} onChange={e => set(k, e.target.value)}
        placeholder={placeholder || "DD/MM/AAAA"} className="input-field" />
      {hint && <p style={{ fontSize:11, color:"var(--text-muted)", marginTop:4 }}>{hint}</p>}
    </div>
  );

  return (
    <div className="module-container">
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontSize:18, fontWeight:800, color:"var(--text-primary)", margin:0 }}>🔄 Repactuação Contratual</h2>
        <p style={{ fontSize:13, color:"var(--text-muted)", marginTop:4 }}>Cálculo de direito a repactuação por CCT/ACT/Lei do Piso — Lei 8.666/93 e Lei 14.133/2021</p>
      </div>

      {/* Stepper */}
      <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:28 }}>
        {["Documentos","Dados","Resultado"].map((s,i) => {
          const num=i+1, ativo=etapa===num, feito=etapa>num;
          return (
            <React.Fragment key={s}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800,
                  background: feito?"var(--success-text)":ativo?"var(--accent)":"var(--surface-2)",
                  color: feito||ativo?"#fff":"var(--text-muted)" }}>
                  {feito?"✓":num}
                </div>
                <span style={{ fontSize:12, fontWeight:ativo?700:500, color:ativo?"var(--text-primary)":"var(--text-muted)" }}>{s}</span>
              </div>
              {i<2 && <div style={{ flex:1, height:2, background:feito?"var(--success-text)":"var(--card-border)", margin:"0 10px" }} />}
            </React.Fragment>
          );
        })}
      </div>

      {!apiKeySet && (
        <div className="card" style={{ marginBottom:20 }}>
          <p className="card-title">Chave de API — Google Gemini</p>
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
              placeholder="AIzaSy…" onKeyDown={e => e.key==="Enter" && confirmarChave()} className="input-field" style={{ flex:1 }} />
            <button onClick={confirmarChave} className="btn-primary">Confirmar</button>
          </div>
        </div>
      )}

      {error && <div className="error-box" style={{ marginBottom:16 }}><p style={{ margin:0 }}>⚠ {error}</p></div>}

      {/* ETAPA 1 */}
      {etapa >= 1 && (
        <div className="card" style={{ marginBottom:20, opacity: etapa>1?.6:1 }}>
          <p className="card-title">Etapa 1 — Documentos</p>
          <p className="card-subtitle" style={{ marginBottom:16 }}>
            Carregue o contrato inicial (obrigatório) e a nova CCT/ACT/Lei do Piso (opcional — pode informar manualmente).
          </p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
            {[
              { label:"📄 Contrato inicial (obrigatório)", ref:refContrato, file:pdfContrato, handler:handleContrato, mult:false },
              { label:"📋 Nova CCT/ACT/Lei do Piso (opcional)", ref:refCct, file:pdfCct, handler:handleCct, mult:false },
            ].map(({ label, ref, file, handler }) => (
              <div key={label}>
                <p className="label-text" style={{ marginBottom:6 }}>{label}</p>
                <div onClick={() => ref.current.click()}
                  onDrop={e => { e.preventDefault(); handler(e.dataTransfer.files[0]); }}
                  onDragOver={e => e.preventDefault()} className="dropzone">
                  <input ref={ref} type="file" accept=".pdf" style={{ display:"none" }} onChange={e => handler(e.target.files[0])} />
                  {file ? (
                    <><div style={{ fontSize:18 }}>📄</div>
                    <p style={{ fontSize:12, fontWeight:600, color:"var(--accent)", margin:"4px 0 2px" }}>{file.name}</p>
                    <p className="text-muted" style={{ fontSize:10 }}>Clique para trocar</p></>
                  ) : (
                    <><div style={{ fontSize:18 }}>📂</div>
                    <p style={{ fontSize:11, color:"var(--text-muted)", margin:"4px 0 0" }}>Arraste ou <strong style={{ color:"var(--accent)" }}>clique</strong></p></>
                  )}
                </div>
              </div>
            ))}
          </div>

          <div className="info-box" style={{ marginBottom:14 }}>
            <p style={{ fontSize:12, color:"var(--info-text)", margin:0 }}>
              💡 O sistema identificará automaticamente a lei aplicável, data de referência e cláusula de repactuação. A análise da CCT extrai data de publicação e vigência para os cálculos.
            </p>
          </div>

          {etapa === 1 && <button onClick={analisarDocs} disabled={loading || !b64Contrato || !apiKeySet}
            className="btn-primary" style={{ width:"100%" }}>
            {loading ? "Analisando documentos…" : "Analisar documentos →"}
          </button>}

          {contratoInfo && etapa > 1 && (
            <div style={{ marginTop:12, padding:"10px 14px", background:"var(--surface-2)", borderRadius:8, fontSize:12, color:"var(--text-secondary)" }}>
              ✓ <strong>{contratoInfo.numero_contrato}</strong> · Lei <strong>{contratoInfo.lei_aplicavel}</strong> · {contratoInfo.contratada}
              <button onClick={() => setEtapa(1)} className="btn-link" style={{ marginLeft:12 }}>Trocar</button>
            </div>
          )}
        </div>
      )}

      {/* ETAPA 2 */}
      {etapa >= 2 && contratoInfo && (
        <div className="card" style={{ marginBottom:20 }}>
          <p className="card-title" style={{ marginBottom:4 }}>Etapa 2 — Dados para cálculo</p>

          <div style={{ margin:"12px 0 16px", padding:"10px 14px", borderRadius:8, background:"var(--info-bg)", border:"1px solid var(--info-border)" }}>
            <p style={{ fontSize:12, fontWeight:700, color:"var(--info-text)", margin:"0 0 4px" }}>
              {contratoInfo.lei_aplicavel === "14133"
                ? "⚖️ Lei 14.133/2021 — Marco temporal: data do RAPP (orçamento estimativo)"
                : contratoInfo.lei_aplicavel === "8666"
                  ? "⚖️ Lei 8.666/93 — Marco temporal: data de abertura do pregão/edital"
                  : "⚠️ Lei não identificada — preencha a data de referência correta"}
            </p>
            <p style={{ fontSize:11, color:"var(--text-muted)", margin:0 }}>
              A CCT/ACT/Lei do Piso vigente nessa data-marco determina o piso de referência. A nova CCT publicada posteriormente gera o direito à repactuação.
            </p>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 20px" }}>
            <Input k="dataReferencia"
              label={`📅 Data de referência (${contratoInfo.lei_aplicavel === "8666" ? "abertura do pregão" : "RAPP"})`}
              hint={contratoInfo.lei_aplicavel === "8666" ? "Data de abertura do certame licitatório" : "Data de elaboração do orçamento estimativo"} />
            <Input k="categoriaProfissional" label="👷 Categoria profissional"
              placeholder="Ex: vigilantes, limpeza, TI" hint="Para identificar a CCT/ACT aplicável" />
            <Input k="descricaoCct" label="📋 CCT/ACT/Lei do Piso vigente à época"
              placeholder="Ex: CCT 2023 — Vigilantes RJ" hint="Identificação do ato normativo vigente na data de referência" />
            <Input k="dataCctVigente" label="📅 Data da CCT/ACT vigente à época"
              hint="Data de publicação ou início de vigência do ato normativo anterior" />
            <Input k="descricaoNovaCct" label="📋 Nova CCT/ACT/Lei do Piso"
              placeholder="Ex: CCT 2024 — Vigilantes RJ" hint="Identificação do novo ato normativo que gera o direito" />
            <Input k="dataNovaCct" label="📅 Data de publicação da nova CCT/ACT"
              hint="A partir desta data conta o prazo de 60 dias para retroatividade" />
            <Input k="dataPedido" label="📋 Data do pedido da empresa"
              placeholder="DD/MM/AAAA (vazio = hoje)" hint="Deixe em branco para usar a data de hoje" />
          </div>

          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={() => setEtapa(1)} className="btn-secondary">← Voltar</button>
            <button onClick={calcular} className="btn-primary" style={{ flex:1 }}>Calcular direitos →</button>
          </div>
        </div>
      )}

      {/* ETAPA 3 */}
      {etapa === 3 && resultado && <ResultadoRepactuacao resultado={resultado} onVoltar={() => setEtapa(2)} />}
    </div>
  );
}

function ResultadoRepactuacao({ resultado, onVoltar }) {
  const [copiado, setCopiado] = React.useState(false);
  const { lei, contrato, descricaoNovaCct, dataNovaCct, prazoRetroatividade, temRetroatividade, dataPedido, efeitosFinanceiros, alertas, dataReferencia, tipoReferencia, descricaoCctAnterior, categoriaProfissional } = resultado;
  const leiLabel = lei === "14133" ? "Lei 14.133/2021" : lei === "8666" ? "Lei 8.666/1993" : "Lei a confirmar";
  const hoje = new Date().toLocaleDateString("pt-BR");

  const gerarAnalise = () => {
    let t = `ANÁLISE DE DIREITO À REPACTUAÇÃO CONTRATUAL\nGerado em: ${hoje}\n${"─".repeat(50)}\n\n`;
    t += `CONTRATO: ${contrato?.numero_contrato || "—"}\nCONTRATADA: ${contrato?.contratada || "—"}\nOBJETO: ${contrato?.objeto || "—"}\n`;
    t += `CATEGORIA: ${categoriaProfissional || "—"}\nLEI APLICÁVEL: ${leiLabel}\n`;
    t += `DATA DE REFERÊNCIA (${tipoReferencia}): ${dataReferencia}\n\n${"─".repeat(50)}\n`;
    t += `INSTRUMENTO NORMATIVO ANTERIOR: ${descricaoCctAnterior || "—"}\n`;
    t += `NOVO INSTRUMENTO NORMATIVO: ${descricaoNovaCct}\nPUBLICAÇÃO: ${dataNovaCct}\n`;
    t += `PRAZO PARA RETROATIVIDADE (60d): ${prazoRetroatividade}\n`;
    t += `DATA DO PEDIDO: ${dataPedido}\n`;
    t += `RETROATIVIDADE: ${temRetroatividade ? "SIM ✓" : "NÃO ✗ — prazo expirado"}\n`;
    t += `EFEITOS FINANCEIROS: ${efeitosFinanceiros}\n`;
    if (alertas?.length) { t += `\n${"─".repeat(50)}\nALERTAS:\n${alertas.join("\n")}\n`; }
    return t;
  };

  const gerarDespacho = () =>
    `DESPACHO\n\nTrata-se de pedido de repactuação contratual apresentado pela empresa ${contrato?.contratada || "___"}, referente ao Contrato nº ${contrato?.numero_contrato || "___"}, cujo objeto é ${contrato?.objeto || "___"}${categoriaProfissional ? `, com emprego de mão de obra da categoria de ${categoriaProfissional}` : ""}.\n\nO contrato foi celebrado com fundamento na ${leiLabel}. O marco temporal para fins de repactuação é a data de ${tipoReferencia}, fixada em ${dataReferencia}, quando vigorava o instrumento normativo ${descricaoCctAnterior || "anterior"}.\n\nA nova ${descricaoNovaCct || "CCT/ACT/Lei do Piso"} foi publicada em ${dataNovaCct}, passando a empresa a ter direito à repactuação a partir desta data, nos termos do ${lei === "8666" ? "art. 55, inciso III, c/c art. 65, inciso II, alínea 'd', da Lei nº 8.666/1993" : "art. 92, § 5º, da Lei nº 14.133/2021"}.\n\n${temRetroatividade ? `O pedido foi apresentado em ${dataPedido}, dentro do prazo de 60 (sessenta) dias contados da publicação do novo instrumento normativo (prazo final: ${prazoRetroatividade}), razão pela qual os efeitos financeiros retroagem à data de publicação da ${descricaoNovaCct || "nova CCT/ACT"}.` : `O pedido foi apresentado em ${dataPedido}, após o transcurso do prazo de 60 (sessenta) dias contados da publicação do novo instrumento normativo (prazo final: ${prazoRetroatividade}), razão pela qual os efeitos financeiros somente serão computados a partir da data do pedido, não havendo direito à retroatividade.`}\n\n${alertas?.length ? `OBSERVAÇÕES:\n${alertas.join("\n")}\n\n` : ""}Encaminhe-se para as providências cabíveis.\n\nRio de Janeiro, ${hoje}.`;

  const copiar = (t) => navigator.clipboard.writeText(t).then(() => { setCopiado(true); setTimeout(() => setCopiado(false), 2500); });
  const corRetro = temRetroatividade ? "var(--success-text)" : "var(--warning-text)";
  const bgRetro  = temRetroatividade ? "var(--success-bg)"  : "var(--warning-bg)";
  const bdRetro  = temRetroatividade ? "var(--success-border)" : "var(--warning-border)";

  return (
    <div>
      <div style={{ background:bgRetro, border:`1px solid ${bdRetro}`, borderRadius:12, padding:20, marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <p style={{ fontSize:15, fontWeight:800, color:corRetro, margin:"0 0 4px" }}>
              {temRetroatividade ? "✓ Direito à repactuação com retroatividade" : "⚠️ Direito à repactuação sem retroatividade"}
            </p>
            <p style={{ fontSize:12, color:"var(--text-muted)", margin:0 }}>{contrato?.numero_contrato} · {leiLabel} · {categoriaProfissional}</p>
          </div>
          <button onClick={onVoltar} className="btn-secondary" style={{ fontSize:12 }}>← Editar</button>
        </div>
      </div>

      {alertas?.length > 0 && (
        <div className="error-box" style={{ marginBottom:16 }}>
          {alertas.map((a,i) => <p key={i} style={{ margin:i>0?"6px 0 0":0, fontSize:12 }}>{a}</p>)}
        </div>
      )}

      {/* Cards de datas */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
        {[
          { l:`Data de referência\n(${tipoReferencia})`, v:dataReferencia, icon:"📅" },
          { l:"Publicação nova CCT/ACT", v:dataNovaCct, icon:"📋" },
          { l:"Prazo retroatividade (60d)", v:prazoRetroatividade, icon:"⏰" },
          { l:"Data do pedido", v:dataPedido, icon:"📨" },
          { l:"Retroatividade", v:temRetroatividade?"✓ Sim":"✗ Não", icon:"↩️" },
          { l:"Efeitos a partir de", v:efeitosFinanceiros.split("(")[0].replace("A partir de","").trim(), icon:"💰" },
        ].map(({ l, v, icon }) => (
          <div key={l} style={{ background:"var(--card-bg)", border:"1px solid var(--card-border)", borderRadius:10, padding:"12px 14px", boxShadow:"var(--card-shadow)" }}>
            <p style={{ fontSize:10, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 4px" }}>{icon} {l}</p>
            <p style={{ fontSize:13, fontWeight:700, color:"var(--text-primary)", margin:0 }}>{v}</p>
          </div>
        ))}
      </div>

      <div style={{ background:"var(--card-bg)", border:`1px solid ${bdRetro}`, borderRadius:10, padding:"12px 16px", marginBottom:16 }}>
        <p style={{ fontSize:11, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 4px" }}>Efeitos financeiros</p>
        <p style={{ fontSize:13, fontWeight:600, color:corRetro, margin:0 }}>{efeitosFinanceiros}</p>
      </div>

      {/* Textos */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        {[{ label:"📋 Análise técnica", texto:gerarAnalise() },{ label:"📝 Minuta de despacho", texto:gerarDespacho() }].map(({ label, texto }) => (
          <div key={label} className="card">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>

function ApiKeyPanel() {
  const [key, setKey] = React.useState(() => {
    try { const v = localStorage.getItem("doccheck_gemini_key"); return v ? decodeURIComponent(escape(atob(v))) : ""; } catch(e) { return ""; }
  });
  const [saved, setSaved] = React.useState(() => {
    try { const v = localStorage.getItem("doccheck_gemini_key"); return !!(v && atob(v).length > 10); } catch(e) { return false; }
  });
  const [editing, setEditing] = React.useState(false);
  const [testing, setTesting] = React.useState(false);
  const [testResult, setTestResult] = React.useState(null);

  const salvar = () => {
    if (key.length > 10) {
      saveGeminiKey(key);
      setSaved(true); setEditing(false); setTestResult(null);
    }
  };

  const testar = async () => {
    if (!key || key.length < 10) return;
    setTesting(true); setTestResult(null);
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
      const r = await fetch(url, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ contents:[{parts:[{text:"responda apenas: ok"}]}], generationConfig:{maxOutputTokens:5} })
      });
      if (r.ok) {
        setTestResult({ ok:true, msg:"Conexão bem-sucedida ✓" });
        saveGeminiKey(key); setSaved(true); setEditing(false);
      } else {
        const e = await r.json();
        setTestResult({ ok:false, msg: e.error?.message || `Erro ${r.status}` });
      }
    } catch(e) {
      setTestResult({ ok:false, msg:"Falha de rede: " + e.message });
    } finally { setTesting(false); }
  };

  const remover = () => { clearGeminiKey(); setSaved(false); setKey(""); setEditing(false); setTestResult(null); };

  if (saved && !editing) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 18px", background:"var(--success-bg)", border:"1px solid var(--success-border)", borderRadius:12 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ width:32, height:32, borderRadius:8, background:"var(--success-text)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, color:"#fff" }}>✓</div>
        <div>
          <p style={{ fontSize:13, fontWeight:700, color:"var(--success-text)", margin:0 }}>API Gemini configurada</p>
          <p style={{ fontSize:11, color:"var(--text-muted)", margin:0 }}>Chave salva no navegador · Todos os módulos de IA estão ativos</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={() => setEditing(true)} className="btn-secondary" style={{ fontSize:12 }}>Alterar</button>
        <button onClick={remover} className="btn-link" style={{ fontSize:12, color:"var(--danger-text)" }}>Remover</button>
      </div>
    </div>
  );

  return (
    <div style={{ padding:"20px", background:"var(--card-bg)", border:"1px solid var(--card-border)", borderRadius:12, boxShadow:"var(--card-shadow)" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <div style={{ width:32, height:32, borderRadius:8, background:"var(--accent-light)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🔑</div>
        <div>
          <p style={{ fontSize:13, fontWeight:700, color:"var(--text-primary)", margin:0 }}>API Gemini (Google AI Studio)</p>
          <p style={{ fontSize:11, color:"var(--text-muted)", margin:0 }}>Necessária para os módulos de IA. Gratuita em aistudio.google.com</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <input type="password" value={key} onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key === "Enter" && testar()}
          placeholder="AIzaSy..." className="input-field" style={{ flex:1, fontFamily:"monospace" }} />
        <button onClick={testar} disabled={testing || key.length < 10} className="btn-primary" style={{ whiteSpace:"nowrap" }}>
          {testing ? "Testando…" : "Testar e salvar"}
        </button>
        {editing && <button onClick={() => setEditing(false)} className="btn-secondary">Cancelar</button>}
      </div>
      {testResult && (
        <p style={{ fontSize:12, marginTop:8, color: testResult.ok ? "var(--success-text)" : "var(--danger-text)" }}>
          {testResult.ok ? "✓" : "✗"} {testResult.msg}
        </p>
      )}
    </div>
  );
}
