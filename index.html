  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }
    async function checkPassword() {
      const input = document.getElementById("pwd-input").value;
      if ((await sha256(input)) === (await sha256("Jope1234"))) {
        // Armazena a senha CRUA na sessão — será enviada ao backend para autenticação real
        sessionStorage.setItem("doccheck_auth", "1");
        sessionStorage.setItem("doccheck_pwd", input);
        showApp();
      } else {
        const err = document.getElementById("login-error");
        err.textContent = "Senha incorreta. Tente novamente.";
        document.getElementById("pwd-input").value = "";
        document.getElementById("pwd-input").focus();
        setTimeout(() => err.textContent = "", 3000);
      }
    }
    function showApp() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("root").style.display = "block";
      document.dispatchEvent(new Event("doccheck:auth"));
    }
    // Aguarda todos os scripts Babel compilarem antes de montar
    if (sessionStorage.getItem("doccheck_auth") === "1") {
      window.addEventListener("load", () => {
        // Pequeno delay para garantir que o Babel finalizou todos os blocos
        setTimeout(showApp, 200);
      });
    }
  </script>

// ─────────────────────────────────────────────
// GLOBALS — PROXY URL + AUTH SESSION

// ⚠️  SUBSTITUA pela URL do seu Web App do Google Apps Script após publicar
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoK9niyfYw9Zn5IlMpC1zj17vlEixJ-fYp0hptT4Kk5gM_c8q2HHr95Rvd5r4qfiopuw/exec";

// Recupera a senha da sessão (inserida no login) para enviar ao backend
function getSessionPassword() {
  try { return sessionStorage.getItem("doccheck_pwd") || ""; } catch(e) { return ""; }
}

// Função de chamada ao proxy backend — substitui todas as chamadas diretas ao Gemini
async function callGemini(geminiPayload) {
  const auth_pass = getSessionPassword();
  if (!auth_pass) throw new Error("Sessão expirada. Recarregue a página e faça login novamente.");

  const resp = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    // Content-Type text/plain evita preflight CORS rigoroso no Apps Script
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ auth_pass, gemini_payload: geminiPayload }),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(\`Erro no proxy (\${resp.status}): \${errText}\`);
  }

  const data = await resp.json();
  if (data.error) throw new Error(data.message || "Erro retornado pelo proxy.");
  return data;
}

function formatCNPJ(v) {
  v = v.replace(/\D/g, "").slice(0, 14);

  return v;
}

// Gera e baixa xlsx sem biblioteca externa (formato SYLK/CSV que Excel abre nativamente)
function downloadCSV(empresas) {
  const rows = [["Empresa","CNPJ","Situação","Sócio","Qualificação","Aparece em outras empresas"]];
  const socios_count = {};
  empresas.forEach(emp => {
    (emp.qsa || []).forEach(s => {
      socios_count[s.nome] = (socios_count[s.nome] || 0) + 1;
    });
  });
  empresas.forEach(emp => {
    if (!emp.qsa || emp.qsa.length === 0) {
      rows.push([emp.nome || emp.cnpj, emp.cnpj, emp.situacao || "—", "Sem sócios", "", ""]);
    } else {
      emp.qsa.forEach(s => {
        rows.push([
          emp.nome || emp.cnpj,
          emp.cnpj,
          emp.situacao || "—",
          s.nome,
          s.qual,
          socios_count[s.nome] > 1 ? "SIM ⚠" : "Não"
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "background_check_rapp.csv"; a.click();
  URL.revokeObjectURL(url);
}

      return {
        cnpj: d.cnpj || cnpj,
        nome: d.nome || nome,
        situacao: d.situacao,
        abertura: d.abertura,
        porte: d.porte,
        qsa: d.qsa || [],
      };
    } catch(e) {
      return { cnpj, nome, situacao:"Erro", qsa:[], erro: e.message };
    }
  };

  const analisar = async () => {
    if (!pdfBase64) { setError("Carregue o PDF do RAPP primeiro."); return; }
    setLoading(true); setError(""); setEmpresas([]); setConluios([]);
    setProgresso({ total:0, atual:0, label:"Extraindo empresas do RAPP com IA…" });

    try {
      // ETAPA 1 — Gemini extrai CNPJs e nomes do PDF
      const prompt = `Analise este documento PDF (RAPP — Relatório de Análise de Preços e Proposta ou similar) e extraia TODAS as empresas mencionadas como participantes, licitantes ou proponentes.

Para cada empresa, retorne um objeto com:
- "cnpj": CNPJ no formato XX.XXX.XXX/XXXX-XX (ou null se não encontrado)
- "nome": razão social ou nome da empresa

Responda APENAS com um array JSON puro, sem markdown, sem texto antes ou depois.
Exemplo: [{"cnpj":"12.345.678/0001-90","nome":"Empresa ABC Ltda"},...]

Se não encontrar nenhuma empresa, retorne [].`;

            const resp = await callGemini({
          contents:[{ parts:[
            { inline_data:{ mime_type:"application/pdf", data:pdfBase64 } },
            { text:prompt }
          ]}],
          generationConfig:{ temperature:0.1, maxOutputTokens:4096 }
        });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `Gemini erro ${r.status}`); }
      const gdata = await r.json();
      const raw = gdata.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      const clean = raw.replace(/```json|```/g,"").trim();
      let lista = JSON.parse(clean);
      if (!Array.isArray(lista) || lista.length === 0) throw new Error("Nenhuma empresa encontrada no PDF. Verifique se é um RAPP válido.");

      // Deduplica por CNPJ
      const vistos = new Set();
      lista = lista.filter(e => {
        const key = e.cnpj ? e.cnpj.replace(/\D/g,"") : e.nome;
        if (vistos.has(key)) return false;
        vistos.add(key); return true;
      });

      setProgresso({ total: lista.length, atual:0, label:"Consultando Receita Federal…" });

      // ETAPA 2 — Consulta Receita para cada empresa (com delay para respeitar rate limit)
      const resultados = [];
      for (let i = 0; i < lista.length; i++) {
        const emp = lista[i];
        setProgresso({ total: lista.length, atual: i, label:`Consultando: ${emp.nome || emp.cnpj}…` });
        if (emp.cnpj) {
          const dados = await consultarEmpresa(emp.cnpj, emp.nome);
          resultados.push(dados);
        } else {
          resultados.push({ cnpj:"—", nome: emp.nome, situacao:"CNPJ não identificado", qsa:[] });
        }
        if (i < lista.length - 1) await sleep(1200); // Rate limit ReceitaWS: ~1 req/seg
      }

      setProgresso({ total: lista.length, atual: lista.length, label:"Cruzando sócios…" });
      setEmpresas(resultados);

      // ETAPA 3 — Cruzamento de sócios
      const socioMap = {}; // nome_socio -> [empresas]
      resultados.forEach(emp => {
        (emp.qsa || []).forEach(s => {
          if (!socioMap[s.nome]) socioMap[s.nome] = [];
          socioMap[s.nome].push({ empresa: emp.nome, cnpj: emp.cnpj, qual: s.qual });
        });
      });

      const alertas = Object.entries(socioMap)
        .filter(([, emps]) => emps.length > 1)
        .map(([socio, emps]) => ({ socio, empresas: emps }))
        .sort((a,b) => b.empresas.length - a.empresas.length);

      setConluios(alertas);
      setProgresso({ total: lista.length, atual: lista.length, label:"Análise concluída!" });

    } catch(e) {
      setError("Erro: " + e.message);
      setProgresso({ total:0, atual:0, label:"" });
    } finally {
      setLoading(false);
    }
  };

  const temResultado = empresas.length > 0;

  return (

function parseData(val) {
  if (!val) return null;
  // Suporta DD/MM/YYYY, YYYY-MM-DD, timestamps Excel (número)
  if (typeof val === "number") {
    // Serial date do Excel
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  const s = String(val).trim();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [dd, mm, yyyy] = s.split("/");
    return new Date(`${yyyy}-${mm}-${dd}`);
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  return null;
}

function fmtData(d) {
  if (!d) return "—";
  return d.toLocaleDateString("pt-BR");
}

function fmtValor(v) {
  if (!v && v !== 0) return "—";
  const n = parseFloat(String(v).replace(/[^\d,.-]/g,"").replace(",","."));
  if (isNaN(n)) return String(v);
  return n.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}

function diasAteVencer(d) {
  if (!d) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.ceil((d - hoje) / 86400000);
  return diff;
}

function statusUrgencia(dias) {
  if (dias === null) return { cor:"gray", label:"Sem data" };
  if (dias < 0)   return { cor:"red",    label:"Vencido" };
  if (dias <= 30)  return { cor:"red",    label:`${dias}d — URGENTE` };
  if (dias <= 60)  return { cor:"orange", label:`${dias}d — Atenção` };
  return { cor:"green", label:`${dias}d` };
}

function mesesAlvo() {
  const hoje = new Date();
  return [0,1,2].map(i => {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
    return { ano: d.getFullYear(), mes: d.getMonth() };
  });
}

function nomeMes(mes, ano) {
  return new Date(ano, mes, 1).toLocaleDateString("pt-BR", { month:"long", year:"numeric" });
}

function parseArquivo(nome, conteudo, tipo) {
  // tipo: "json" ou "xlsx_csv" (csv gerado do xlsx via SheetJS)
  try {
    if (tipo === "json") {
      const data = JSON.parse(conteudo);
      return Array.isArray(data) ? data : [];
    }
    // CSV simples
    const linhas = conteudo.trim().split("\n");
    const headers = linhas[0].split(",").map(h => h.replace(/"/g,"").trim().toLowerCase());
    return linhas.slice(1).map(linha => {
      const vals = linha.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g,"").trim(); });
      return obj;
    }).filter(r => Object.values(r).some(v => v));
  } catch(e) { return []; }
}

function normalizarRegistro(r, tipo) {
  // Normaliza variações de nome de coluna
  const get = (...keys) => {
    for (const k of keys) {
      const found = Object.keys(r).find(rk => rk.toLowerCase().includes(k.toLowerCase()));
      if (found && r[found]) return r[found];
    }
    return "";
  };
  return {
    sei:        get("sei", "processo"),
    contrato:   get("contrato", "arp", "número"),
    empresa:    get("empresa", "fornecedor", "contratad"),
    objeto:     get("objeto", "serviço", "descri"),
    valor:      get("valor"),
    vencimento: parseData(get("vencimento", "vigência", "término", "fim")),
    tipo,
    // campos manuais (preenchidos na etapa 2)
    vigMax:     "",
    seiSubst:   "",
    andamento:  "",
    status:     "prorrogação",
  };
}

  msg += `_${mesNomeAtual.charAt(0).toUpperCase() + mesNomeAtual.slice(1)} de ${hoje.getFullYear()} e próximos 2 meses_\n`;
  msg += `_Gerado em ${hoje.toLocaleDateString("pt-BR")}_\n\n`;

  meses.forEach(({ mes, ano }) => {
    const doMes = registros.filter(r => {
      if (!r.vencimento) return false;
      return r.vencimento.getMonth() === mes && r.vencimento.getFullYear() === ano;
    });
    if (doMes.length === 0) return;

    msg += `━━━━━━━━━━━━━━━━━━━\n`;
    msg += `📅 *${nomeMes(mes, ano).toUpperCase()}*\n`;
    msg += `━━━━━━━━━━━━━━━━━━━\n\n`;

    doMes.sort((a,b) => a.vencimento - b.vencimento).forEach((r, i) => {
      const dias = diasAteVencer(r.vencimento);
      const urgIcon = dias < 0 ? "🔴" : dias <= 30 ? "🔴" : dias <= 60 ? "🟡" : "🟢";
      const tipoLabel = r.tipo === "servicos" ? "🔧 Serviço" : "📦 Aquisição";

      // Resumo do objeto (5 palavras)
      const palavras = (r.objeto || "").split(/\s+/).slice(0,5).join(" ");
      const resumo = palavras + (r.objeto.split(/\s+/).length > 5 ? "…" : "");

      msg += `${urgIcon} *${i+1}. ${r.empresa}*\n`;
      msg += `• SEI: ${r.sei || "—"}\n`;
      msg += `• Contrato/ARP: ${r.contrato || "—"}\n`;
      msg += `• ${tipoLabel}: ${resumo}\n`;
      msg += `• Valor: ${fmtValor(r.valor)}\n`;
      msg += `• Vencimento: ${fmtData(r.vencimento)}${dias !== null ? ` (${dias < 0 ? "vencido há " + Math.abs(dias) + "d" : "em " + dias + "d"})` : ""}\n`;

      if (r.vigMax) msg += `• Vig. Máxima: ${r.vigMax}\n`;

      // Status
      const statusLabel = {
        "prorrogação": "Em prorrogação",
        "substituto":  "Processo substituto",
        "encerramento":"Encerramento",
        "renovacao":   "Renovação ARP",
      }[r.status] || r.status;

      msg += `• Status: *${statusLabel}*`;
      if (r.seiSubst) msg += ` — SEI ${r.seiSubst}`;
      if (r.andamento) msg += `\n  ↳ ${r.andamento}`;
      msg += "\n\n";
    });
  });

  // Aviso SUBJUR
  const urgentes = registros.filter(r => {
    const d = diasAteVencer(r.vencimento);
    return d !== null && d >= 0 && d <= 30;
  });
  if (urgentes.length > 0) {
    msg += `⚠️ *ATENÇÃO — ENVIO SUBJUR*\n`;
    msg += `${urgentes.length} processo${urgentes.length > 1 ? "s" : ""} com vencimento em até 30 dias:\n`;
    urgentes.forEach(r => { msg += `• ${r.empresa} — vence ${fmtData(r.vencimento)}\n`; });
  }

  return msg.trim();
}

          parts.push({ text: `\n--- ${label}${b64s[key].length > 1 ? ` (${i+1}/${b64s[key].length})` : ""} ---` });
          parts.push({ inline_data: { mime_type:"application/pdf", data:b64 } });
        });
      }
      parts.push({ text: prompt });

      setProgresso(`Analisando ${totalDocs} documento${totalDocs > 1 ? "s" : ""}…`);
      const resp = await callGemini({ contents:[{ parts }], generationConfig:{ temperature:0.15, maxOutputTokens:8192 } });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || `Gemini ${resp.status}`); }
      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setResultado(parsed);
      setEtapa(2);
    } catch(e) {
      setError("Erro na análise: " + e.message);
    } finally { setLoading(false); setProgresso(""); }
  };

  // ── RESULTADO ──
  if (etapa === 2 && resultado) return <ResultadoImpugnacao resultado={resultado} onVoltar={() => { setEtapa(1); setResultado(null); }} />;

  // ── FORMULÁRIO ──
  return (
    <div className="module-container">
      <div style={{ marginBottom:24 }}>
        <h2 style={{ fontSize:18, fontWeight:900, color:"var(--text-primary)", margin:"0 0 6px", letterSpacing:"-.02em" }}>
          ⚖️ Avaliação de Impugnações e Recursos
        </h2>
        <p style={{ fontSize:13, color:"var(--text-muted)", margin:0 }}>
          Análise em dois eixos independentes: enfrentamento procedimental e mérito jurídico com base em jurisprudência e legislação.
        </p>
      </div>

      {!apiKeySet && (
        <div className="info-box" style={{ marginBottom:20 }}>
          <p style={{ fontSize:13, color:"var(--info-text)", margin:0 }}>🔑 Configure a chave da API Gemini na <strong>página inicial</strong> para usar este módulo.</p>
        </div>
      )}

      {/* Upload */}
      <div className="card" style={{ marginBottom:20 }}>
        <p className="card-title" style={{ marginBottom:4 }}>Documentos do processo</p>
        <p className="card-subtitle" style={{ marginBottom:20 }}>
          Carregue os documentos disponíveis. Apenas a impugnação/recurso é obrigatória; os demais enriquecem a análise.
        </p>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
          <DropZone docKey="impugnacoes"          label="Impugnações / Recursos"     obrigatorio multi hint="Pode carregar mais de uma impugnação" />
          <DropZone docKey="contrarrazoes"         label="Contrarrazões"              multi hint="Se houver contrarrazões de terceiros" />
          <DropZone docKey="manifestacoesTec"      label="Manifestações Técnicas"     multi hint="Pareceres e notas técnicas da área demandante" />
          <DropZone docKey="manifestacaoPregoeiro" label="Manifestação do Pregoeiro"  hint="Decisão ou manifestação do pregoeiro/autoridade" />
        </div>

        {/* Resumo dos docs carregados */}
        {totalDocs > 0 && (
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
            {Object.entries(docs).map(([k, arr]) => arr.length > 0 && (
              <span key={k} style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:99, background:"var(--success-bg)", color:"var(--success-text)", border:"1px solid var(--success-border)" }}>
                ✓ {arr.length} {k === "impugnacoes" ? "impugnação/recurso" : k === "contrarrazoes" ? "contrarrazões" : k === "manifestacoesTec" ? "manif. técnica" : "manif. pregoeiro"}
              </span>
            ))}
          </div>
        )}

        {error && <div className="error-box" style={{ marginBottom:14 }}><p style={{ margin:0 }}>⚠ {error}</p></div>}

        {loading && (
          <div className="info-box" style={{ marginBottom:14 }}>
            <p style={{ fontSize:12, color:"var(--info-text)", margin:0 }}>⏳ {progresso}</p>
          </div>
        )}

        <button onClick={analisar} disabled={loading || !temImpugnacao }
          className="btn-primary" style={{ width:"100%", padding:"13px", fontSize:14 }}>
          {loading ? "Analisando documentos…" : `Analisar ${totalDocs > 0 ? `${totalDocs} documento${totalDocs>1?"s":""}` : ""}`}
        </button>
      </div>

      {/* Explicação metodológica */}
      <div className="card">
        <p className="card-title" style={{ marginBottom:12 }}>📋 Metodologia de análise</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          {[
            { icon:"🔍", title:"Eixo 1 — Enfrentamento", color:"var(--info-text)", bg:"var(--info-bg)", border:"var(--info-border)",
              items:["Verifica se cada ponto da impugnação/recurso foi respondido","Avalia se o enfrentamento foi adequado, superficial ou ausente","Aponta fragilidades que podem comprometer o prosseguimento","Recomenda ou não o prosseguimento do certame"] },
            { icon:"⚖️", title:"Eixo 2 — Mérito jurídico", color:"var(--accent)", bg:"var(--accent-light)", border:"var(--input-focus)",
              items:["Avalia a solidez dos argumentos da Administração","Coteja com jurisprudência TCU, TCE-RJ e legislação","Valoriza argumentos técnicos sobre formais","Aponta eventuais divergências com posicionamento consolidado de forma equilibrada"] },
          ].map(({ icon, title, color, bg, border, items }) => (
            <div key={title} style={{ background:bg, border:`1px solid ${border}`, borderRadius:10, padding:"14px 16px" }}>
              <p style={{ fontSize:13, fontWeight:700, color, margin:"0 0 10px" }}>{icon} {title}</p>
              {items.map((item, i) => (
                <div key={i} style={{ display:"flex", gap:8, marginBottom:6, alignItems:"flex-start" }}>
                  <span style={{ fontSize:11, color, marginTop:1, flexShrink:0 }}>→</span>
                  <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{item}</p>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ResultadoImpugnacao({ resultado, onVoltar }) {
  const [abaAtiva, setAbaAtiva] = React.useState("enfrentamento");
  const [copiado, setCopiado] = React.useState(false);

  const { identificacao, analise_enfrentamento: enf, analise_merito: merito } = resultado;

  const enfCfg = {
    todos_enfrentados:       { icon:"✅", label:"Todos os pontos enfrentados",   cor:"var(--success-text)", bg:"var(--success-bg)", border:"var(--success-border)" },
    parcialmente_enfrentados:{ icon:"⚠️", label:"Enfrentamento parcial",          cor:"var(--warning-text)", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    nao_enfrentados:         { icon:"🚨", label:"Pontos sem enfrentamento",       cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  }[enf?.conclusao] || { icon:"❓", label:"Indefinido", cor:"var(--text-muted)", bg:"var(--surface-2)", border:"var(--divider)" };

  const meritoCfg = {
    favoravel:                    { icon:"✅", label:"Favorável",                    cor:"var(--success-text)" },
    predominantemente_favoravel:  { icon:"👍", label:"Predominantemente favorável",  cor:"var(--success-text)" },
    equilibrado:                  { icon:"⚖️", label:"Equilibrado",                  cor:"var(--warning-text)" },
    predominantemente_desfavoravel:{ icon:"👎", label:"Predominantemente desfavorável",cor:"var(--warning-text)" },
    desfavoravel:                 { icon:"🚨", label:"Desfavorável",                 cor:"var(--danger-text)"  },
  }[merito?.conclusao_geral] || { icon:"❓", label:"Indefinido", cor:"var(--text-muted)" };

  const riscoCfg = {
    baixo:   { cor:"var(--success-text)", bg:"var(--success-bg)", border:"var(--success-border)" },
    medio:   { cor:"var(--warning-text)", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    alto:    { cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
    critico: { cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  }[merito?.nivel_risco] || { cor:"var(--text-muted)", bg:"var(--surface-2)", border:"var(--divider)" };

  const qualCfg = {
    adequada:    { cor:"var(--success-text)", icon:"✓" },
    superficial: { cor:"var(--warning-text)", icon:"~" },
    ausente:     { cor:"var(--danger-text)",  icon:"✗" },
  };

  const avalCfg = {
    solido:   { cor:"var(--success-text)", label:"Sólido",   bg:"var(--success-bg)", border:"var(--success-border)" },
    razoavel: { cor:"var(--warning-text)", label:"Razoável", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    fragil:   { cor:"var(--danger-text)",  label:"Frágil",   bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
    critico:  { cor:"var(--danger-text)",  label:"Crítico",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  };

  const hoje = new Date().toLocaleDateString("pt-BR");

  const gerarRelatorio = () => {
    let t = `RELATÓRIO DE AVALIAÇÃO — IMPUGNAÇÕES E RECURSOS\nGerado em: ${hoje}\n${"─".repeat(60)}\n\n`;
    t += `TIPO: ${identificacao?.tipo_peticao?.toUpperCase() || "—"}\n`;
    t += `PONTOS IDENTIFICADOS: ${identificacao?.numero_pontos || 0}\n\n`;
    t += `${"═".repeat(60)}\nEIXO 1 — ENFRENTAMENTO PROCEDIMENTAL\n${"═".repeat(60)}\n`;
    t += `Conclusão: ${enfCfg.label}\n`;
    t += `Recomendação: ${enf?.recomendacao_prosseguimento ? "PROSSEGUIR COM O CERTAME" : "NÃO PROSSEGUIR — sanear fragilidades"}\n\n`;
    t += `Resumo: ${enf?.resumo}\n\n`;
    enf?.pontos?.forEach((p, i) => {
      t += `${i+1}. ${p.ponto}\n`;
      t += `   Enfrentado: ${p.foi_enfrentado === true ? "Sim" : p.foi_enfrentado === "parcialmente" ? "Parcialmente" : "Não"}\n`;
      t += `   Qualidade: ${p.qualidade_resposta}\n`;
      if (p.fragilidade) t += `   Fragilidade: ${p.fragilidade}\n`;
      t += "\n";
    });
    if (enf?.fragilidades_criticas?.length) {
      t += `FRAGILIDADES CRÍTICAS:\n${enf.fragilidades_criticas.map(f => `• ${f}`).join("\n")}\n\n`;
    }
    t += `${"═".repeat(60)}\nEIXO 2 — MÉRITO JURÍDICO\n${"═".repeat(60)}\n`;
    t += `Conclusão: ${meritoCfg.label}\nNível de risco: ${merito?.nivel_risco?.toUpperCase() || "—"}\n\n`;
    t += `Resumo: ${merito?.resumo}\n\n`;
    merito?.pontos?.forEach((p, i) => {
      t += `${i+1}. ${p.ponto}\n`;
      t += `   Posição da Administração: ${p.posicao_administracao}\n`;
      t += `   Avaliação: ${avalCfg[p.avaliacao]?.label || p.avaliacao}\n`;
      t += `   Fundamento: ${p.fundamento}\n`;
      if (p.observacao) t += `   Obs: ${p.observacao}\n`;
      t += "\n";
    });
    if (merito?.jurisprudencia_relevante?.length) {
      t += `JURISPRUDÊNCIA RELEVANTE:\n`;
      merito.jurisprudencia_relevante.forEach(j => { t += `• ${j.tribunal} — ${j.referencia}: ${j.relevancia}\n`; });
      t += "\n";
    }
    t += `RECOMENDAÇÃO FINAL:\n${merito?.recomendacao_final}\n`;
    return t;
  };

  const copiar = () => {
    navigator.clipboard.writeText(gerarRelatorio()).then(() => { setCopiado(true); setTimeout(() => setCopiado(false), 2500); });
  };

  return (
    <div className="module-container">
      {/* Header resultado */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24, gap:16 }}>
        <div>
          <h2 style={{ fontSize:18, fontWeight:900, color:"var(--text-primary)", margin:"0 0 4px" }}>Resultado da análise</h2>
          <p style={{ fontSize:13, color:"var(--text-muted)", margin:0 }}>
            {identificacao?.tipo_peticao === "impugnação" ? "Impugnação" : identificacao?.tipo_peticao === "recurso" ? "Recurso" : "Impugnação/Recurso"} · {identificacao?.numero_pontos || 0} ponto{identificacao?.numero_pontos !== 1 ? "s" : ""} analisado{identificacao?.numero_pontos !== 1 ? "s" : ""}
          </p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onVoltar} className="btn-secondary" style={{ fontSize:12 }}>← Nova análise</button>
          <button onClick={copiar} className="btn-primary" style={{ fontSize:12 }}>
            {copiado ? "✓ Copiado" : "📋 Exportar relatório"}
          </button>
        </div>
      </div>

      {/* Cards de status */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:24 }}>
        <div style={{ padding:"16px 18px", background:enfCfg.bg, border:`1px solid ${enfCfg.border}`, borderRadius:12 }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Enfrentamento</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{enfCfg.icon}</p>
          <p style={{ fontSize:13, fontWeight:700, color:enfCfg.cor, margin:0 }}>{enfCfg.label}</p>
        </div>
        <div style={{ padding:"16px 18px", background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, boxShadow:"var(--card-shadow)" }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Prosseguimento</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{enf?.recomendacao_prosseguimento ? "✅" : "⛔"}</p>
          <p style={{ fontSize:13, fontWeight:700, color: enf?.recomendacao_prosseguimento ? "var(--success-text)" : "var(--danger-text)", margin:0 }}>
            {enf?.recomendacao_prosseguimento ? "Prosseguir" : "Sanear antes"}
          </p>
        </div>
        <div style={{ padding:"16px 18px", background:riscoCfg.bg, border:`1px solid ${riscoCfg.border}`, borderRadius:12 }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Risco jurídico</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{meritoCfg.icon}</p>
          <p style={{ fontSize:13, fontWeight:700, color:riscoCfg.cor, margin:0 }}>
            {merito?.nivel_risco?.charAt(0).toUpperCase() + merito?.nivel_risco?.slice(1) || "—"} · {meritoCfg.label}
          </p>
        </div>
      </div>

      {/* Abas de análise */}
      <div style={{ display:"flex", gap:0, marginBottom:20, borderBottom:"1px solid var(--divider)" }}>
        {[
          { id:"enfrentamento", label:"🔍 Eixo 1 — Enfrentamento" },
          { id:"merito",        label:"⚖️ Eixo 2 — Mérito jurídico" },
        ].map(a => (
          <button key={a.id} onClick={() => setAbaAtiva(a.id)}
            style={{ padding:"11px 20px", border:"none", borderBottom: abaAtiva===a.id ? "2px solid var(--accent)" : "2px solid transparent", background:"transparent", color: abaAtiva===a.id ? "var(--accent)" : "var(--text-muted)", fontSize:13, fontWeight: abaAtiva===a.id ? 700 : 400, cursor:"pointer", transition:"all .15s" }}>
            {a.label}
          </button>
        ))}
      </div>

      {/* EIXO 1 — ENFRENTAMENTO */}
      {abaAtiva === "enfrentamento" && (
        <div>
          {/* Resumo */}
          <div style={{ background:enfCfg.bg, border:`1px solid ${enfCfg.border}`, borderRadius:12, padding:20, marginBottom:16 }}>
            <p style={{ fontSize:13, fontWeight:700, color:enfCfg.cor, margin:"0 0 8px" }}>{enfCfg.icon} {enfCfg.label}</p>
            <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{enf?.resumo}</p>
          </div>

          {/* Fragilidades críticas */}
          {enf?.fragilidades_criticas?.length > 0 && (
            <div style={{ background:"var(--danger-bg)", border:"1px solid var(--danger-border)", borderRadius:12, padding:"14px 18px", marginBottom:16 }}>
              <p style={{ fontSize:12, fontWeight:700, color:"var(--danger-text)", margin:"0 0 8px", textTransform:"uppercase", letterSpacing:".04em" }}>🚨 Fragilidades críticas</p>
              {enf.fragilidades_criticas.map((f, i) => (
                <div key={i} style={{ display:"flex", gap:8, marginBottom: i < enf.fragilidades_criticas.length-1 ? 6 : 0 }}>
                  <span style={{ color:"var(--danger-text)", fontSize:14, flexShrink:0, marginTop:1 }}>•</span>
                  <p style={{ fontSize:13, color:"var(--danger-text)", margin:0, lineHeight:1.5 }}>{f}</p>
                </div>
              ))}
            </div>
          )}

          {/* Cards por ponto */}
          {enf?.pontos?.map((p, i) => {
            const qc = qualCfg[p.qualidade_resposta] || { cor:"var(--text-muted)", icon:"?" };
            const foi = p.foi_enfrentado === true ? { cor:"var(--success-text)", label:"Sim", bg:"var(--success-bg)", border:"var(--success-border)" }
              : p.foi_enfrentado === "parcialmente" ? { cor:"var(--warning-text)", label:"Parcialmente", bg:"var(--warning-bg)", border:"var(--warning-border)" }
              : { cor:"var(--danger-text)", label:"Não", bg:"var(--danger-bg)", border:"var(--danger-border)" };
            return (
              <div key={i} style={{ background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"var(--card-shadow)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 18px", background:"var(--card-header-bg)", borderBottom:"1px solid var(--card-border)" }}>
                  <div style={{ width:26, height:26, borderRadius:"50%", background:foi.bg, border:`1.5px solid ${foi.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:foi.cor, flexShrink:0 }}>{i+1}</div>
                  <p style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", flex:1, margin:0 }}>{p.ponto}</p>
                  <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:99, background:foi.bg, color:foi.cor, border:`1px solid ${foi.border}`, whiteSpace:"nowrap" }}>
                    {foi.label}
                  </span>
                </div>
                <div style={{ padding:"12px 18px", display:"flex", gap:16, flexWrap:"wrap" }}>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:"var(--text-muted)" }}>Qualidade:</span>
                    <span style={{ fontSize:12, fontWeight:700, color:qc.cor }}>{qc.icon} {p.qualidade_resposta}</span>
                  </div>
                  {p.documento_resposta && p.documento_resposta !== "nenhum" && (
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <span style={{ fontSize:12, color:"var(--text-muted)" }}>Respondido por:</span>
                      <span style={{ fontSize:12, fontWeight:600, color:"var(--text-secondary)" }}>{p.documento_resposta}</span>
                    </div>
                  )}
                  {p.fragilidade && (
                    <div style={{ width:"100%", marginTop:4, padding:"8px 12px", background:"var(--warning-bg)", border:"1px solid var(--warning-border)", borderRadius:8 }}>
                      <p style={{ fontSize:12, color:"var(--warning-text)", margin:0 }}>⚠ {p.fragilidade}</p>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* EIXO 2 — MÉRITO */}
      {abaAtiva === "merito" && (
        <div>
          {/* Resumo */}
          <div style={{ background:"var(--accent-light)", border:"1px solid color-mix(in srgb, var(--accent) 30%, transparent)", borderRadius:12, padding:20, marginBottom:16 }}>
            <p style={{ fontSize:13, fontWeight:700, color:"var(--accent)", margin:"0 0 8px" }}>⚖️ {meritoCfg.label}</p>
            <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{merito?.resumo}</p>
          </div>

          {/* Pontos */}
          {merito?.pontos?.map((p, i) => {
            const ac = avalCfg[p.avaliacao] || avalCfg.razoavel;
            const isPeso = { tecnico:"🔧 Técnico", juridico:"⚖️ Jurídico", formal:"📋 Formal" }[p.peso] || p.peso;
            return (
              <div key={i} style={{ background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"var(--card-shadow)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 18px", background:"var(--card-header-bg)", borderBottom:"1px solid var(--card-border)" }}>
                  <div style={{ width:26, height:26, borderRadius:"50%", background:ac.bg, border:`1.5px solid ${ac.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:ac.cor, flexShrink:0 }}>{i+1}</div>
                  <p style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", flex:1, margin:0 }}>{p.ponto}</p>
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <span style={{ fontSize:10, fontWeight:600, color:"var(--text-muted)", background:"var(--surface-2)", padding:"2px 8px", borderRadius:99 }}>{isPeso}</span>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:99, background:ac.bg, color:ac.cor, border:`1px solid ${ac.border}` }}>{ac.label}</span>
                  </div>
                </div>
                <div style={{ padding:"12px 18px" }}>
                  {p.posicao_administracao && (
                    <div style={{ marginBottom:10 }}>
                      <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 3px" }}>Posição da Administração</p>
                      <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{p.posicao_administracao}</p>
                    </div>
                  )}
                  <div style={{ marginBottom: p.observacao ? 10 : 0 }}>
                    <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 3px" }}>📖 Fundamento</p>
                    <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{p.fundamento}</p>
                  </div>
                  {p.observacao && (

    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });

  const handleRelatorio = async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setPdfRelatorio(file);
    setB64Relatorio(await lerPdf(file));
    setError(""); setResultado(null);
  };

  const handleTabelas = async (files) => {
    const arr = Array.from(files).filter(f => f.type === "application/pdf");
    setPdfTabelas(arr);
    const b64s = await Promise.all(arr.map(lerPdf));
    setB64Tabelas(b64s);
    setError(""); setResultado(null);
  };

  const analisar = async () => {
    if (!b64Relatorio) { setError("Carregue o relatório da Coordenação de Compras."); return; }

Foram fornecidos:
1. Relatório elaborado pela Coordenação de Compras com a pesquisa semestral de preços
2. Uma ou mais tabelas em PDF com os preços coletados na pesquisa de mercado

CONTEXTO E CRITÉRIO DE ANÁLISE:
A pesquisa semestral de ARPs no Estado do Rio de Janeiro não tem foco em vantajosidade, mas sim em COMPATIBILIDADE DE PREÇOS com o mercado. O critério da SES-RJ é:

- Se o valor registrado na ARP estiver ABAIXO do maior valor encontrado na pesquisa de mercado dos últimos 6 meses → o preço está COMPATÍVEL com o mercado. Análise encerrada positivamente para o item.

- Se o valor registrado estiver ACIMA do maior valor da pesquisa → verificar:
  a) A pesquisa considerou fornecedores do mercado do Rio de Janeiro? (localidade)
  b) A pesquisa considerou a marca registrada na ARP? (especificidade)
  → Se NÃO considerou esses fatores: indicar possibilidade de refazer a pesquisa com esses parâmetros OU apontar que a ausência de preços comparáveis no mercado local pode indicar que o valor registrado é compatível com as condições específicas daquela ARP.
  → Se SIM considerou e mesmo assim o valor está acima: indicar necessidade de RENEGOCIAÇÃO com o fornecedor, conforme art. 12 do Decreto Estadual nº 48.821/2023.

Para cada item da ARP identificado nos documentos, retorne um objeto JSON com:
- "item": número ou descrição do item
- "descricao": descrição sucinta do produto/serviço
- "valor_arp": valor unitário registrado na ARP (como string formatada)
- "maior_valor_pesquisa": maior valor encontrado na pesquisa de mercado para esse item
- "situacao": "compativel", "verificar" ou "renegociar"
- "percentual_diferenca": diferença percentual entre valor ARP e maior valor pesquisa (positivo = ARP acima do mercado)
- "considerou_localidade_rj": true/false/null (null se não foi possível identificar)
- "considerou_marca": true/false/null
- "analise": análise detalhada do item seguindo o critério acima (máx. 400 chars)
- "recomendacao": recomendação objetiva de conduta para o gestor (máx. 250 chars)

Retorne APENAS um JSON puro com esta estrutura (sem markdown):
{
  "arp_identificada": "número/identificação da ARP se encontrada nos documentos",
  "periodo_pesquisa": "período coberto pela pesquisa (ex: jan-jun/2025)",

  "situacao_geral": "compativel" | "atencao" | "critica",
  "itens": [ ... ]
}`;

    try {

            // Monta parts com todas as tabelas + relatório

      const resp = await callGemini({contents:[{parts:[{inline_data:{mime_type:"application/pdf",data:b64Contrato}},{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:1024}});
      const data = await resp.json();
      const parsed = JSON.parse((data.candidates?.[0]?.content?.parts?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      setContratoInfo(parsed);
      const db = parsed.lei_aplicavel==="8666"?(parsed.data_proposta||""):(parsed.data_rapp||"");
      setCampos(p=>({...p, dataBase:db, indice:parsed.indice_reajuste||"IPCA"}));
      setEtapa(2);
    } catch(e) { setError("Erro: "+e.message); }
    finally { setLoading(false); }
  };

  const buscarIndiceIbge = async (mesRef, nomeIndice) => {
    const codigos = {"IPCA":"7060","INPC":"7062","IGP-M":"IGP-M","IPCA-E":"10764"};
    const cod = codigos[nomeIndice];
    if (!cod || !["IPCA","INPC","IPCA-E"].includes(nomeIndice)) return null;
    const periodo = `${mesRef.getFullYear()}${String(mesRef.getMonth()+1).padStart(2,"0")}`;
    try {
      const url = `https://servicodados.ibge.gov.br/api/v3/agregados/${cod}/periodos/${periodo}/variaveis/63?localidades=N1[all]`;
      const r = await fetch(url);
      if (!r.ok) return null;
      const d = await r.json();
      const valor = d?.[0]?.resultados?.[0]?.series?.[0]?.serie?.[periodo];
      if (!valor) return null;
      // IBGE divulga IPCA/INPC do mês M no dia ~10 do mês M+1
      const divulgacao = new Date(mesRef.getFullYear(), mesRef.getMonth()+1, 10);
      return {valor: parseFloat(valor), divulgacao, fonte:"IBGE"};
    } catch { return null; }
  };

  const calcular = async () => {
    setError("");
    const dataBase = pd(campos.dataBase);
    if (!dataBase) { setError("Informe a data base no formato DD/MM/AAAA."); return; }
    const dataPedido = campos.dataPedido ? pd(campos.dataPedido) : hoje();
    const indice = campos.indice==="Outro" ? campos.indiceCustom : campos.indice;

    // Determina quantos ciclos já foram concedidos
    const concedidos = campos.reajustesAnteriores
      .map(r => pd(r.dataConcessao))
      .filter(Boolean)
      .length;

    // Mês de início da data base (dia 1 do mês)
    const mesBase = new Date(dataBase.getFullYear(), dataBase.getMonth(), 1);

    const ciclos = [];
    setLoadingIbge(true);
    try {
      for (let n = 1; n <= 10; n++) {
        // Período aquisitivo N: de mesBase+(n-1)*12 a mesBase+n*12 (exclusive)
        // Direito adquirido ao completar n*12 meses a partir do mesBase
        const mesAquisicao = addM(mesBase, n * 12); // mês em que completa o direito
        const dataAquisicao = mesAquisicao; // primeiro dia do mês

        // Não projeta mais que 1 mês no futuro
        if (dataAquisicao > addM(hoje(), 1)) break;

        // Período de cômputo: do mês base+(n-1)*12 ao mês anterior ao da aquisição
        // Ex n=1, base=jun/24: cômputo jun/24 a mai/25
        const mesInicioCom = addM(mesBase, (n-1)*12);
        const mesFimCom = addM(mesBase, n*12 - 1); // mês anterior ao da aquisição

        // Busca o índice do mês fim do cômputo
        let pubInfo = null;
        if (campos.pubManualAtiva && campos.dataPublicacaoManual && n === ciclos.length + 1) {
          pubInfo = { divulgacao: pd(campos.dataPublicacaoManual), valor:null, fonte:"manual" };
        } else {
          pubInfo = await buscarIndiceIbge(mesFimCom, indice);
        }
        // Fallback: dia 10 do mês seguinte ao fim do cômputo
        if (!pubInfo) {
          pubInfo = { divulgacao: new Date(mesFimCom.getFullYear(), mesFimCom.getMonth()+1, 10), valor:null, fonte:"estimado" };
        }

        const prazoRetro = addD(pubInfo.divulgacao, 60);
        const adquirido = dataAquisicao <= hoje();
        const jaConcedido = n <= concedidos;
        const temRetro = adquirido && !jaConcedido ? (dataPedido <= prazoRetro) : null;

        ciclos.push({ n, mesInicioCom, mesFimCom, dataAquisicao, pubInfo, prazoRetro, adquirido, jaConcedido, temRetro, dataPedido });
      }
    } finally { setLoadingIbge(false); }

    if (ciclos.length === 0) {
      // Nenhum adquirido — mostra o próximo
    }

    // Próximo a adquirir
    const ultimoN = ciclos.length > 0 ? ciclos[ciclos.length-1].n : 0;
    const proxN = ultimoN + 1;
    const proxMesAq = addM(mesBase, proxN*12);
    const proxMesFimCom = addM(mesBase, proxN*12-1);
    const proxPubEst = new Date(proxMesFimCom.getFullYear(), proxMesFimCom.getMonth()+1, 10);

    setResultado({
      lei: contratoInfo?.lei_aplicavel,
      contrato: contratoInfo,
      dataBase: fd(dataBase),
      mesBase: fMes(mesBase),
      indice,
      ciclos,
      proximo: { n:proxN, mesAquisicao:proxMesAq, mesInicioCom:addM(mesBase,(proxN-1)*12), mesFimCom:proxMesFimCom, pubEst:proxPubEst, prazoRetroEst:addD(proxPubEst,60) },
      alertas: [
        !contratoInfo?.tem_clausula_reajuste && "⚠️ Cláusula de reajuste não identificada — verificar previsão editalícia",
        contratoInfo?.lei_aplicavel==="indeterminado" && "⚠️ Lei não identificada com certeza — confirme manualmente",
        !contratoInfo?.indice_reajuste && "⚠️ Índice de reajuste não identificado na cláusula contratual — confirme manualmente",
        contratoInfo?.observacoes,
      ].filter(Boolean),
    });
    setEtapa(3);
  };

  const Stepper = () => (
    <div style={{display:"flex",alignItems:"center",marginBottom:28}}>
      {["Contrato","Dados","Resultado"].map((s,i) => {
        const n=i+1,at=etapa===n,fe=etapa>n;
        return (<React.Fragment key={s}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,background:fe?"var(--success-text)":at?"var(--accent)":"var(--surface-2)",color:fe||at?"#fff":"var(--text-muted)"}}>{fe?"✓":n}</div>
            <span style={{fontSize:12,fontWeight:at?700:500,color:at?"var(--text-primary)":"var(--text-muted)"}}>{s}</span>
          </div>
          {i<2&&<div style={{flex:1,height:2,background:fe?"var(--success-text)":"var(--card-border)",margin:"0 10px"}}/>}
        </React.Fragment>);
      })}
    </div>
  );

  if (etapa===3&&resultado) return <ResultadoReajuste resultado={resultado} onVoltar={()=>{setEtapa(2);setResultado(null);}}/>;

  return (
    <div className="module-container">
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:18,fontWeight:900,color:"var(--text-primary)",margin:"0 0 6px",letterSpacing:"-.02em"}}>📈 Reajuste Contratual</h2>
        <p style={{fontSize:13,color:"var(--text-muted)",margin:0}}>Período aquisitivo de 12 meses, cômputo do índice e prazo de 60 dias para retroatividade dos efeitos financeiros.</p>
      </div>
      <Stepper/>
{error&&<div className="error-box" style={{marginBottom:16}}><p style={{margin:0}}>⚠ {error}</p></div>}

      {/* ETAPA 1 — só o contrato */}
      <div className="card" style={{marginBottom:20,opacity:etapa>1?.65:1}}>
        <p className="card-title">Etapa 1 — Contrato inicial</p>
        <p className="card-subtitle" style={{marginBottom:14}}>O sistema identificará automaticamente a lei aplicável, o índice contratual e a data base.</p>
        <div onClick={()=>refContrato.current.click()} onDrop={e=>{e.preventDefault();handleContrato(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()} className="dropzone" style={{marginBottom:14}}>
          <input ref={refContrato} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>handleContrato(e.target.files[0])}/>
          {pdfContrato?(<><div style={{fontSize:22}}>📄</div><p style={{fontSize:13,fontWeight:600,color:"var(--accent)",margin:"6px 0 2px"}}>{pdfContrato.name}</p><p className="text-muted" style={{fontSize:11}}>Clique para trocar</p></>):(<><div style={{fontSize:22}}>📂</div><p style={{fontSize:12,color:"var(--text-muted)",margin:"6px 0 0"}}>Arraste ou <strong style={{color:"var(--accent)"}}>clique</strong> para selecionar o PDF do contrato</p></>)}
        </div>
        {etapa===1&&<button onClick={analisarContrato} disabled={loading||!b64Contrato} className="btn-primary" style={{width:"100%"}}>{loading?"Analisando contrato…":"Analisar contrato →"}</button>}
        {contratoInfo&&etapa>1&&(
          <div style={{marginTop:12,padding:"10px 14px",background:"var(--surface-2)",borderRadius:8,fontSize:12,color:"var(--text-secondary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>✓ <strong>{contratoInfo.numero_contrato||"Contrato"}</strong> · Lei <strong>{contratoInfo.lei_aplicavel==="14133"?"14.133/2021":contratoInfo.lei_aplicavel==="8666"?"8.666/1993":"a confirmar"}</strong> · Índice: <strong>{contratoInfo.indice_reajuste||"verificar"}</strong></span>
            <button onClick={()=>setEtapa(1)} className="btn-link">Trocar</button>
          </div>
        )}
      </div>

      {/* ETAPA 2 */}
      {etapa>=2&&contratoInfo&&(
        <div className="card" style={{marginBottom:20}}>
          <p className="card-title" style={{marginBottom:12}}>Etapa 2 — Confirmar dados e reajustes anteriores</p>

          <div style={{marginBottom:16,padding:"12px 16px",borderRadius:10,background:"var(--info-bg)",border:"1px solid var(--info-border)"}}>
            <p style={{fontSize:12,fontWeight:700,color:"var(--info-text)",margin:"0 0 4px"}}>
              {contratoInfo.lei_aplicavel==="14133"?"⚖️ Lei 14.133/2021 — Data base: data do RAPP":contratoInfo.lei_aplicavel==="8666"?"⚖️ Lei 8.666/93 — Data base: data da proposta":"⚠️ Lei não identificada — verifique a data base"}
            </p>
            <p style={{fontSize:11,color:"var(--text-muted)",margin:"0 0 4px"}}>
              Os períodos aquisitivos correm em ciclos de 12 meses a partir do mês da data base:<br/>
              Ciclo 1: mês base → mês base+12 · Ciclo 2: mês base+12 → mês base+24 etc.
            </p>
            {contratoInfo.clausula_reajuste&&<p style={{fontSize:11,color:"var(--text-muted)",margin:"6px 0 0",fontStyle:"italic"}}>📋 Cláusula: "{contratoInfo.clausula_reajuste}"</p>}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
            <div style={{marginBottom:14}}>
              <label className="label-text" style={{display:"block",marginBottom:5}}>📅 Data base ({contratoInfo.lei_aplicavel==="8666"?"data da proposta":"data do RAPP"})</label>
              <input value={campos.dataBase} onChange={e=>set("dataBase",e.target.value)} placeholder="DD/MM/AAAA" className="input-field"/>
            </div>
            <div style={{marginBottom:14}}>
              <label className="label-text" style={{display:"block",marginBottom:5}}>📊 Índice de reajuste</label>
              <select value={campos.indice} onChange={e=>set("indice",e.target.value)} className="input-field">
                {["IPCA","INPC","IGP-M","IGP-DI","IPCA-E","IPC","ICV","Outro"].map(i=><option key={i}>{i}</option>)}
              </select>
              {campos.indice==="Outro"&&<input value={campos.indiceCustom} onChange={e=>set("indiceCustom",e.target.value)} placeholder="Nome do índice" className="input-field" style={{marginTop:8}}/>}
              {contratoInfo.indice_reajuste&&campos.indice!==contratoInfo.indice_reajuste&&<p style={{fontSize:11,color:"var(--warning-text)",marginTop:4}}>⚠ Contrato prevê {contratoInfo.indice_reajuste}</p>}
            </div>
            <div style={{marginBottom:14}}>
              <label className="label-text" style={{display:"block",marginBottom:5}}>📋 Data do pedido da empresa</label>
              <input value={campos.dataPedido} onChange={e=>set("dataPedido",e.target.value)} placeholder="DD/MM/AAAA (vazio = hoje)" className="input-field"/>
            </div>
          </div>

          {/* Reajustes anteriores concedidos */}
          <div style={{padding:"14px 16px",background:"var(--surface-2)",borderRadius:10,border:"1px solid var(--card-border)",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <p style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",margin:0}}>🔄 Reajustes anteriores já concedidos</p>
                <p style={{fontSize:11,color:"var(--text-muted)",margin:"3px 0 0"}}>Se já houve reajuste(s) anterior(es), informe para calcular o ciclo correto.</p>
              </div>
              <button onClick={()=>set("reajustesAnteriores",[...campos.reajustesAnteriores,{dataConcessao:"",cicloNumero:campos.reajustesAnteriores.length+1}])} className="btn-secondary" style={{fontSize:12,whiteSpace:"nowrap"}}>+ Adicionar</button>
            </div>
            {campos.reajustesAnteriores.length===0&&<p style={{fontSize:12,color:"var(--text-subtle)",margin:0}}>Nenhum reajuste anterior — este será o primeiro.</p>}
            {campos.reajustesAnteriores.map((r,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"center",marginTop:8}}>
                <span style={{fontSize:12,color:"var(--text-muted)",minWidth:16}}>{i+1}º</span>
                <input value={r.dataConcessao} onChange={e=>{const arr=[...campos.reajustesAnteriores];arr[i]={...arr[i],dataConcessao:e.target.value};set("reajustesAnteriores",arr);}} placeholder="Data de concessão DD/MM/AAAA" className="input-field" style={{flex:1}}/>
                <button onClick={()=>set("reajustesAnteriores",campos.reajustesAnteriores.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"var(--danger-text)",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
              </div>
            ))}
          </div>

          {/* Publicação manual do índice */}
          <div style={{padding:"14px 16px",background:"var(--surface-2)",borderRadius:10,border:"1px solid var(--card-border)",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <input type="checkbox" id="pubManual" checked={campos.pubManualAtiva} onChange={e=>set("pubManualAtiva",e.target.checked)} style={{width:14,height:14,cursor:"pointer"}}/>
              <label htmlFor="pubManual" style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",cursor:"pointer"}}>📰 Informar manualmente a data de publicação do índice</label>
            </div>
            <p style={{fontSize:11,color:"var(--text-muted)",margin:"0 0 8px"}}>Por padrão, o sistema busca no IBGE (IPCA/INPC) e estima o dia 10 do mês seguinte como data de publicação. Ative para ajustar.</p>
            {campos.pubManualAtiva&&<input value={campos.dataPublicacaoManual} onChange={e=>set("dataPublicacaoManual",e.target.value)} placeholder="DD/MM/AAAA" className="input-field"/>}
          </div>

          {loadingIbge&&<div className="info-box" style={{marginBottom:12}}><p style={{fontSize:12,color:"var(--info-text)",margin:0}}>⏳ Consultando IBGE…</p></div>}

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEtapa(1)} className="btn-secondary">← Voltar</button>
            <button onClick={calcular} disabled={loadingIbge} className="btn-primary" style={{flex:1}}>Calcular direitos →</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultadoReajuste({ resultado, onVoltar }) {
  const [copiado, setCopiado] = React.useState(false);
  const { ciclos, proximo, contrato, lei, dataBase, mesBase, indice, alertas } = resultado;
  const leiLabel = lei==="14133"?"Lei 14.133/2021":lei==="8666"?"Lei 8.666/1993":"Lei a confirmar";
  const hoje = new Date().toLocaleDateString("pt-BR");
  const fd = d => d instanceof Date && !isNaN(d) ? d.toLocaleDateString("pt-BR") : d||"—";
  const fMes = d => d instanceof Date && !isNaN(d) ? d.toLocaleDateString("pt-BR",{month:"long",year:"numeric"}) : "—";

  const pendentes = ciclos.filter(c=>!c.jaConcedido);
  const concedidos = ciclos.filter(c=>c.jaConcedido);

  const gerarTexto = () => {
    let t=`ANÁLISE DE REAJUSTE CONTRATUAL\nGerado em: ${hoje}\n${"─".repeat(55)}\n\n`;
    t+=`CONTRATO: ${contrato?.numero_contrato||"—"}\nCONTRATADA: ${contrato?.contratada||"—"}\nOBJETO: ${contrato?.objeto||"—"}\nLEI: ${leiLabel}\nDATA BASE: ${dataBase} · MÊS BASE: ${mesBase}\nÍNDICE: ${indice}\n\n`;
    if(concedidos.length>0){t+=`${"─".repeat(55)}\nREAJUSTES JÁ CONCEDIDOS: ${concedidos.length}\n${concedidos.map(c=>`• ${c.n}º reajuste — período ${fMes(c.mesInicioCom)} a ${fMes(c.mesFimCom)}`).join("\n")}\n\n`;}
    t+=`${"─".repeat(55)}\nDIREITOS PENDENTES: ${pendentes.length}\n\n`;
    pendentes.forEach((c,i)=>{
      t+=`${c.n}º REAJUSTE (${c.n*12} meses da data base)\n`;
      t+=`  Direito adquirido em: ${fMes(c.dataAquisicao)}\n`;
      t+=`  Período de cômputo: ${fMes(c.mesInicioCom)} a ${fMes(c.mesFimCom)}\n`;
      t+=`  Publicação do ${indice} de ${fMes(c.mesFimCom)}: ${fd(c.pubInfo.divulgacao)} (${c.pubInfo.fonte})\n`;
      if(c.pubInfo.valor) t+=`  Valor acumulado: ${c.pubInfo.valor.toFixed(2)}%\n`;
      t+=`  Prazo retroatividade (60d): ${fd(c.prazoRetro)}\n`;
      t+=`  Data do pedido: ${fd(c.dataPedido)}\n`;
      t+=`  Retroatividade: ${c.temRetro===true?"SIM — efeitos retroagem a "+fMes(c.dataAquisicao):c.temRetro===false?"NÃO — prazo expirado (efeitos a partir do pedido)":"—"}\n\n`;
    });
    t+=`${"─".repeat(55)}\nPRÓXIMO CICLO (${proximo.n}º reajuste — estimativas)\n`;
    t+=`  Direito a adquirir em: ${fMes(proximo.mesAquisicao)}\n`;
    t+=`  Período de cômputo: ${fMes(proximo.mesInicioCom)} a ${fMes(proximo.mesFimCom)}\n`;
    t+=`  Publicação est. do ${indice}: ${fd(proximo.pubEst)}\n`;
    t+=`  Prazo retro. estimado: ${fd(proximo.prazoRetroEst)}\n`;
    if(alertas?.length) t+=`\n${"─".repeat(55)}\nALERTAS:\n${alertas.map(a=>`• ${a}`).join("\n")}\n`;
    return t;
  };

  const gerarDespacho = () => {
    const c0 = pendentes[0];
    if (!c0) return "Nenhum direito pendente identificado.";
    const multi = pendentes.length>1;
    return `DESPACHO\n\nTrata-se de pedido de reajuste contratual apresentado pela empresa ${contrato?.contratada||"___"}, referente ao Contrato nº ${contrato?.numero_contrato||"___"}, cujo objeto é ${contrato?.objeto||"___"}.\n\nO contrato foi celebrado com fundamento na ${leiLabel}. A data base para fins de reajuste é ${dataBase} (${lei==="8666"?"data da proposta apresentada no certame licitatório":"data de elaboração do orçamento estimativo — RAPP"}), nos termos do ${lei==="8666"?"art. 40, XI e art. 55, III, da Lei nº 8.666/1993":"art. 92, §§ 1º e 2º, da Lei nº 14.133/2021"}. O índice de reajuste previsto contratualmente é o ${indice}.\n\nO período aquisitivo do ${c0.n}º direito de reajuste completou-se em ${fMes(c0.dataAquisicao)}, com ${c0.n*12} (${c0.n*12}) meses contados da data base. O cômputo do ${indice} abrange o período de ${fMes(c0.mesInicioCom)} a ${fMes(c0.mesFimCom)}${c0.pubInfo.valor?`, acumulando ${c0.pubInfo.valor.toFixed(2)}% no período`:""}.${multi?`\n\nVerificam-se ainda ${pendentes.length-1} direito(s) adicional(is): ${pendentes.slice(1).map(c=>`${c.n}º (período ${fMes(c.mesInicioCom)} a ${fMes(c.mesFimCom)}, adquirido em ${fMes(c.dataAquisicao)})`).join("; ")}.`:""}\n\nO ${indice} de ${fMes(c0.mesFimCom)} foi divulgado em ${fd(c0.pubInfo.divulgacao)}${c0.pubInfo.fonte==="estimado"?" (data estimada — confirmar no site do IBGE)":""}, de modo que o prazo de 60 (sessenta) dias para pedido com efeito retroativo encerrou-se em ${fd(c0.prazoRetro)}. ${c0.temRetro===true?`O pedido foi apresentado em ${fd(c0.dataPedido)}, dentro do prazo, razão pela qual os efeitos financeiros retroagem ao início do período aquisitivo (${fMes(c0.dataAquisicao)}).`:`O pedido foi apresentado em ${fd(c0.dataPedido)}, após o prazo de 60 dias, razão pela qual os efeitos financeiros somente serão contados a partir desta data (TCU, Acórdão 1.827/2018-Plenário).`}\n\n${alertas?.length?`OBSERVAÇÕES:\n${alertas.join("\n")}\n\n`:""}Encaminhe-se para as providências cabíveis.\n\nRio de Janeiro, ${hoje}.`;
  };

  const copiar = t => navigator.clipboard.writeText(t).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2500);});

  return (
    <div className="module-container">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,gap:16,flexWrap:"wrap"}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:900,color:"var(--text-primary)",margin:"0 0 4px"}}>{pendentes.length} direito{pendentes.length!==1?"s":""} pendente{pendentes.length!==1?"s":""} · {concedidos.length} já concedido{concedidos.length!==1?"s":""}</h2>
          <p style={{fontSize:13,color:"var(--text-muted)",margin:0}}>{contrato?.numero_contrato} · {leiLabel} · Base: {dataBase} · {indice}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onVoltar} className="btn-secondary" style={{fontSize:12}}>← Editar</button>
          <button onClick={()=>copiar(gerarTexto())} className="btn-primary" style={{fontSize:12}}>{copiado?"✓ Copiado":"📋 Copiar análise"}</button>
        </div>
      </div>

      {alertas?.length>0&&<div className="error-box" style={{marginBottom:16}}>{alertas.map((a,i)=><p key={i} style={{margin:i>0?"6px 0 0":0,fontSize:12}}>{a}</p>)}</div>}

      {/* Já concedidos */}
      {concedidos.length>0&&(

          {[

              <p style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",margin:0,whiteSpace:"pre-line"}}>{v}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Documentos */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {[{label:"📋 Análise técnica",texto:gerarTexto()},{label:"📝 Minuta de despacho",texto:gerarDespacho()}].map(({label,texto})=>(
          <div key={label} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

            <pre style={{fontSize:11.5,color:"var(--text-secondary)",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,maxHeight:300,overflowY:"auto"}}>{texto}</pre>
          </div>
        ))}
      </div>
    </div>
  );
}

  </script>

  // Etapa 1
  const [pdfContrato, setPdfContrato] = React.useState(null);

  const lerPdf = f => new Promise(r => { const rd=new FileReader(); rd.onload=e=>r(e.target.result.split(",")[1]); rd.readAsDataURL(f); });
  const set = (k,v) => setCampos(p=>({...p,[k]:v}));
  const pd = s => { if(!s)return null; if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split("/");return new Date(+y,+m-1,+d);}if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,d]=s.split("-");return new Date(+y,+m-1,+d);}return null;};
  const fd = d => d instanceof Date&&!isNaN(d)?d.toLocaleDateString("pt-BR"):d||"—";
  const addD = (d,n) => {const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const hoje = () => {const d=new Date();d.setHours(0,0,0,0);return d;};

  const handleContrato = async f => {
    if(!f||f.type!=="application/pdf")return;

    if(!f||f.type!=="application/pdf")return;

  const analisarContrato = async () => {
    if(!b64Contrato){setError("Carregue o contrato.");return;}
    setLoading(true);setError("");

      const prompt=`Analise este contrato administrativo. Retorne APENAS JSON puro sem markdown:
{"lei_aplicavel":"8666"|"14133"|"indeterminado","numero_contrato":"...","objeto":"até 10 palavras","contratada":"nome","data_abertura_pregao":"DD/MM/AAAA ou null","data_rapp":"DD/MM/AAAA ou null","tem_clausula_repactuacao":true|false,"clausula_repactuacao":"texto resumido ou null","categoria_profissional":"categoria ou null","tem_planilha_custos":true|false,"justificativa_lei":"...","observacoes":"alertas ou null"}`;

      const data=await resp.json();
      const c=JSON.parse((data.candidates?.[0]?.content?.parts?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      setContratoInfo(c);
      const ref=c.lei_aplicavel==="8666"?(c.data_abertura_pregao||""):(c.data_rapp||"");
      setCampos(p=>({...p,dataReferencia:ref,categoriaProfissional:c.categoria_profissional||""}));
      setEtapa(2);
    } catch(e){setError("Erro: "+e.message);}
    finally{setLoading(false);}
  };

  // Etapa 2 — analisa CCTs
  const analisarCcts = async () => {
    if(!apiKeySet)return;
        const promptCct=`Analise este instrumento normativo trabalhista (CCT/ACT/Acordo Coletivo/Lei do Piso/Dissídio). Retorne APENAS JSON puro sem markdown:
{"tipo":"CCT"|"ACT"|"Lei do Piso"|"Dissídio"|"outro","descricao":"identificação completa (ex: CCT 2024/2025 — Vigilantes SP)","data_publicacao":"DD/MM/AAAA ou null","data_vigencia_inicio":"DD/MM/AAAA ou null","data_base_categoria":"mês/ano ou null","categoria":"categoria profissional","sindicato_laboral":"nome do sindicato dos trabalhadores","sindicato_patronal":"nome ou null","piso_salarial":"valor se informado ou null","percentual_reajuste":"percentual se informado ou null","regra_retroatividade":"descrição da regra de retroatividade prevista no próprio documento, se houver (ex: 'efeitos retroativos a 01/01/2024 conforme cláusula 3ª') ou null","vigencia_fim":"DD/MM/AAAA ou null","observacoes":"alertas sobre cláusulas especiais, retroatividade diferente do padrão de 60 dias, ou outros pontos relevantes para a repactuação, ou null"}`;

    // Analisa CCT base se ainda não analisou
    if(b64CctBase&&!cctBaseInfo){
      setLoading(true);
      try {
        const resp = await callGemini({contents:[{parts:[{inline_data:{mime_type:"application/pdf",data:b64CctBase}},{text:promptCct}]}],generationConfig:{temperature:0.1,maxOutputTokens:512}});
        const d=await r.json();
        const c=JSON.parse((d.candidates?.[0]?.content?.parts?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
        setCctBaseInfo(c);
        setCampos(p=>({...p,descricaoCctBase:c.descricao||"",dataCctBase:c.data_publicacao||c.data_vigencia_inicio||"",categoriaProfissional:c.categoria||p.categoriaProfissional}));
      } finally{setLoading(false);}
    }

    // Analisa novas CCTs ainda não analisadas
    const atualizadas=[...novasCcts];
    for(let i=0;i<atualizadas.length;i++){
      if(!atualizadas[i].analisado){
        setLoading(true);
        try {
          const resp = await callGemini({contents:[{parts:[{inline_data:{mime_type:"application/pdf",data:atualizadas[i].b64}},{text:promptCct}]}],generationConfig:{temperature:0.1,maxOutputTokens:512}});
          const d=await r.json();
          const c=JSON.parse((d.candidates?.[0]?.content?.parts?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
          atualizadas[i]={...atualizadas[i],info:c,analisado:true};
        } finally{setLoading(false);}
      }
    }
    setNovasCcts(atualizadas);

    const dataPedido=campos.dataPedido?pd(campos.dataPedido):hoje();
    const h=hoje();

    // Calcula um direito para cada nova CCT posterior à data de referência
    const direitos=novasCcts.map((cct,i)=>{
      const info=cct.info||{};
      const dataCct=pd(info.data_publicacao||info.data_vigencia_inicio||"");
      if(!dataCct)return null;

      // Verifica retroatividade especial do documento
      const retroEspecial=info.regra_retroatividade||null;

        </React.Fragment>);
      })}
    </div>
  );

  if(etapa===3&&resultado)return<ResultadoRepactuacao resultado={resultado} onVoltar={()=>{setEtapa(2);setResultado(null);}}/>;

  return(

        <h2 style={{fontSize:18,fontWeight:900,color:"var(--text-primary)",margin:"0 0 6px",letterSpacing:"-.02em"}}>🔄 Repactuação Contratual</h2>

{error&&<div className="error-box" style={{marginBottom:16}}><p style={{margin:0}}>⚠ {error}</p></div>}

        </div>

          {pdfContrato?(<><div style={{fontSize:22}}>📄</div><p style={{fontSize:13,fontWeight:600,color:"var(--accent)",margin:"6px 0 2px"}}>{pdfContrato.name}</p><p className="text-muted" style={{fontSize:11}}>Clique para trocar</p></>):(<><div style={{fontSize:22}}>📂</div><p style={{fontSize:12,color:"var(--text-muted)",margin:"6px 0 0"}}>Arraste ou <strong style={{color:"var(--accent)"}}>clique</strong> para selecionar</p></>)}
        </div>

          </div>

      </div>

      {/* ETAPA 2 — CCTs + dados */}
      {etapa>=2&&contratoInfo&&(
        <div className="card" style={{marginBottom:20}}>
          <p className="card-title" style={{marginBottom:12}}>Etapa 2 — CCT/ACT e dados</p>

          <div style={{marginBottom:16,padding:"12px 16px",borderRadius:10,background:"var(--info-bg)",border:"1px solid var(--info-border)"}}>

function ResultadoRepactuacao({ resultado, onVoltar }) {
  const [copiado, setCopiado] = React.useState(false);
  const { lei, contrato, dataReferencia, tipoRef, descricaoCctBase, dataCctBase, categoriaProfissional, direitos, alertas } = resultado;
  const leiLabel = lei==="14133"?"Lei 14.133/2021":lei==="8666"?"Lei 8.666/1993":"Lei a confirmar";
  const hoje = new Date().toLocaleDateString("pt-BR");

  const gerarTexto = () => {
    let t=`ANÁLISE DE REPACTUAÇÃO CONTRATUAL\nGerado em: ${hoje}\n${"─".repeat(55)}\n\n`;
    t+=`CONTRATO: ${contrato?.numero_contrato||"—"}\nCONTRATADA: ${contrato?.contratada||"—"}\nOBJETO: ${contrato?.objeto||"—"}\nCATEGORIA: ${categoriaProfissional||"—"}\nLEI: ${leiLabel}\nDATA DE REFERÊNCIA (${tipoRef}): ${dataReferencia}\n`;
    t+=`CCT/ACT DE REFERÊNCIA: ${descricaoCctBase||"—"}${dataCctBase?` (${dataCctBase})`:""}\n\n`;
    t+=`${"─".repeat(55)}\nDIREITOS DE REPACTUAÇÃO: ${direitos.length}\n\n`;
    direitos.forEach((d,i)=>{
      t+=`${d.numero}º REPACTUAÇÃO — ${d.descricao}\n`;
      t+=`  Tipo: ${d.tipo}\n`;
      t+=`  Publicação: ${d.dataPublicacao}\n`;
      if(d.percentualReajuste) t+=`  Percentual: ${d.percentualReajuste}\n`;
      if(d.pisoSalarial) t+=`  Piso salarial: ${d.pisoSalarial}\n`;
      t+=`  Prazo retroatividade padrão (60d): ${d.prazoRetro}\n`;
      if(d.retroEspecial) t+=`  ⚠ Regra de retroatividade específica: ${d.retroEspecial}\n`;
      t+=`  Data do pedido: ${d.dataPedido}\n`;
      t+=`  Retroatividade: ${d.temRetro===true?"SIM":d.temRetro===false?"NÃO — prazo expirado":"—"}\n`;
      if(d.observacoes) t+=`  Obs: ${d.observacoes}\n`;
      t+="\n";
    });
    if(alertas?.length) t+=`${"─".repeat(55)}\nALERTAS:\n${alertas.map(a=>`• ${a}`).join("\n")}\n`;
    return t;
  };

  const gerarDespacho = () => {
    const d0=direitos[0];
    return `DESPACHO\n\nTrata-se de pedido de repactuação contratual apresentado pela empresa ${contrato?.contratada||"___"}, referente ao Contrato nº ${contrato?.numero_contrato||"___"}, cujo objeto é ${contrato?.objeto||"___"}${categoriaProfissional?`, com emprego de mão de obra da categoria de ${categoriaProfissional}`:""}, celebrado com fundamento na ${leiLabel}.\n\nO marco temporal para fins de repactuação é a data de ${tipoRef}, fixada em ${dataReferencia}, quando vigorava o instrumento normativo ${descricaoCctBase||"CCT/ACT de referência"}${dataCctBase?` (publicado em ${dataCctBase})`:""}, que estabelecia o piso salarial da categoria.\n\n${direitos.length===1?`A nova ${d0?.descricao||"CCT/ACT"} foi publicada em ${d0?.dataPublicacao}, gerando um direito de repactuação a partir desta data.`:`Foram identificados ${direitos.length} instrumentos normativos posteriores à data de referência, gerando ${direitos.length} direitos de repactuação:\n${direitos.map(d=>`${d.numero}º ${d.descricao} — publicado em ${d.dataPublicacao}`).join(";\n")}.`}\n\n${d0?`O prazo de 60 (sessenta) dias para formulação do pedido com efeito retroativo encerrou-se em ${d0.prazoRetro}. ${d0.temRetro===true?`O pedido foi apresentado em ${d0.dataPedido}, dentro do prazo, razão pela qual os efeitos financeiros retroagem à data de publicação da ${d0.descricao}.`:`O pedido foi apresentado em ${d0.dataPedido}, após o prazo de 60 dias (TCU, Acórdão 1.827/2018-Plenário), de modo que os efeitos serão contados a partir desta data.`}`:""}\n\n${direitos.some(d=>d.retroEspecial)?`ATENÇÃO — RETROATIVIDADE ESPECIAL:\n${direitos.filter(d=>d.retroEspecial).map(d=>`${d.descricao}: ${d.retroEspecial}`).join("\n")}\n\n`:""}${alertas?.length?`OBSERVAÇÕES:\n${alertas.join("\n")}\n\n`:""}Encaminhe-se para as providências cabíveis.\n\nRio de Janeiro, ${hoje}.`;
  };

  const copiar = t => navigator.clipboard.writeText(t).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2500);});

  return (
    <div className="module-container">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,gap:16,flexWrap:"wrap"}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:900,color:"var(--text-primary)",margin:"0 0 4px"}}>{direitos.length} direito{direitos.length!==1?"s":""} de repactuação identificado{direitos.length!==1?"s":""}</h2>
          <p style={{fontSize:13,color:"var(--text-muted)",margin:0}}>{contrato?.numero_contrato} · {leiLabel} · Ref: {dataReferencia}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onVoltar} className="btn-secondary" style={{fontSize:12}}>← Editar</button>
          <button onClick={()=>copiar(gerarTexto())} className="btn-primary" style={{fontSize:12}}>{copiado?"✓ Copiado":"📋 Copiar análise"}</button>
        </div>
      </div>

      {alertas?.length>0&&<div className="error-box" style={{marginBottom:16}}>{alertas.map((a,i)=><p key={i} style={{margin:i>0?"6px 0 0":0,fontSize:12}}>{a}</p>)}</div>}

      {/* Link o conciliador */}
      <div style={{padding:"10px 14px",background:"var(--surface-2)",border:"1px solid var(--card-border)",borderRadius:10,marginBottom:16,display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:16}}>🔗</span>
        <p style={{fontSize:12,color:"var(--text-muted)",margin:0}}>Consulte CCTs e ACTs: <strong style={{color:"var(--accent)"}}>oconciliador.com.br</strong> — verifique se há instrumentos normativos adicionais ainda não incluídos nesta análise.</p>
      </div>

      {/* Cards por direito */}
      {direitos.map((d,i)=>{
        const cor=d.temRetro===true?"var(--success-text)":d.temRetro===false?"var(--warning-text)":"var(--info-text)";
        const bg =d.temRetro===true?"var(--success-bg)":d.temRetro===false?"var(--warning-bg)":"var(--info-bg)";
        const bd =d.temRetro===true?"var(--success-border)":d.temRetro===false?"var(--warning-border)":"var(--info-border)";
        return(
          <div key={i} style={{background:"var(--card-bg)",border:"1px solid var(--card-border)",borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"var(--card-shadow)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",background:"var(--card-header-bg)",borderBottom:"1px solid var(--card-border)"}}>
              <div style={{width:32,height:32,borderRadius:8,background:bg,border:`1.5px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:cor,flexShrink:0}}>{d.numero}º</div>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:700,color:"var(--text-primary)",margin:0}}>{d.descricao}</p>
                <p style={{fontSize:11,color:"var(--text-muted)",margin:"2px 0 0"}}>{d.tipo} · Publicação: {d.dataPublicacao}</p>
              </div>
              <span style={{fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20,background:bg,color:cor,border:`1px solid ${bd}`,whiteSpace:"nowrap"}}>
                {d.temRetro===true?"✓ Com retro.":d.temRetro===false?"⚠ Sem retro.":"—"}
              </span>
            </div>
            <div style={{padding:"12px 18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                {[
                  {l:"Prazo retro. padrão (60d)",v:d.prazoRetro},
                  {l:"Data do pedido",v:d.dataPedido},
                  {l:d.percentualReajuste?"Percentual":d.pisoSalarial?"Piso salarial":"",v:d.percentualReajuste||d.pisoSalarial||"—"},
                ].filter(x=>x.l).map(({l,v})=>(
                  <div key={l} style={{background:"var(--surface-2)",borderRadius:8,padding:"8px 12px"}}>
                    <p style={{fontSize:10,color:"var(--text-subtle)",fontWeight:700,textTransform:"uppercase",letterSpacing:".04em",margin:"0 0 3px"}}>{l}</p>
                    <p style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",margin:0}}>{v}</p>
                  </div>
                ))}
              </div>

              {/* Retroatividade especial */}
              {d.retroEspecial&&(
                <div style={{padding:"10px 12px",background:"var(--warning-bg)",border:"1px solid var(--warning-border)",borderRadius:8,marginBottom:8}}>
                  <p style={{fontSize:11,fontWeight:700,color:"var(--warning-text)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".04em"}}>⚠ Regra de retroatividade prevista no documento</p>
                  <p style={{fontSize:12,color:"var(--warning-text)",margin:0}}>{d.retroEspecial}</p>
                </div>
              )}

              {d.observacoes&&(
                <div style={{padding:"8px 12px",background:"var(--surface-2)",borderRadius:8,borderLeft:"3px solid var(--text-subtle)",marginBottom:8}}>
                  <p style={{fontSize:12,color:"var(--text-muted)",margin:0,fontStyle:"italic"}}>{d.observacoes}</p>
                </div>
              )}

              <div style={{padding:"10px 14px",background:bg,border:`1px solid ${bd}`,borderRadius:8}}>
                <p style={{fontSize:11,fontWeight:700,color:cor,textTransform:"uppercase",letterSpacing:".04em",margin:"0 0 3px"}}>Efeitos financeiros</p>
                <p style={{fontSize:13,fontWeight:600,color:cor,margin:0}}>
                  {d.temRetro===true?`A partir de ${d.dataPublicacao} (retroativo)`:d.temRetro===false?`A partir de ${d.dataPedido} — prazo 60d expirou em ${d.prazoRetro}`:"—"}
                </p>
              </div>
            </div>
          </div>
        );
      })}

      {/* Textos gerados */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:8}}>
        {[{label:"📋 Análise técnica",texto:gerarTexto()},{label:"📝 Minuta de despacho",texto:gerarDespacho()}].map(({label,texto})=>(
          <div key={label} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{fontSize:13,fontWeight:700,color:"var(--text-primary)",margin:0}}>{label}</p>
              <button onClick={()=>copiar(texto)} className="btn-primary" style={{fontSize:12,padding:"6px 14px"}}>{copiado?"✓":"Copiar"}</button>
            </div>
            <pre style={{fontSize:11.5,color:"var(--text-secondary)",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,maxHeight:300,overflowY:"auto"}}>{texto}</pre>
          </div>
        ))}
      </div>
    </div>
  );
}
