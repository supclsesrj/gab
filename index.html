  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }
    async function checkPassword() {
      const input = document.getElementById("pwd-input").value;
      if ((await sha256(input)) === (await sha256("Jope1234"))) {
        sessionStorage.setItem("doccheck_auth","1");
        showApp();
      } else {
        const err = document.getElementById("login-error");
        err.textContent = "Senha incorreta. Tente novamente.";
        document.getElementById("pwd-input").value = "";
        document.getElementById("pwd-input").focus();
        setTimeout(() => err.textContent = "", 3000);
      }
    }
    function showApp() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("root").style.display = "block";
      document.dispatchEvent(new Event("doccheck:auth"));
    }
    // Aguarda todos os scripts Babel compilarem antes de montar
    if (sessionStorage.getItem("doccheck_auth") === "1") {
      window.addEventListener("load", () => {
        // Pequeno delay para garantir que o Babel finalizou todos os blocos
        setTimeout(showApp, 200);
      });
    }
  </script>

// Hook global de API key — lê do localStorage, sem UI própria
function useGeminiKey() {
  const [key] = React.useState(() => {
    try {
      const v = localStorage.getItem("doccheck_gemini_key");
      return v ? decodeURIComponent(escape(atob(v))) : "";
    } catch(e) { return ""; }
  });
  return key;
}

function saveGeminiKey(k) {
  try { localStorage.setItem("doccheck_gemini_key", btoa(unescape(encodeURIComponent(k)))); } catch(e) {}
}

function clearGeminiKey() {
  try { localStorage.removeItem("doccheck_gemini_key"); } catch(e) {}
}

  <script type="text/babel">






// DocCheck — Gemini edition (versão CDN, sem imports)
const { useState, useCallback, useRef } = React;

const GEMINI_MODEL = "gemini-2.0-flash";

const PRESET_CHECKLISTS = {
  "Processo Licitatório": [
    "Termo de Referência ou Projeto Básico",
    "Edital de licitação",
    "Publicação no DOU ou diário oficial",
    "Ata de sessão pública",
    "Proposta vencedora",
    "Habilitação jurídica da empresa contratada",
    "Certidão de regularidade fiscal (CND Federal)",
    "Certidão de regularidade FGTS",
    "Certidão de regularidade trabalhista (CNDT)",
    "Minuta de contrato ou contrato assinado",
    "Parecer jurídico",
    "Nota de empenho",
  ],
  "Contrato Administrativo": [
    "Qualificação completa das partes",
    "Objeto contratual definido",
    "Valor e forma de pagamento",
    "Prazo de vigência",
    "Dotação orçamentária",
    "Garantia contratual",
    "Obrigações da contratada",
    "Obrigações da contratante",
    "Sanções administrativas",
    "Hipóteses de rescisão",
    "Foro competente",
    "Assinaturas e testemunhas",
  ],
  "Instrução Processual": [
    "Requerimento ou ofício de abertura",
    "Identificação do requerente",
    "Documentos de identificação (CPF/CNPJ)",
    "Procuração ou representação legal",
    "Documentação técnica pertinente",
    "Manifestação da área competente",
    "Parecer técnico",
    "Parecer jurídico",
    "Decisão administrativa",
    "Notificação ao interessado",
  ],
  "Personalizado": [],
};

const StatusBadge = ({ status }) => {
  const cfg = {
    presente:   { bg: "#ECFDF5", color: "#065F46", dot: "#10B981", label: "Presente" },
    ausente:    { bg: "#FEF2F2", color: "#991B1B", dot: "#EF4444", label: "Ausente" },
    parcial:    { bg: "#FFFBEB", color: "#92400E", dot: "#F59E0B", label: "Parcial" },
    analisando: { bg: "#EFF6FF", color: "#1E40AF", dot: "#3B82F6", label: "Analisando…" },
  }[status] || { bg: "#F3F4F6", color: "var(--text-secondary)", dot: "#9CA3AF", label: "Pendente" };

  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: cfg.bg, color: cfg.color,
      padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600,
    }}>
      <span style={{ width: 7, height: 7, borderRadius: "50%", background: cfg.dot, flexShrink: 0 }} />
      {cfg.label}
    </span>
  );
};

const ChecklistItem = ({ item, index }) => {
  const [open, setOpen] = useState(false);
  return (
    <div style={{
      border: "1px solid var(--card-border)", borderRadius: 8, overflow: "hidden",
      marginBottom: 8, background: "var(--card-bg)",
    }}>
      <div
        onClick={() => item.trecho && setOpen(o => !o)}
        style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "12px 16px", cursor: item.trecho ? "pointer" : "default",
        }}
      >
        <span style={{ color: "var(--text-subtle)", fontSize: 12, minWidth: 20, textAlign: "right" }}>{index + 1}</span>
        <span style={{ flex: 1, fontSize: 14, color: "var(--text-primary)", fontWeight: 500 }}>{item.texto}</span>
        <StatusBadge status={item.status} />
        {item.trecho && (
          <span style={{ color: "var(--text-muted)", fontSize: 12, marginLeft: 4 }}>{open ? "▲" : "▼"}</span>
        )}
      </div>
      {open && item.trecho && (
        <div style={{ background: "var(--surface-2)", borderTop: "1px solid #E5E7EB", padding: "12px 16px 12px 48px" }}>
          <p style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 4, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".05em" }}>
            Trecho identificado
          </p>
          <p style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>
            "{item.trecho}"
          </p>
          {item.observacao && (
            <p style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 8, marginBottom: 0 }}>
              ⚠ {item.observacao}
            </p>
          )}
        </div>
      )}
      {!open && item.status === "ausente" && item.observacao && (
        <div style={{ background: "#FEF2F2", borderTop: "1px solid #FEE2E2", padding: "8px 16px 8px 48px" }}>
          <p style={{ fontSize: 12, color: "#991B1B", margin: 0 }}>⚠ {item.observacao}</p>
        </div>
      )}
    </div>
  );
};

function App() {
  const apiKey = useGeminiKey();
  const apiKeySet = apiKey.length > 10;
  const [presetKey, setPresetKey] = useState("Processo Licitatório");
  const [customItems, setCustomItems] = useState([]);
  const [newItem, setNewItem] = useState("");
  const [pdfFile, setPdfFile] = useState(null);
  const [pdfBase64, setPdfBase64] = useState(null);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [summary, setSummary] = useState(null);
  const fileRef = useRef();

  const activeItems = presetKey === "Personalizado"
    ? customItems
    : [...PRESET_CHECKLISTS[presetKey], ...customItems];

  const handleFile = (file) => {
    if (!file || file.type !== "application/pdf") {
      setError("Por favor, selecione um arquivo PDF.");
      return;
    }
    setPdfFile(file);
    setError("");
    setResults([]);
    setSummary(null);
    const reader = new FileReader();
    reader.onload = (e) => setPdfBase64(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  };

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
  }, []);

  const addCustomItem = () => {
    if (newItem.trim()) {
      setCustomItems(p => [...p, newItem.trim()]);
      setNewItem("");
    }
  };

  const removeCustomItem = (i) => setCustomItems(p => p.filter((_, idx) => idx !== i));

  const runAnalysis = async () => {
    if (!pdfBase64) { setError("Carregue um PDF primeiro."); return; }
    if (activeItems.length === 0) { setError("Adicione ao menos um item ao checklist."); return; }
    if (!apiKey) { setError("Informe sua chave de API do Gemini."); return; }

    setLoading(true);
    setError("");
    setResults(activeItems.map(t => ({ texto: t, status: "analisando" })));
    setSummary(null);

    const prompt = `Você é um assistente jurídico especializado em análise documental brasileira. Analise o documento PDF fornecido e verifique cada item do checklist abaixo.

Para cada item, retorne um objeto JSON com os campos:
- "status": "presente", "ausente" ou "parcial"
- "trecho": trecho literal do documento que evidencia o item (máximo 200 caracteres), ou null se ausente
- "observacao": observação relevante sobre o item, se houver (ou null)

Responda APENAS com um array JSON puro, sem texto antes ou depois, sem blocos de código, sem markdown.

CHECKLIST:
${activeItems.map((t, i) => `${i + 1}. ${t}`).join("\n")}

Critérios:
- "presente" = item claramente identificado no documento
- "parcial" = existe mas de forma incompleta, ambígua ou sem os elementos essenciais
- "ausente" = não encontrado no documento

O array deve ter exatamente ${activeItems.length} objetos, na mesma ordem do checklist.`;

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;

      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: "application/pdf", data: pdfBase64 } },
              { text: prompt },
            ],
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 },
        }),
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error?.message || `Erro ${resp.status}`);
      }

      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      if (!Array.isArray(parsed)) throw new Error("Resposta inesperada do modelo.");

      const mapped = activeItems.map((texto, i) => ({
        texto,
        status: parsed[i]?.status || "ausente",
        trecho: parsed[i]?.trecho || null,

function formatCNPJ(v) {
  v = v.replace(/\D/g, "").slice(0, 14);
  if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/, "$1.$2.$3/$4-$5");
  else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/, "$1.$2.$3/$4");
  else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{0,3})/, "$1.$2.$3");
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,3})/, "$1.$2");
  return v;
}

function Badge({ color, children }) {
  const colors = {
    red:    { bg:"#FEF2F2", text:"#991B1B", border:"#FEE2E2" },
    green:  { bg:"#ECFDF5", text:"#065F46", border:"#D1FAE5" },
    yellow: { bg:"#FFFBEB", text:"#92400E", border:"#FDE68A" },

    gray:   { bg:"#F3F4F6", text:"#374151", border:"#E5E7EB" },
    orange: { bg:"#FFF7ED", text:"#9A3412", border:"#FED7AA" },
  }[color] || { bg:"#F3F4F6", text:"#374151", border:"#E5E7EB" };
  return (
    <span style={{
      display:"inline-block", padding:"2px 10px", borderRadius:20,
      fontSize:11, fontWeight:700,
      background:colors.bg, color:colors.text, border:`1px solid ${colors.border}`
    }}>{children}</span>
  );
}

function InfoRow({ label, value, mono }) {

  return (
    <div style={{ display:"flex", gap:12, padding:"8px 0", borderBottom:"1px solid var(--divider)", alignItems:"flex-start" }}>
      <span style={{ fontSize:12, color:"var(--text-muted)", minWidth:160, flexShrink:0 }}>{label}</span>

// Barra de progresso
function ProgressBar({ steps, current, label }) {

        }} />

        {current} de {steps} empresa{steps !== 1 ? "s" : ""} consultada{steps !== 1 ? "s" : ""}
      </p>

// Gera e baixa xlsx sem biblioteca externa (formato SYLK/CSV que Excel abre nativamente)
function downloadCSV(empresas) {
  const rows = [["Empresa","CNPJ","Situação","Sócio","Qualificação","Aparece em outras empresas"]];
  const socios_count = {};
  empresas.forEach(emp => {
    (emp.qsa || []).forEach(s => {
      socios_count[s.nome] = (socios_count[s.nome] || 0) + 1;
    });
  });
  empresas.forEach(emp => {
    if (!emp.qsa || emp.qsa.length === 0) {
      rows.push([emp.nome || emp.cnpj, emp.cnpj, emp.situacao || "—", "Sem sócios", "", ""]);
    } else {
      emp.qsa.forEach(s => {
        rows.push([
          emp.nome || emp.cnpj,
          emp.cnpj,
          emp.situacao || "—",
          s.nome,
          s.qual,
          socios_count[s.nome] > 1 ? "SIM ⚠" : "Não"
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "background_check_rapp.csv"; a.click();
  URL.revokeObjectURL(url);
}

// MÓDULO — BACKGROUND CHECK (CNPJ SIMPLES)
// ─────────────────────────────────────────────
function BackgroundCheck() {
  const [cnpj, setCnpj] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");
  const [dadosCnpj, setDadosCnpj] = React.useState(null);

  const buscar = async () => {
    const raw = cnpj.replace(/\D/g, "");
    if (raw.length !== 14) { setError("CNPJ deve ter 14 dígitos."); return; }
    setLoading(true); setError(""); setDadosCnpj(null);
    try {
      setStep("Consultando Receita Federal…");
      const r1 = await fetch(`https://receitaws.com.br/v1/cnpj/${raw}`);
      if (!r1.ok) throw new Error(`ReceitaWS: erro ${r1.status}`);
      const d1 = await r1.json();
      if (d1.status === "ERROR") throw new Error(d1.message || "CNPJ não encontrado.");
      setDadosCnpj(d1);
    } catch(e) {
      setError("Erro: " + e.message);
    } finally {
      setLoading(false); setStep("");

  };

  return (
    <div style={{ maxWidth:900, margin:"0 auto", padding:"32px 24px" }}>

        <div style={{ display:"flex", gap:8 }}>

          <button onClick={buscar} disabled={loading}
            style={{ padding:"10px 28px", background: loading ? "#E2E8F0" : "#0F172A", color: loading ? "#9CA3AF" : "#fff", border:"none", borderRadius:8, fontSize:14, fontWeight:700, cursor: loading ? "not-allowed" : "pointer" }}>
            {loading ? "Consultando…" : "Consultar"}
          </button>
        </div>
        {step && <p style={{ marginTop:10, fontSize:12, color:"var(--text-muted)" }}>⏳ {step}</p>}
        {error && <p style={{ marginTop:10, fontSize:12, color:"#EF4444" }}>⚠ {error}</p>}
      </div>

      {dadosCnpj && (
        <div style={{ background:"var(--card-bg)", border:"1px solid var(--card-border)", borderRadius:12, padding:24, marginBottom:20 }}>
          <p style={{ fontSize:13, fontWeight:700, color:"var(--text-primary)", marginBottom:16 }}>📋 Dados Cadastrais</p>
          <InfoRow label="Razão Social" value={dadosCnpj.nome} />
          <InfoRow label="CNPJ" value={dadosCnpj.cnpj} mono />
          <InfoRow label="Situação" value={dadosCnpj.situacao} />
          <InfoRow label="Abertura" value={dadosCnpj.abertura} />
          <InfoRow label="Natureza Jurídica" value={dadosCnpj.natureza_juridica} />
          <InfoRow label="Porte" value={dadosCnpj.porte} />
          <InfoRow label="Capital Social" value={dadosCnpj.capital_social ? `R$ ${Number(dadosCnpj.capital_social).toLocaleString("pt-BR")}` : null} />
          <InfoRow label="CNAE Principal" value={dadosCnpj.atividade_principal?.[0] ? `${dadosCnpj.atividade_principal[0].code} — ${dadosCnpj.atividade_principal[0].text}` : null} />
          <InfoRow label="Endereço" value={[dadosCnpj.logradouro, dadosCnpj.numero, dadosCnpj.bairro, dadosCnpj.municipio, dadosCnpj.uf].filter(Boolean).join(", ")} />

            <div style={{ marginTop:16 }}>

// MÓDULO — ANÁLISE DE RAPP (CRUZAMENTO DE SÓCIOS)

function RappCheck() {
  const [apiKey, setApiKey] = React.useState(() => { try { const v = localStorage.getItem("doccheck_gemini_key"); return v ? decodeURIComponent(escape(atob(v))) : ""; } catch(e) { return ""; } });
  const [apiKeySet, setApiKeySet] = React.useState(() => { try { const v = localStorage.getItem("doccheck_gemini_key"); return v ? atob(v).length > 10 : false; } catch(e) { return false; } });
  const [pdfFile, setPdfFile] = React.useState(null);
  const [pdfBase64, setPdfBase64] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");
  const [progresso, setProgresso] = React.useState({ total:0, atual:0, label:"" });
  const [empresas, setEmpresas] = React.useState([]);
  const [conluios, setConluios] = React.useState([]);
  const fileRef = React.useRef();

  const handleFile = (file) => {
    if (!file || file.type !== "application/pdf") { setError("Selecione um arquivo PDF."); return; }
    setPdfFile(file); setError(""); setEmpresas([]); setConluios([]);
    const reader = new FileReader();
    reader.onload = (e) => setPdfBase64(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  };

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  const consultarEmpresa = async (cnpj, nome) => {
    const raw = cnpj.replace(/\D/g, "");
    try {
      const r = await fetch(`https://receitaws.com.br/v1/cnpj/${raw}`);
      if (!r.ok) return { cnpj, nome, situacao:"Erro", qsa:[], erro:`HTTP ${r.status}` };
      const d = await r.json();
      if (d.status === "ERROR") return { cnpj, nome: nome || cnpj, situacao:"Não encontrado", qsa:[], erro: d.message };
      return {
        cnpj: d.cnpj || cnpj,
        nome: d.nome || nome,
        situacao: d.situacao,
        abertura: d.abertura,
        porte: d.porte,
        qsa: d.qsa || [],
      };
    } catch(e) {
      return { cnpj, nome, situacao:"Erro", qsa:[], erro: e.message };
    }
  };

  const analisar = async () => {
    if (!pdfBase64) { setError("Carregue o PDF do RAPP primeiro."); return; }
    if (!apiKeySet) { setError("Configure a chave da API Gemini."); return; }
    setLoading(true); setError(""); setEmpresas([]); setConluios([]);
    setProgresso({ total:0, atual:0, label:"Extraindo empresas do RAPP com IA…" });

    try {
      // ETAPA 1 — Gemini extrai CNPJs e nomes do PDF
      const prompt = `Analise este documento PDF (RAPP — Relatório de Análise de Preços e Proposta ou similar) e extraia TODAS as empresas mencionadas como participantes, licitantes ou proponentes.

Para cada empresa, retorne um objeto com:
- "cnpj": CNPJ no formato XX.XXX.XXX/XXXX-XX (ou null se não encontrado)
- "nome": razão social ou nome da empresa

Responda APENAS com um array JSON puro, sem markdown, sem texto antes ou depois.
Exemplo: [{"cnpj":"12.345.678/0001-90","nome":"Empresa ABC Ltda"},...]

Se não encontrar nenhuma empresa, retorne [].`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
      const r = await fetch(url, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{ parts:[
            { inline_data:{ mime_type:"application/pdf", data:pdfBase64 } },
            { text:prompt }
          ]}],
          generationConfig:{ temperature:0.1, maxOutputTokens:4096 }
        })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `Gemini erro ${r.status}`); }
      const gdata = await r.json();
      const raw = gdata.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      const clean = raw.replace(/```json|```/g,"").trim();
      let lista = JSON.parse(clean);
      if (!Array.isArray(lista) || lista.length === 0) throw new Error("Nenhuma empresa encontrada no PDF. Verifique se é um RAPP válido.");

      // Deduplica por CNPJ
      const vistos = new Set();
      lista = lista.filter(e => {
        const key = e.cnpj ? e.cnpj.replace(/\D/g,"") : e.nome;
        if (vistos.has(key)) return false;
        vistos.add(key); return true;
      });

      setProgresso({ total: lista.length, atual:0, label:"Consultando Receita Federal…" });

      // ETAPA 2 — Consulta Receita para cada empresa (com delay para respeitar rate limit)
      const resultados = [];
      for (let i = 0; i < lista.length; i++) {
        const emp = lista[i];
        setProgresso({ total: lista.length, atual: i, label:`Consultando: ${emp.nome || emp.cnpj}…` });
        if (emp.cnpj) {
          const dados = await consultarEmpresa(emp.cnpj, emp.nome);
          resultados.push(dados);
        } else {
          resultados.push({ cnpj:"—", nome: emp.nome, situacao:"CNPJ não identificado", qsa:[] });
        }
        if (i < lista.length - 1) await sleep(1200); // Rate limit ReceitaWS: ~1 req/seg
      }

      setProgresso({ total: lista.length, atual: lista.length, label:"Cruzando sócios…" });
      setEmpresas(resultados);

      // ETAPA 3 — Cruzamento de sócios
      const socioMap = {}; // nome_socio -> [empresas]
      resultados.forEach(emp => {
        (emp.qsa || []).forEach(s => {
          if (!socioMap[s.nome]) socioMap[s.nome] = [];
          socioMap[s.nome].push({ empresa: emp.nome, cnpj: emp.cnpj, qual: s.qual });
        });
      });

      const alertas = Object.entries(socioMap)
        .filter(([, emps]) => emps.length > 1)
        .map(([socio, emps]) => ({ socio, empresas: emps }))
        .sort((a,b) => b.empresas.length - a.empresas.length);

      setConluios(alertas);
      setProgresso({ total: lista.length, atual: lista.length, label:"Análise concluída!" });

    } catch(e) {
      setError("Erro: " + e.message);
      setProgresso({ total:0, atual:0, label:"" });
    } finally {
      setLoading(false);
    }
  };

  const temResultado = empresas.length > 0;

            <button onClick={() => { if (apiKey.length > 10) { try { localStorage.setItem("doccheck_gemini_key", btoa(unescape(encodeURIComponent(apiKey)))); } catch(x){} setApiKeySet(true); } }}

          <span style={{ fontSize:12, color:"#10B981" }}>✓ Chave Gemini configurada</span>
          <button onClick={() => { try { localStorage.removeItem("doccheck_gemini_key"); } catch(x){} setApiKeySet(false); setApiKey(""); }}
            style={{ fontSize:12, color:"var(--text-muted)", background:"none", border:"none", cursor:"pointer", textDecoration:"underline" }}>

      {/* Upload + Ação */}
      <div style={{ background:"var(--card-bg)", border:"1px solid var(--card-border)", borderRadius:12, padding:24, marginBottom:20 }}>
        <p style={{ fontSize:14, fontWeight:700, color:"var(--text-primary)", marginBottom:4 }}>Análise de RAPP — Cruzamento de Sócios</p>
        <p style={{ fontSize:12, color:"var(--text-muted)", marginBottom:16 }}>

        </p>

        <div onClick={() => fileRef.current.click()}
          onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}

        {/* Barra de progresso */}
        {loading && progresso.total > 0 && (

  <script type="text/babel">





// ─────────────────────────────────────────────
// MÓDULO — CONTROLE DE VENCIMENTOS
// ─────────────────────────────────────────────

const GITHUB_BASE = "https://raw.githubusercontent.com/supclsesrj/gab/main/";

function parseData(val) {
  if (!val) return null;
  // Suporta DD/MM/YYYY, YYYY-MM-DD, timestamps Excel (número)
  if (typeof val === "number") {
    // Serial date do Excel
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  const s = String(val).trim();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [dd, mm, yyyy] = s.split("/");
    return new Date(`${yyyy}-${mm}-${dd}`);
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  return null;
}

function fmtData(d) {
  if (!d) return "—";
  return d.toLocaleDateString("pt-BR");
}

function fmtValor(v) {
  if (!v && v !== 0) return "—";
  const n = parseFloat(String(v).replace(/[^\d,.-]/g,"").replace(",","."));
  if (isNaN(n)) return String(v);
  return n.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}

function diasAteVencer(d) {
  if (!d) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.ceil((d - hoje) / 86400000);
  return diff;
}

function statusUrgencia(dias) {
  if (dias === null) return { cor:"gray", label:"Sem data" };
  if (dias < 0)   return { cor:"red",    label:"Vencido" };
  if (dias <= 30)  return { cor:"red",    label:`${dias}d — URGENTE` };
  if (dias <= 60)  return { cor:"orange", label:`${dias}d — Atenção` };
  return { cor:"green", label:`${dias}d` };
}

function mesesAlvo() {
  const hoje = new Date();
  return [0,1,2].map(i => {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
    return { ano: d.getFullYear(), mes: d.getMonth() };
  });
}

function nomeMes(mes, ano) {
  return new Date(ano, mes, 1).toLocaleDateString("pt-BR", { month:"long", year:"numeric" });
}

function parseArquivo(nome, conteudo, tipo) {
  // tipo: "json" ou "xlsx_csv" (csv gerado do xlsx via SheetJS)
  try {
    if (tipo === "json") {
      const data = JSON.parse(conteudo);
      return Array.isArray(data) ? data : [];
    }
    // CSV simples
    const linhas = conteudo.trim().split("\n");
    const headers = linhas[0].split(",").map(h => h.replace(/"/g,"").trim().toLowerCase());
    return linhas.slice(1).map(linha => {
      const vals = linha.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g,"").trim(); });
      return obj;
    }).filter(r => Object.values(r).some(v => v));
  } catch(e) { return []; }
}

function normalizarRegistro(r, tipo) {
  // Normaliza variações de nome de coluna
  const get = (...keys) => {
    for (const k of keys) {
      const found = Object.keys(r).find(rk => rk.toLowerCase().includes(k.toLowerCase()));
      if (found && r[found]) return r[found];
    }
    return "";
  };
  return {
    sei:        get("sei", "processo"),
    contrato:   get("contrato", "arp", "número"),
    empresa:    get("empresa", "fornecedor", "contratad"),
    objeto:     get("objeto", "serviço", "descri"),
    valor:      get("valor"),
    vencimento: parseData(get("vencimento", "vigência", "término", "fim")),
    tipo,
    // campos manuais (preenchidos na etapa 2)
    vigMax:     "",
    seiSubst:   "",
    andamento:  "",
    status:     "prorrogação",
  };
}

// Etapa 2 — card editável
function CardEdicao({ reg, idx, onChange }) {
  const dias = diasAteVencer(reg.vencimento);
  const urg = statusUrgencia(dias);
  const corBorda = { red:"#FEE2E2", orange:"#FED7AA", green:"#D1FAE5", gray:"#E5E7EB" }[urg.cor];
  const corBg    = { red:"#FEF2F2", orange:"#FFF7ED", green:"#F0FDF4", gray:"#F9FAFB" }[urg.cor];

  return (
    <div style={{ border:`1px solid ${corBorda}`, background:corBg, borderRadius:10, padding:"14px 16px", marginBottom:12 }}>
      {/* Cabeçalho */}
      <div style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ flex:1 }}>
          <p style={{ fontSize:13, fontWeight:700, color:"#111827", margin:"0 0 2px" }}>{reg.empresa || "—"}</p>
          <p style={{ fontSize:11, color:"#6B7280", margin:0, fontFamily:"monospace" }}>
            SEI: {reg.sei || "—"} · {reg.tipo === "servicos" ? "Serviço" : "Aquisição"} · Vence: <strong>{fmtData(reg.vencimento)}</strong>
          </p>
          <p style={{ fontSize:11, color:"#374151", margin:"4px 0 0" }}>{reg.objeto}</p>
        </div>
        <span style={{
          fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20,
          background: { red:"#FEE2E2", orange:"#FED7AA", green:"#D1FAE5", gray:"#E5E7EB" }[urg.cor],
          color:      { red:"#991B1B", orange:"#9A3412", green:"#065F46", gray:"#374151" }[urg.cor],
        }}>{urg.label}</span>
      </div>

      {/* Campos manuais */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        <div>
          <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:3 }}>Vigência Máxima</label>
          <input value={reg.vigMax} onChange={e => onChange(idx,"vigMax",e.target.value)}
            placeholder="Ex: 60 meses / atingida / —"
            style={{ width:"100%", padding:"7px 10px", border:"1px solid #D1D5DB", borderRadius:6, fontSize:12, outline:"none" }} />
        </div>
        <div>
          <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:3 }}>Status</label>
          <select value={reg.status} onChange={e => onChange(idx,"status",e.target.value)}
            style={{ width:"100%", padding:"7px 10px", border:"1px solid #D1D5DB", borderRadius:6, fontSize:12, outline:"none", background:"#fff" }}>
            <option value="prorrogação">Em prorrogação</option>
            <option value="substituto">Processo substituto</option>
            <option value="encerramento">Encerramento</option>
            <option value="renovacao">Renovação ARP</option>
          </select>
        </div>
        <div>
          <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:3 }}>SEI Processo Substituto</label>
          <input value={reg.seiSubst} onChange={e => onChange(idx,"seiSubst",e.target.value)}
            placeholder="Ex: 123456/2025"
            style={{ width:"100%", padding:"7px 10px", border:"1px solid #D1D5DB", borderRadius:6, fontSize:12, outline:"none" }} />
        </div>
        <div>
          <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:3 }}>Andamento</label>
          <input value={reg.andamento} onChange={e => onChange(idx,"andamento",e.target.value)}
            placeholder="Ex: Em elaboração de TR / Aguard. SUBJUR"
            style={{ width:"100%", padding:"7px 10px", border:"1px solid #D1D5DB", borderRadius:6, fontSize:12, outline:"none" }} />
        </div>
      </div>
    </div>
  );
}

// Gera texto WhatsApp
function gerarMensagem(registros) {
  const meses = mesesAlvo();
  const hoje = new Date();
  const mesNomeAtual = hoje.toLocaleDateString("pt-BR", { month:"long" });

  let msg = `📋 *CONTROLE DE VENCIMENTOS*\n`;
  msg += `_${mesNomeAtual.charAt(0).toUpperCase() + mesNomeAtual.slice(1)} de ${hoje.getFullYear()} e próximos 2 meses_\n`;
  msg += `_Gerado em ${hoje.toLocaleDateString("pt-BR")}_\n\n`;

  meses.forEach(({ mes, ano }) => {
    const doMes = registros.filter(r => {
      if (!r.vencimento) return false;
      return r.vencimento.getMonth() === mes && r.vencimento.getFullYear() === ano;
    });
    if (doMes.length === 0) return;

    msg += `━━━━━━━━━━━━━━━━━━━\n`;
    msg += `📅 *${nomeMes(mes, ano).toUpperCase()}*\n`;
    msg += `━━━━━━━━━━━━━━━━━━━\n\n`;

    doMes.sort((a,b) => a.vencimento - b.vencimento).forEach((r, i) => {
      const dias = diasAteVencer(r.vencimento);
      const urgIcon = dias < 0 ? "🔴" : dias <= 30 ? "🔴" : dias <= 60 ? "🟡" : "🟢";
      const tipoLabel = r.tipo === "servicos" ? "🔧 Serviço" : "📦 Aquisição";

      // Resumo do objeto (5 palavras)

      msg += `• Valor: ${fmtValor(r.valor)}\n`;
      msg += `• Vencimento: ${fmtData(r.vencimento)}${dias !== null ? ` (${dias < 0 ? "vencido há " + Math.abs(dias) + "d" : "em " + dias + "d"})` : ""}\n`;

      if (r.vigMax) msg += `• Vig. Máxima: ${r.vigMax}\n`;

      // Status
      const statusLabel = {
        "prorrogação": "Em prorrogação",
        "substituto":  "Processo substituto",
        "encerramento":"Encerramento",
        "renovacao":   "Renovação ARP",
      }[r.status] || r.status;

      msg += `• Status: *${statusLabel}*`;
      if (r.seiSubst) msg += ` — SEI ${r.seiSubst}`;
      if (r.andamento) msg += `\n  ↳ ${r.andamento}`;
      msg += "\n\n";
    });
  });

  // Aviso SUBJUR
  const urgentes = registros.filter(r => {
    const d = diasAteVencer(r.vencimento);
    return d !== null && d >= 0 && d <= 30;
  });
  if (urgentes.length > 0) {
    msg += `⚠️ *ATENÇÃO — ENVIO SUBJUR*\n`;
    msg += `${urgentes.length} processo${urgentes.length > 1 ? "s" : ""} com vencimento em até 30 dias:\n`;
    urgentes.forEach(r => { msg += `• ${r.empresa} — vence ${fmtData(r.vencimento)}\n`; });
  }

  return msg.trim();
}

        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: "DOCUMENTO 1 — VERSÃO ANTERIOR:" },
              { inline_data: { mime_type: "application/pdf", data: b64Antes } },
              { text: "DOCUMENTO 2 — VERSÃO ATUAL:" },
              { inline_data: { mime_type: "application/pdf", data: b64Depois } },
              { text: prompt },
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
        })
      });

      if (!resp.ok) {
        const e = await resp.json();
        throw new Error(e.error?.message || `Gemini erro ${resp.status}`);
      }

      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (!parsed.clausulas) throw new Error("Resposta inesperada do modelo.");
      setResultado(parsed);
    } catch(e) {
      setError("Erro na análise: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const corTipo = {
    alterada: { bg:"#FFFBEB", border:"#FDE68A", badge:"#92400E", badgeBg:"#FEF3C7", icon:"✏️", label:"Alterada" },
    incluida: { bg:"#F0FDF4", border:"#BBF7D0", badge:"#065F46", badgeBg:"#DCFCE7", icon:"➕", label:"Incluída" },
    removida: { bg:"#FEF2F2", border:"#FEE2E2", badge:"#991B1B", badgeBg:"#FEE2E2", icon:"➖", label:"Removida" },
  };

  const clausulasFiltradas = resultado?.clausulas?.filter(c => {
    if (filtro === "todos") return true;
    if (filtro === "critico" || filtro === "relevante") return c.impacto_nivel === filtro;
    return c.tipo === filtro;
  }) || [];

  const confirmarChave = () => {
    if (apiKey.length > 10) {
      try { localStorage.setItem("doccheck_gemini_key", btoa(unescape(encodeURIComponent(apiKey)))); } catch(x){}
      setApiKeySet(true);
    }
  };

  return (
    <div style={{ maxWidth: 960, margin: "0 auto", padding: "32px 24px" }}>

      {/* Upload dos dois PDFs */}
      <div style={{ background:"var(--card-bg)", border:"1px solid var(--card-border)", borderRadius:12, padding:24, marginBottom:20 }}>
        <p style={{ fontSize:14, fontWeight:700, color:"var(--text-primary)", marginBottom:4 }}>Comparador de Termo de Referência</p>
        <p style={{ fontSize:12, color:"var(--text-muted)", marginBottom:20 }}>
          Carregue as duas versões do TR em PDF. O sistema identifica cláusulas alteradas, incluídas e removidas.
        </p>

        <div style={{ display:"flex", gap:16, marginBottom:20 }}>
          <DropZone label="Versão anterior do TR" versao="Antes" file={pdfAntes} refEl={refAntes}
            onFile={f => lerPdf(f, setPdfAntes, setB64Antes)} />
          <div style={{ display:"flex", alignItems:"center", color:"var(--text-subtle)", fontSize:20, flexShrink:0 }}>→</div>
          <DropZone label="Versão atual / nova do TR" versao="Depois" file={pdfDepois} refEl={refDepois}
            onFile={f => lerPdf(f, setPdfDepois, setB64Depois)} />
        </div>

        {error && (
          <div style={{ background:"#FEF2F2", border:"1px solid #FEE2E2", borderRadius:8, padding:"12px 16px", marginBottom:16 }}>
            <p style={{ fontSize:13, color:"#991B1B", margin:0 }}>⚠ {error}</p>
          </div>
        )}

        <button onClick={analisar} disabled={loading || !b64Antes || !b64Depois || !apiKeySet}
          style={{
            width:"100%", padding:"13px 24px",
            background: loading || !b64Antes || !b64Depois || !apiKeySet ? "#E2E8F0" : "#0F172A",
            color: loading || !b64Antes || !b64Depois || !apiKeySet ? "#9CA3AF" : "#fff",
            border:"none", borderRadius:10, fontSize:14, fontWeight:700,
            cursor: loading || !b64Antes || !b64Depois || !apiKeySet ? "not-allowed" : "pointer",
          }}>
          {loading ? "Comparando documentos…" : "Comparar TRs"}
        </button>

        {loading && (
          <p style={{ fontSize:12, color:"var(--text-muted)", textAlign:"center", marginTop:12 }}>
            ⏳ Analisando os dois documentos com IA — pode levar alguns segundos…
          </p>
        )}
      </div>

      {/* Resultado */}
      {resultado && (
        <>
          {/* Resumo executivo */}
          {(() => {
            const alertaCfg = {
              critico:   { bg:"#FEF2F2", border:"#FEE2E2", titleColor:"#991B1B", textColor:"#7F1D1D", icon:"🚨", label:"ATENÇÃO — Alterações com impacto crítico identificadas" },
              relevante: { bg:"#FFFBEB", border:"#FDE68A", titleColor:"#92400E", textColor:"#78350F", icon:"⚠️", label:"Alterações relevantes identificadas — revisão recomendada" },
              baixo:     { bg:"#EFF6FF", border:"#BFDBFE", titleColor:"#1E40AF", textColor:"#1E3A8A", icon:"📝", label:"Resumo executivo" },
            }[resultado.alerta_geral] || { bg:"#EFF6FF", border:"#BFDBFE", titleColor:"#1E40AF", textColor:"#1E3A8A", icon:"📝", label:"Resumo executivo" };
            return (
              <div style={{ background:alertaCfg.bg, border:`1px solid ${alertaCfg.border}`, borderRadius:12, padding:20, marginBottom:16 }}>
                <p style={{ fontSize:13, fontWeight:700, color:alertaCfg.titleColor, marginBottom:8 }}>
                  {alertaCfg.icon} {alertaCfg.label}
                </p>
                <p style={{ fontSize:13, color:alertaCfg.textColor, margin:0, lineHeight:1.6 }}>{resultado.resumo}</p>
              </div>
            );
          })()}

          {/* Contadores */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:8, marginBottom:16 }}>
            {[
              { label:"Todas",     valor: resultado.clausulas.length,                                                          cor:"#4F8EF7", bg:"#EFF6FF", id:"todos" },
              { label:"Alteradas", valor: resultado.total_alteradas || resultado.clausulas.filter(c=>c.tipo==="alterada").length, cor:"#D97706", bg:"#FFFBEB", id:"alterada" },
              { label:"Incluídas", valor: resultado.total_incluidas || resultado.clausulas.filter(c=>c.tipo==="incluida").length, cor:"#059669", bg:"#F0FDF4", id:"incluida" },
              { label:"Removidas", valor: resultado.total_removidas || resultado.clausulas.filter(c=>c.tipo==="removida").length, cor:"#DC2626", bg:"#FEF2F2", id:"removida" },
              { label:"Críticas",  valor: resultado.clausulas.filter(c=>c.impacto_nivel==="critico").length,                   cor:"#991B1B", bg:"#FEF2F2", id:"critico" },
              { label:"Relevantes",valor: resultado.clausulas.filter(c=>c.impacto_nivel==="relevante").length,                 cor:"#92400E", bg:"#FFFBEB", id:"relevante" },
            ].map(({ label, valor, cor, bg, id }) => (
              <button key={id} onClick={() => setFiltro(id)}
                style={{
                  textAlign:"center", padding:"12px 6px", borderRadius:10, cursor:"pointer",
                  background: filtro===id ? bg : "#fff",
                  border: `2px solid ${filtro===id ? cor : "#E5E7EB"}`,
                  transition:"all .15s",
                }}>
                <p style={{ fontSize:20, fontWeight:800, color:cor, margin:0 }}>{valor}</p>
                <p style={{ fontSize:10, color:"var(--text-muted)", margin:"2px 0 0" }}>{label}</p>
              </button>
            ))}
          </div>

          {/* Cláusulas */}
          {clausulasFiltradas.length === 0 ? (
            <div style={{ background:"var(--surface-2)", border:"1px solid var(--card-border)", borderRadius:10, padding:24, textAlign:"center" }}>
              <p style={{ color:"var(--text-subtle)", fontSize:13, margin:0 }}>Nenhuma cláusula encontrada para este filtro.</p>
            </div>
          ) : (
            <div>
              {clausulasFiltradas.map((c, i) => {
                const cfg = corTipo[c.tipo] || corTipo.alterada;
                return (
                  <div key={i} style={{
                    background: cfg.bg, border:`1px solid ${cfg.border}`,
                    borderRadius:10, padding:"16px 18px", marginBottom:12,
                  }}>
                    {/* Cabeçalho */}
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                      <span style={{ fontSize:16 }}>{cfg.icon}</span>
                      <span style={{ flex:1, fontSize:13, fontWeight:700, color:"var(--text-primary)" }}>{c.referencia}</span>
                      <span style={{
                        fontSize:11, fontWeight:700, padding:"2px 10px", borderRadius:20,
                        background:cfg.badgeBg, color:cfg.badge,
                      }}>{cfg.label}</span>
                    </div>

                    {/* Antes / Depois */}
                    {c.tipo === "alterada" && (
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:c.impacto ? 10 : 0 }}>
                        <div style={{ background:"rgba(255,255,255,.6)", borderRadius:8, padding:"10px 12px" }}>
                          <p style={{ fontSize:10, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Antes</p>
                          <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{c.antes}</p>
                        </div>
                        <div style={{ background:"rgba(255,255,255,.6)", borderRadius:8, padding:"10px 12px" }}>
                          <p style={{ fontSize:10, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Depois</p>
                          <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{c.depois}</p>
                        </div>
                      </div>
                    )}

                    {c.tipo === "incluida" && c.depois && (
                      <div style={{ background:"rgba(255,255,255,.6)", borderRadius:8, padding:"10px 12px", marginBottom:c.impacto ? 10 : 0 }}>
                        <p style={{ fontSize:10, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Conteúdo incluído</p>
                        <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{c.depois}</p>
                      </div>
                    )}

                    {c.tipo === "removida" && c.antes && (
                      <div style={{ background:"rgba(255,255,255,.6)", borderRadius:8, padding:"10px 12px", marginBottom:c.impacto ? 10 : 0 }}>
                        <p style={{ fontSize:10, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Conteúdo removido</p>
                        <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{c.antes}</p>
                      </div>
                    )}

                    {/* Impacto */}
                    {(c.impacto_descricao || c.impacto) && (() => {
                      const nivelCfg = {
                        critico:   { bg:"#FEF2F2", color:"#991B1B", border:"#FEE2E2", icon:"🚨", label:"Impacto Crítico" },
                        relevante: { bg:"#FFFBEB", color:"#92400E", border:"#FDE68A", icon:"⚠️", label:"Impacto Relevante" },
                        baixo:     { bg:"#F0FDF4", color:"#065F46", border:"#BBF7D0", icon:"ℹ️", label:"Impacto Baixo" },
                      }[c.impacto_nivel] || { bg:"#F8FAFC", color:"var(--text-muted)", border:"#E2E8F0", icon:"⚡", label:"Impacto" };
                      return (
                        <div style={{ marginTop:10, background:nivelCfg.bg, border:`1px solid ${nivelCfg.border}`, borderRadius:8, padding:"10px 12px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom: c.fundamento ? 6 : 0 }}>
                            <span style={{ fontSize:13 }}>{nivelCfg.icon}</span>
                            <span style={{ fontSize:11, fontWeight:700, color:nivelCfg.color, textTransform:"uppercase", letterSpacing:".04em" }}>{nivelCfg.label}</span>
                          </div>
                          <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{c.impacto_descricao || c.impacto}</p>
                          {c.fundamento && (
                            <p style={{ fontSize:11, color:"var(--text-muted)", margin:"6px 0 0", fontStyle:"italic" }}>
                              📖 {c.fundamento}
                            </p>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}
