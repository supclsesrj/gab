  <script type="text/babel">

// ─────────────────────────────────────────────
// MÓDULO — AVALIAÇÃO DE IMPUGNAÇÕES E RECURSOS
// ─────────────────────────────────────────────

function ImpugnacaoModule() {
  const apiKey = useGeminiKey();
  const apiKeySet = apiKey.length > 10;

  const [etapa, setEtapa] = React.useState(1);
  const [loading, setLoading] = React.useState(false);
  const [progresso, setProgresso] = React.useState("");
  const [error, setError] = React.useState("");
  const [resultado, setResultado] = React.useState(null);

  // PDFs
  const [docs, setDocs] = React.useState({
    impugnacoes:  [], // múltiplos
    contrarrazoes: [],
    manifestacoesTec: [],
    manifestacaoPregoeiro: [],
  });
  const [b64s, setB64s] = React.useState({
    impugnacoes: [],
    contrarrazoes: [],
    manifestacoesTec: [],
    manifestacaoPregoeiro: [],
  });

  const refs = {
    impugnacoes: React.useRef(),
    contrarrazoes: React.useRef(),
    manifestacoesTec: React.useRef(),
    manifestacaoPregoeiro: React.useRef(),
  };

  const lerPdf = (file) => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });

  const handleFiles = async (key, files) => {
    const arr = Array.from(files).filter(f => f.type === "application/pdf");
    const b64arr = await Promise.all(arr.map(lerPdf));
    setDocs(prev => ({ ...prev, [key]: arr }));
    setB64s(prev => ({ ...prev, [key]: b64arr }));
    setError(""); setResultado(null);
  };

  const totalDocs = Object.values(b64s).flat().length;
  const temImpugnacao = b64s.impugnacoes.length > 0;

  const DropZone = ({ label, docKey, obrigatorio, multi, hint }) => {
    const files = docs[docKey];
    const hasFiles = files.length > 0;
    return (
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:7 }}>
          <p className="label-text" style={{ margin:0 }}>{label}</p>
          {obrigatorio && <span style={{ fontSize:10, fontWeight:700, color:"var(--danger-text)", background:"var(--danger-bg)", padding:"1px 7px", borderRadius:99 }}>Obrigatório</span>}
          {!obrigatorio && <span style={{ fontSize:10, color:"var(--text-subtle)", background:"var(--surface-2)", padding:"1px 7px", borderRadius:99 }}>Opcional</span>}
          {multi && <span style={{ fontSize:10, color:"var(--info-text)", background:"var(--info-bg)", padding:"1px 7px", borderRadius:99 }}>Múltiplos</span>}
        </div>
        <div onClick={() => refs[docKey].current.click()}
          onDrop={e => { e.preventDefault(); handleFiles(docKey, e.dataTransfer.files); }}
          onDragOver={e => e.preventDefault()}
          className={`dropzone${hasFiles ? " active" : ""}`}
          style={{ minHeight:88, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"16px 12px" }}>
          <input ref={refs[docKey]} type="file" accept=".pdf" multiple={multi} style={{ display:"none" }}
            onChange={e => handleFiles(docKey, e.target.files)} />
          {hasFiles ? (
            <>
              <span style={{ fontSize:20, marginBottom:4 }}>📄</span>
              {files.map((f,i) => (
                <p key={i} style={{ fontSize:12, fontWeight:600, color:"var(--accent)", margin:"1px 0", textAlign:"center", maxWidth:"100%", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{f.name}</p>
              ))}
              <p style={{ fontSize:10, color:"var(--text-subtle)", margin:"4px 0 0" }}>Clique para trocar</p>
            </>
          ) : (
            <>
              <span style={{ fontSize:20, marginBottom:6 }}>📂</span>
              <p style={{ fontSize:12, color:"var(--text-muted)", margin:0, textAlign:"center" }}>
                {multi ? "Arraste ou clique · vários PDFs" : "Arraste ou clique · PDF"}
              </p>
              {hint && <p style={{ fontSize:11, color:"var(--text-subtle)", margin:"4px 0 0", textAlign:"center" }}>{hint}</p>}
            </>
          )}
        </div>
      </div>
    );
  };

  const analisar = async () => {
    if (!temImpugnacao) { setError("Carregue ao menos a impugnação ou recurso."); return; }
    if (!apiKeySet) { setError("Configure a chave da API Gemini na página inicial."); return; }

    setLoading(true); setError(""); setResultado(null);
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

    const prompt = `Você é um especialista em Direito Administrativo e licitações públicas, com profundo conhecimento da Lei nº 14.133/2021, Lei nº 8.666/1993, Lei nº 10.520/2002, decretos estaduais do Rio de Janeiro (especialmente Dec. 48.778/2023, 48.816/2023, 48.817/2023, 48.818/2023, 48.819/2023, 48.820/2023, 48.821/2023), jurisprudência do TCU, TCE-RJ, AGU, e doutrina especializada (Marçal Justen Filho, Joel de Menezes Niebuhr, Jessé Torres Pereira Junior, entre outros).

Foram fornecidos os seguintes documentos de um processo licitatório:
- Impugnação(ões) e/ou recurso(s) administrativo(s)
- Contrarrazões (se houver)
- Manifestações técnicas (se houver)
- Manifestação do pregoeiro (se houver)

Realize DUAS análises independentes e retorne APENAS um JSON puro sem markdown:

{
  "identificacao": {
    "tipo_peticao": "impugnação" | "recurso" | "ambos",
    "numero_pontos": 3,
    "pontos_identificados": ["ponto 1...", "ponto 2...", "ponto 3..."]
  },

  "analise_enfrentamento": {
    "conclusao": "todos_enfrentados" | "parcialmente_enfrentados" | "nao_enfrentados",
    "recomendacao_prosseguimento": true | false,
    "resumo": "Resumo em 2-3 frases da situação geral do enfrentamento",
    "pontos": [
      {
        "ponto": "Descrição do ponto levantado pelo impugnante/recorrente (máx 200 chars)",
        "foi_enfrentado": true | false | "parcialmente",
        "qualidade_resposta": "adequada" | "superficial" | "ausente",
        "fragilidade": null | "Descrição da fragilidade se parcial ou não enfrentado (máx 200 chars)",
        "documento_resposta": "pregoeiro" | "tecnico" | "contrarrazoes" | "nenhum"
      }
    ],
    "fragilidades_criticas": ["Lista de fragilidades que podem comprometer o prosseguimento, se houver"]
  },

  "analise_merito": {
    "conclusao_geral": "favoravel" | "predominantemente_favoravel" | "equilibrado" | "predominantemente_desfavoravel" | "desfavoravel",
    "nivel_risco": "baixo" | "medio" | "alto" | "critico",
    "resumo": "Síntese do mérito jurídico em 3-4 frases. Mencione discretamente divergências com posicionamento consolidado se existirem, sem alarmismo.",
    "pontos": [
      {
        "ponto": "Ponto analisado (máx 150 chars)",
        "posicao_administracao": "Qual é a posição/argumento da Administração",
        "avaliacao": "solido" | "razoavel" | "fragil" | "critico",
        "fundamento": "Fundamento legal, jurisprudencial ou doutrinário que embasa a avaliação (máx 250 chars)",
        "observacao": null | "Observação adicional, inclusive sobre divergência com posicionamento consolidado se relevante (máx 200 chars)",
        "peso": "tecnico" | "juridico" | "formal"
      }
    ],
    "jurisprudencia_relevante": [
      {
        "tribunal": "TCU | TCE-RJ | STJ | outro",
        "referencia": "Acórdão/Súmula/etc",
        "relevancia": "Como se aplica ao caso (máx 150 chars)"
      }
    ],
    "recomendacao_final": "Recomendação objetiva ao gestor sobre como prosseguir (máx 300 chars)"
  }
}

IMPORTANTE:
- Na análise de enfrentamento: seja objetivo e fático. Verifique se cada ponto da impugnação/recurso recebeu resposta específica ou ao menos tangencial.
- Na análise de mérito: valorize argumentos técnicos (qualidade do objeto, adequação do TR, viabilidade técnica) mais do que argumentos puramente formais. Se a Administração estiver contrariando jurisprudência consolidada do TCU ou TCE-RJ, mencione de forma equilibrada, sem catastrofizar.
- Não confunda as duas análises: a primeira é procedimental (foi respondido?), a segunda é substantiva (os fundamentos são bons?).`;

    try {
      // Monta parts com todos os documentos
      const parts = [];
      const grupos = [
        { key:"impugnacoes",         label:"IMPUGNAÇÃO/RECURSO" },
        { key:"contrarrazoes",        label:"CONTRARRAZÕES" },
        { key:"manifestacoesTec",     label:"MANIFESTAÇÃO TÉCNICA" },
        { key:"manifestacaoPregoeiro",label:"MANIFESTAÇÃO DO PREGOEIRO" },
      ];
      for (const { key, label } of grupos) {
        b64s[key].forEach((b64, i) => {
          parts.push({ text: `\n--- ${label}${b64s[key].length > 1 ? ` (${i+1}/${b64s[key].length})` : ""} ---` });
          parts.push({ inline_data: { mime_type:"application/pdf", data:b64 } });
        });
      }
      parts.push({ text: prompt });

      setProgresso(`Analisando ${totalDocs} documento${totalDocs > 1 ? "s" : ""}…`);
      const resp = await fetch(url, {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ contents:[{ parts }], generationConfig:{ temperature:0.15, maxOutputTokens:8192 } })
      });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || `Gemini ${resp.status}`); }
      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setResultado(parsed);
      setEtapa(2);
    } catch(e) {
      setError("Erro na análise: " + e.message);
    } finally { setLoading(false); setProgresso(""); }
  };

  // ── RESULTADO ──
  if (etapa === 2 && resultado) return <ResultadoImpugnacao resultado={resultado} onVoltar={() => { setEtapa(1); setResultado(null); }} />;

  // ── FORMULÁRIO ──
  return (
    <div className="module-container">
      <div style={{ marginBottom:24 }}>
        <h2 style={{ fontSize:18, fontWeight:900, color:"var(--text-primary)", margin:"0 0 6px", letterSpacing:"-.02em" }}>
          ⚖️ Avaliação de Impugnações e Recursos
        </h2>
        <p style={{ fontSize:13, color:"var(--text-muted)", margin:0 }}>
          Análise em dois eixos independentes: enfrentamento procedimental e mérito jurídico com base em jurisprudência e legislação.
        </p>
      </div>

      {!apiKeySet && (
        <div className="info-box" style={{ marginBottom:20 }}>
          <p style={{ fontSize:13, color:"var(--info-text)", margin:0 }}>🔑 Configure a chave da API Gemini na <strong>página inicial</strong> para usar este módulo.</p>
        </div>
      )}

      {/* Upload */}
      <div className="card" style={{ marginBottom:20 }}>
        <p className="card-title" style={{ marginBottom:4 }}>Documentos do processo</p>
        <p className="card-subtitle" style={{ marginBottom:20 }}>
          Carregue os documentos disponíveis. Apenas a impugnação/recurso é obrigatória; os demais enriquecem a análise.
        </p>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
          <DropZone docKey="impugnacoes"          label="Impugnações / Recursos"     obrigatorio multi hint="Pode carregar mais de uma impugnação" />
          <DropZone docKey="contrarrazoes"         label="Contrarrazões"              multi hint="Se houver contrarrazões de terceiros" />
          <DropZone docKey="manifestacoesTec"      label="Manifestações Técnicas"     multi hint="Pareceres e notas técnicas da área demandante" />
          <DropZone docKey="manifestacaoPregoeiro" label="Manifestação do Pregoeiro"  hint="Decisão ou manifestação do pregoeiro/autoridade" />
        </div>

        {/* Resumo dos docs carregados */}
        {totalDocs > 0 && (
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
            {Object.entries(docs).map(([k, arr]) => arr.length > 0 && (
              <span key={k} style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:99, background:"var(--success-bg)", color:"var(--success-text)", border:"1px solid var(--success-border)" }}>
                ✓ {arr.length} {k === "impugnacoes" ? "impugnação/recurso" : k === "contrarrazoes" ? "contrarrazões" : k === "manifestacoesTec" ? "manif. técnica" : "manif. pregoeiro"}
              </span>
            ))}
          </div>
        )}

        {error && <div className="error-box" style={{ marginBottom:14 }}><p style={{ margin:0 }}>⚠ {error}</p></div>}

        {loading && (
          <div className="info-box" style={{ marginBottom:14 }}>
            <p style={{ fontSize:12, color:"var(--info-text)", margin:0 }}>⏳ {progresso}</p>
          </div>
        )}

        <button onClick={analisar} disabled={loading || !temImpugnacao || !apiKeySet}
          className="btn-primary" style={{ width:"100%", padding:"13px", fontSize:14 }}>
          {loading ? "Analisando documentos…" : `Analisar ${totalDocs > 0 ? `${totalDocs} documento${totalDocs>1?"s":""}` : ""}`}
        </button>
      </div>

      {/* Explicação metodológica */}
      <div className="card">
        <p className="card-title" style={{ marginBottom:12 }}>📋 Metodologia de análise</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          {[
            { icon:"🔍", title:"Eixo 1 — Enfrentamento", color:"var(--info-text)", bg:"var(--info-bg)", border:"var(--info-border)",
              items:["Verifica se cada ponto da impugnação/recurso foi respondido","Avalia se o enfrentamento foi adequado, superficial ou ausente","Aponta fragilidades que podem comprometer o prosseguimento","Recomenda ou não o prosseguimento do certame"] },
            { icon:"⚖️", title:"Eixo 2 — Mérito jurídico", color:"var(--accent)", bg:"var(--accent-light)", border:"var(--input-focus)",
              items:["Avalia a solidez dos argumentos da Administração","Coteja com jurisprudência TCU, TCE-RJ e legislação","Valoriza argumentos técnicos sobre formais","Aponta eventuais divergências com posicionamento consolidado de forma equilibrada"] },
          ].map(({ icon, title, color, bg, border, items }) => (
            <div key={title} style={{ background:bg, border:`1px solid ${border}`, borderRadius:10, padding:"14px 16px" }}>
              <p style={{ fontSize:13, fontWeight:700, color, margin:"0 0 10px" }}>{icon} {title}</p>
              {items.map((item, i) => (
                <div key={i} style={{ display:"flex", gap:8, marginBottom:6, alignItems:"flex-start" }}>
                  <span style={{ fontSize:11, color, marginTop:1, flexShrink:0 }}>→</span>
                  <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{item}</p>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ResultadoImpugnacao({ resultado, onVoltar }) {
  const [abaAtiva, setAbaAtiva] = React.useState("enfrentamento");
  const [copiado, setCopiado] = React.useState(false);

  const { identificacao, analise_enfrentamento: enf, analise_merito: merito } = resultado;

  const enfCfg = {
    todos_enfrentados:       { icon:"✅", label:"Todos os pontos enfrentados",   cor:"var(--success-text)", bg:"var(--success-bg)", border:"var(--success-border)" },
    parcialmente_enfrentados:{ icon:"⚠️", label:"Enfrentamento parcial",          cor:"var(--warning-text)", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    nao_enfrentados:         { icon:"🚨", label:"Pontos sem enfrentamento",       cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  }[enf?.conclusao] || { icon:"❓", label:"Indefinido", cor:"var(--text-muted)", bg:"var(--surface-2)", border:"var(--divider)" };

  const meritoCfg = {
    favoravel:                    { icon:"✅", label:"Favorável",                    cor:"var(--success-text)" },
    predominantemente_favoravel:  { icon:"👍", label:"Predominantemente favorável",  cor:"var(--success-text)" },
    equilibrado:                  { icon:"⚖️", label:"Equilibrado",                  cor:"var(--warning-text)" },
    predominantemente_desfavoravel:{ icon:"👎", label:"Predominantemente desfavorável",cor:"var(--warning-text)" },
    desfavoravel:                 { icon:"🚨", label:"Desfavorável",                 cor:"var(--danger-text)"  },
  }[merito?.conclusao_geral] || { icon:"❓", label:"Indefinido", cor:"var(--text-muted)" };

  const riscoCfg = {
    baixo:   { cor:"var(--success-text)", bg:"var(--success-bg)", border:"var(--success-border)" },
    medio:   { cor:"var(--warning-text)", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    alto:    { cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
    critico: { cor:"var(--danger-text)",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  }[merito?.nivel_risco] || { cor:"var(--text-muted)", bg:"var(--surface-2)", border:"var(--divider)" };

  const qualCfg = {
    adequada:    { cor:"var(--success-text)", icon:"✓" },
    superficial: { cor:"var(--warning-text)", icon:"~" },
    ausente:     { cor:"var(--danger-text)",  icon:"✗" },
  };

  const avalCfg = {
    solido:   { cor:"var(--success-text)", label:"Sólido",   bg:"var(--success-bg)", border:"var(--success-border)" },
    razoavel: { cor:"var(--warning-text)", label:"Razoável", bg:"var(--warning-bg)", border:"var(--warning-border)" },
    fragil:   { cor:"var(--danger-text)",  label:"Frágil",   bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
    critico:  { cor:"var(--danger-text)",  label:"Crítico",  bg:"var(--danger-bg)",  border:"var(--danger-border)"  },
  };

  const hoje = new Date().toLocaleDateString("pt-BR");

  const gerarRelatorio = () => {
    let t = `RELATÓRIO DE AVALIAÇÃO — IMPUGNAÇÕES E RECURSOS\nGerado em: ${hoje}\n${"─".repeat(60)}\n\n`;
    t += `TIPO: ${identificacao?.tipo_peticao?.toUpperCase() || "—"}\n`;
    t += `PONTOS IDENTIFICADOS: ${identificacao?.numero_pontos || 0}\n\n`;
    t += `${"═".repeat(60)}\nEIXO 1 — ENFRENTAMENTO PROCEDIMENTAL\n${"═".repeat(60)}\n`;
    t += `Conclusão: ${enfCfg.label}\n`;
    t += `Recomendação: ${enf?.recomendacao_prosseguimento ? "PROSSEGUIR COM O CERTAME" : "NÃO PROSSEGUIR — sanear fragilidades"}\n\n`;
    t += `Resumo: ${enf?.resumo}\n\n`;
    enf?.pontos?.forEach((p, i) => {
      t += `${i+1}. ${p.ponto}\n`;
      t += `   Enfrentado: ${p.foi_enfrentado === true ? "Sim" : p.foi_enfrentado === "parcialmente" ? "Parcialmente" : "Não"}\n`;
      t += `   Qualidade: ${p.qualidade_resposta}\n`;
      if (p.fragilidade) t += `   Fragilidade: ${p.fragilidade}\n`;
      t += "\n";
    });
    if (enf?.fragilidades_criticas?.length) {
      t += `FRAGILIDADES CRÍTICAS:\n${enf.fragilidades_criticas.map(f => `• ${f}`).join("\n")}\n\n`;
    }
    t += `${"═".repeat(60)}\nEIXO 2 — MÉRITO JURÍDICO\n${"═".repeat(60)}\n`;
    t += `Conclusão: ${meritoCfg.label}\nNível de risco: ${merito?.nivel_risco?.toUpperCase() || "—"}\n\n`;
    t += `Resumo: ${merito?.resumo}\n\n`;
    merito?.pontos?.forEach((p, i) => {
      t += `${i+1}. ${p.ponto}\n`;
      t += `   Posição da Administração: ${p.posicao_administracao}\n`;
      t += `   Avaliação: ${avalCfg[p.avaliacao]?.label || p.avaliacao}\n`;
      t += `   Fundamento: ${p.fundamento}\n`;
      if (p.observacao) t += `   Obs: ${p.observacao}\n`;
      t += "\n";
    });
    if (merito?.jurisprudencia_relevante?.length) {
      t += `JURISPRUDÊNCIA RELEVANTE:\n`;
      merito.jurisprudencia_relevante.forEach(j => { t += `• ${j.tribunal} — ${j.referencia}: ${j.relevancia}\n`; });
      t += "\n";
    }
    t += `RECOMENDAÇÃO FINAL:\n${merito?.recomendacao_final}\n`;
    return t;
  };

  const copiar = () => {
    navigator.clipboard.writeText(gerarRelatorio()).then(() => { setCopiado(true); setTimeout(() => setCopiado(false), 2500); });
  };

  return (
    <div className="module-container">
      {/* Header resultado */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24, gap:16 }}>
        <div>
          <h2 style={{ fontSize:18, fontWeight:900, color:"var(--text-primary)", margin:"0 0 4px" }}>Resultado da análise</h2>
          <p style={{ fontSize:13, color:"var(--text-muted)", margin:0 }}>
            {identificacao?.tipo_peticao === "impugnação" ? "Impugnação" : identificacao?.tipo_peticao === "recurso" ? "Recurso" : "Impugnação/Recurso"} · {identificacao?.numero_pontos || 0} ponto{identificacao?.numero_pontos !== 1 ? "s" : ""} analisado{identificacao?.numero_pontos !== 1 ? "s" : ""}
          </p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onVoltar} className="btn-secondary" style={{ fontSize:12 }}>← Nova análise</button>
          <button onClick={copiar} className="btn-primary" style={{ fontSize:12 }}>
            {copiado ? "✓ Copiado" : "📋 Exportar relatório"}
          </button>
        </div>
      </div>

      {/* Cards de status */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:24 }}>
        <div style={{ padding:"16px 18px", background:enfCfg.bg, border:`1px solid ${enfCfg.border}`, borderRadius:12 }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Enfrentamento</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{enfCfg.icon}</p>
          <p style={{ fontSize:13, fontWeight:700, color:enfCfg.cor, margin:0 }}>{enfCfg.label}</p>
        </div>
        <div style={{ padding:"16px 18px", background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, boxShadow:"var(--card-shadow)" }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Prosseguimento</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{enf?.recomendacao_prosseguimento ? "✅" : "⛔"}</p>
          <p style={{ fontSize:13, fontWeight:700, color: enf?.recomendacao_prosseguimento ? "var(--success-text)" : "var(--danger-text)", margin:0 }}>
            {enf?.recomendacao_prosseguimento ? "Prosseguir" : "Sanear antes"}
          </p>
        </div>
        <div style={{ padding:"16px 18px", background:riscoCfg.bg, border:`1px solid ${riscoCfg.border}`, borderRadius:12 }}>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 6px" }}>Risco jurídico</p>
          <p style={{ fontSize:22, margin:"0 0 4px" }}>{meritoCfg.icon}</p>
          <p style={{ fontSize:13, fontWeight:700, color:riscoCfg.cor, margin:0 }}>
            {merito?.nivel_risco?.charAt(0).toUpperCase() + merito?.nivel_risco?.slice(1) || "—"} · {meritoCfg.label}
          </p>
        </div>
      </div>

      {/* Abas de análise */}
      <div style={{ display:"flex", gap:0, marginBottom:20, borderBottom:"1px solid var(--divider)" }}>
        {[
          { id:"enfrentamento", label:"🔍 Eixo 1 — Enfrentamento" },
          { id:"merito",        label:"⚖️ Eixo 2 — Mérito jurídico" },
        ].map(a => (
          <button key={a.id} onClick={() => setAbaAtiva(a.id)}
            style={{ padding:"11px 20px", border:"none", borderBottom: abaAtiva===a.id ? "2px solid var(--accent)" : "2px solid transparent", background:"transparent", color: abaAtiva===a.id ? "var(--accent)" : "var(--text-muted)", fontSize:13, fontWeight: abaAtiva===a.id ? 700 : 400, cursor:"pointer", transition:"all .15s" }}>
            {a.label}
          </button>
        ))}
      </div>

      {/* EIXO 1 — ENFRENTAMENTO */}
      {abaAtiva === "enfrentamento" && (
        <div>
          {/* Resumo */}
          <div style={{ background:enfCfg.bg, border:`1px solid ${enfCfg.border}`, borderRadius:12, padding:20, marginBottom:16 }}>
            <p style={{ fontSize:13, fontWeight:700, color:enfCfg.cor, margin:"0 0 8px" }}>{enfCfg.icon} {enfCfg.label}</p>
            <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{enf?.resumo}</p>
          </div>

          {/* Fragilidades críticas */}
          {enf?.fragilidades_criticas?.length > 0 && (
            <div style={{ background:"var(--danger-bg)", border:"1px solid var(--danger-border)", borderRadius:12, padding:"14px 18px", marginBottom:16 }}>
              <p style={{ fontSize:12, fontWeight:700, color:"var(--danger-text)", margin:"0 0 8px", textTransform:"uppercase", letterSpacing:".04em" }}>🚨 Fragilidades críticas</p>
              {enf.fragilidades_criticas.map((f, i) => (
                <div key={i} style={{ display:"flex", gap:8, marginBottom: i < enf.fragilidades_criticas.length-1 ? 6 : 0 }}>
                  <span style={{ color:"var(--danger-text)", fontSize:14, flexShrink:0, marginTop:1 }}>•</span>
                  <p style={{ fontSize:13, color:"var(--danger-text)", margin:0, lineHeight:1.5 }}>{f}</p>
                </div>
              ))}
            </div>
          )}

          {/* Cards por ponto */}
          {enf?.pontos?.map((p, i) => {
            const qc = qualCfg[p.qualidade_resposta] || { cor:"var(--text-muted)", icon:"?" };
            const foi = p.foi_enfrentado === true ? { cor:"var(--success-text)", label:"Sim", bg:"var(--success-bg)", border:"var(--success-border)" }
              : p.foi_enfrentado === "parcialmente" ? { cor:"var(--warning-text)", label:"Parcialmente", bg:"var(--warning-bg)", border:"var(--warning-border)" }
              : { cor:"var(--danger-text)", label:"Não", bg:"var(--danger-bg)", border:"var(--danger-border)" };
            return (
              <div key={i} style={{ background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"var(--card-shadow)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 18px", background:"var(--card-header-bg)", borderBottom:"1px solid var(--card-border)" }}>
                  <div style={{ width:26, height:26, borderRadius:"50%", background:foi.bg, border:`1.5px solid ${foi.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:foi.cor, flexShrink:0 }}>{i+1}</div>
                  <p style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", flex:1, margin:0 }}>{p.ponto}</p>
                  <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:99, background:foi.bg, color:foi.cor, border:`1px solid ${foi.border}`, whiteSpace:"nowrap" }}>
                    {foi.label}
                  </span>
                </div>
                <div style={{ padding:"12px 18px", display:"flex", gap:16, flexWrap:"wrap" }}>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:"var(--text-muted)" }}>Qualidade:</span>
                    <span style={{ fontSize:12, fontWeight:700, color:qc.cor }}>{qc.icon} {p.qualidade_resposta}</span>
                  </div>
                  {p.documento_resposta && p.documento_resposta !== "nenhum" && (
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <span style={{ fontSize:12, color:"var(--text-muted)" }}>Respondido por:</span>
                      <span style={{ fontSize:12, fontWeight:600, color:"var(--text-secondary)" }}>{p.documento_resposta}</span>
                    </div>
                  )}
                  {p.fragilidade && (
                    <div style={{ width:"100%", marginTop:4, padding:"8px 12px", background:"var(--warning-bg)", border:"1px solid var(--warning-border)", borderRadius:8 }}>
                      <p style={{ fontSize:12, color:"var(--warning-text)", margin:0 }}>⚠ {p.fragilidade}</p>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* EIXO 2 — MÉRITO */}
      {abaAtiva === "merito" && (
        <div>
          {/* Resumo */}
          <div style={{ background:"var(--accent-light)", border:"1px solid color-mix(in srgb, var(--accent) 30%, transparent)", borderRadius:12, padding:20, marginBottom:16 }}>
            <p style={{ fontSize:13, fontWeight:700, color:"var(--accent)", margin:"0 0 8px" }}>⚖️ {meritoCfg.label}</p>
            <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{merito?.resumo}</p>
          </div>

          {/* Pontos */}
          {merito?.pontos?.map((p, i) => {
            const ac = avalCfg[p.avaliacao] || avalCfg.razoavel;
            const isPeso = { tecnico:"🔧 Técnico", juridico:"⚖️ Jurídico", formal:"📋 Formal" }[p.peso] || p.peso;
            return (
              <div key={i} style={{ background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"var(--card-shadow)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 18px", background:"var(--card-header-bg)", borderBottom:"1px solid var(--card-border)" }}>
                  <div style={{ width:26, height:26, borderRadius:"50%", background:ac.bg, border:`1.5px solid ${ac.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:ac.cor, flexShrink:0 }}>{i+1}</div>
                  <p style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", flex:1, margin:0 }}>{p.ponto}</p>
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <span style={{ fontSize:10, fontWeight:600, color:"var(--text-muted)", background:"var(--surface-2)", padding:"2px 8px", borderRadius:99 }}>{isPeso}</span>
                    <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:99, background:ac.bg, color:ac.cor, border:`1px solid ${ac.border}` }}>{ac.label}</span>
                  </div>
                </div>
                <div style={{ padding:"12px 18px" }}>
                  {p.posicao_administracao && (
                    <div style={{ marginBottom:10 }}>
                      <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 3px" }}>Posição da Administração</p>
                      <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{p.posicao_administracao}</p>
                    </div>
                  )}
                  <div style={{ marginBottom: p.observacao ? 10 : 0 }}>
                    <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".04em", margin:"0 0 3px" }}>📖 Fundamento</p>
                    <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.5 }}>{p.fundamento}</p>
                  </div>
                  {p.observacao && (
                    <div style={{ marginTop:8, padding:"8px 12px", background:"var(--surface-2)", borderRadius:8, borderLeft:"3px solid var(--text-subtle)" }}>
                      <p style={{ fontSize:12, color:"var(--text-muted)", margin:0, fontStyle:"italic", lineHeight:1.5 }}>{p.observacao}</p>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Jurisprudência */}
          {merito?.jurisprudencia_relevante?.length > 0 && (
            <div className="card" style={{ marginBottom:16 }}>
              <p className="card-title" style={{ marginBottom:12 }}>📚 Jurisprudência relevante</p>
              {merito.jurisprudencia_relevante.map((j, i) => (
                <div key={i} style={{ display:"flex", gap:12, padding:"10px 0", borderBottom: i < merito.jurisprudencia_relevante.length-1 ? "1px solid var(--divider)" : "none" }}>
                  <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:99, background:"var(--accent-light)", color:"var(--accent)", whiteSpace:"nowrap", alignSelf:"flex-start", flexShrink:0 }}>{j.tribunal}</span>
                  <div>
                    <p style={{ fontSize:12, fontWeight:700, color:"var(--text-primary)", margin:"0 0 2px" }}>{j.referencia}</p>
                    <p style={{ fontSize:12, color:"var(--text-muted)", margin:0 }}>{j.relevancia}</p>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Recomendação final */}
          <div style={{ background:"var(--surface-2)", border:"1px solid var(--divider)", borderRadius:12, padding:"16px 20px" }}>
            <p style={{ fontSize:11, fontWeight:700, color:"var(--text-subtle)", textTransform:"uppercase", letterSpacing:".06em", margin:"0 0 8px" }}>Recomendação ao gestor</p>
            <p style={{ fontSize:14, fontWeight:600, color:"var(--text-primary)", margin:0, lineHeight:1.6 }}>{merito?.recomendacao_final}</p>
          </div>
        </div>
      )}
    </div>
  );
}

  
  </script>

  <script type="text/babel">




// ─────────────────────────────────────────────
// MÓDULO — PESQUISA SEMESTRAL DE PREÇOS (ARP)
// ─────────────────────────────────────────────

function PesquisaSemestral() {
  const apiKey = useGeminiKey();
  const apiKeySet = apiKey.length > 10;


  const [pdfRelatorio, setPdfRelatorio] = React.useState(null);
  const [b64Relatorio, setB64Relatorio] = React.useState(null);
  const [pdfTabelas, setPdfTabelas] = React.useState([]); // múltiplas tabelas
  const [b64Tabelas, setB64Tabelas] = React.useState([]);

  const [loading, setLoading] = React.useState(false);
  const [progresso, setProgresso] = React.useState("");
  const [error, setError] = React.useState("");
  const [resultado, setResultado] = React.useState(null);

  const refRelatorio = React.useRef();
  const refTabelas = React.useRef();

  const lerPdf = (file) => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });

  const handleRelatorio = async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setPdfRelatorio(file);
    setB64Relatorio(await lerPdf(file));
    setError(""); setResultado(null);
  };

  const handleTabelas = async (files) => {
    const arr = Array.from(files).filter(f => f.type === "application/pdf");
    setPdfTabelas(arr);
    const b64s = await Promise.all(arr.map(lerPdf));
    setB64Tabelas(b64s);
    setError(""); setResultado(null);
  };

  const analisar = async () => {
    if (!b64Relatorio) { setError("Carregue o relatório da Coordenação de Compras."); return; }
    if (b64Tabelas.length === 0) { setError("Carregue ao menos uma tabela de preços."); return; }
    if (!apiKeySet) { setError("Configure a chave da API Gemini."); return; }

    setLoading(true); setError(""); setResultado(null);

    const prompt = `Você é um especialista em contratos administrativos e registro de preços no âmbito da Administração Pública do Estado do Rio de Janeiro, com domínio do Decreto Estadual nº 48.821/2023 (alterado pelo Decreto nº 49.956/2025), que regulamenta o Sistema de Registro de Preços (SRP).

Foram fornecidos:
1. Relatório elaborado pela Coordenação de Compras com a pesquisa semestral de preços
2. Uma ou mais tabelas em PDF com os preços coletados na pesquisa de mercado

CONTEXTO E CRITÉRIO DE ANÁLISE:
A pesquisa semestral de ARPs no Estado do Rio de Janeiro não tem foco em vantajosidade, mas sim em COMPATIBILIDADE DE PREÇOS com o mercado. O critério da SES-RJ é:

- Se o valor registrado na ARP estiver ABAIXO do maior valor encontrado na pesquisa de mercado dos últimos 6 meses → o preço está COMPATÍVEL com o mercado. Análise encerrada positivamente para o item.

- Se o valor registrado estiver ACIMA do maior valor da pesquisa → verificar:
  a) A pesquisa considerou fornecedores do mercado do Rio de Janeiro? (localidade)
  b) A pesquisa considerou a marca registrada na ARP? (especificidade)
  → Se NÃO considerou esses fatores: indicar possibilidade de refazer a pesquisa com esses parâmetros OU apontar que a ausência de preços comparáveis no mercado local pode indicar que o valor registrado é compatível com as condições específicas daquela ARP.
  → Se SIM considerou e mesmo assim o valor está acima: indicar necessidade de RENEGOCIAÇÃO com o fornecedor, conforme art. 12 do Decreto Estadual nº 48.821/2023.

Para cada item da ARP identificado nos documentos, retorne um objeto JSON com:
- "item": número ou descrição do item
- "descricao": descrição sucinta do produto/serviço
- "valor_arp": valor unitário registrado na ARP (como string formatada)
- "maior_valor_pesquisa": maior valor encontrado na pesquisa de mercado para esse item
- "situacao": "compativel", "verificar" ou "renegociar"
- "percentual_diferenca": diferença percentual entre valor ARP e maior valor pesquisa (positivo = ARP acima do mercado)
- "considerou_localidade_rj": true/false/null (null se não foi possível identificar)
- "considerou_marca": true/false/null
- "analise": análise detalhada do item seguindo o critério acima (máx. 400 chars)
- "recomendacao": recomendação objetiva de conduta para o gestor (máx. 250 chars)

Retorne APENAS um JSON puro com esta estrutura (sem markdown):
{
  "arp_identificada": "número/identificação da ARP se encontrada nos documentos",
  "periodo_pesquisa": "período coberto pela pesquisa (ex: jan-jun/2025)",
  "resumo_geral": "síntese da situação geral da ARP em 3-4 frases",
  "situacao_geral": "compativel" | "atencao" | "critica",
  "itens": [ ... ]
}`;

    try {
      setProgresso("Enviando documentos ao Gemini…");
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

      // Monta parts com todas as tabelas + relatório
      const parts = [];
      b64Tabelas.forEach((b64, i) => {
        parts.push({ text: `TABELA DE PREÇOS ${i + 1} (${pdfTabelas[i]?.name || "tabela"}):` });
        parts.push({ inline_data: { mime_type: "application/pdf", data: b64 } });
      });
      parts.push({ text: `RELATÓRIO DA COORDENAÇÃO DE COMPRAS (${pdfRelatorio?.name || "relatório"}):` });
      parts.push({ inline_data: { mime_type: "application/pdf", data: b64Relatorio } });
      parts.push({ text: prompt });

      setProgresso("Analisando compatibilidade de preços…");
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
        })
      });

      if (!resp.ok) {
        const e = await resp.json();
        throw new Error(e.error?.message || `Gemini erro ${resp.status}`);
      }

      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (!parsed.itens) throw new Error("Resposta inesperada do modelo.");
      setResultado(parsed);
    } catch(e) {
      setError("Erro na análise: " + e.message);
    } finally {
      setLoading(false); setProgresso("");
    }
  };

  const sitCfg = {
    compativel: { icon:"✅", label:"Compatível",   bg:"var(--success-bg)", border:"var(--success-border)", color:"var(--success-text)" },
    verificar:  { icon:"🔍", label:"Verificar",    bg:"var(--warning-bg)", border:"var(--warning-border)", color:"var(--warning-text)" },
    renegociar: { icon:"🔴", label:"Renegociar",   bg:"var(--danger-bg)",  border:"var(--danger-border)",  color:"var(--danger-text)"  },
    atencao:    { icon:"⚠️", label:"Atenção",      bg:"var(--warning-bg)", border:"var(--warning-border)", color:"var(--warning-text)" },
    critica:    { icon:"🚨", label:"Crítica",      bg:"var(--danger-bg)",  border:"var(--danger-border)",  color:"var(--danger-text)"  },
  };

  const confirmarChave = () => {
    if (apiKey.length > 10) {
      try { localStorage.setItem("doccheck_gemini_key", btoa(unescape(encodeURIComponent(apiKey)))); } catch(x){}
      setApiKeySet(true);
    }
  };

  const compativeis = resultado?.itens?.filter(i => i.situacao === "compativel").length || 0;
  const verificar   = resultado?.itens?.filter(i => i.situacao === "verificar").length || 0;
  const renegociar  = resultado?.itens?.filter(i => i.situacao === "renegociar").length || 0;

  return (
    <div className="module-container">
      {/* Upload */}
      <div className="card" style={{ marginBottom:20 }}>
        <p className="card-title">📊 Pesquisa Semestral de Preços — ARP</p>
        <p className="card-subtitle" style={{ marginBottom:20 }}>
          Conforme Decreto Estadual nº 48.821/2023 (art. 12) — critério de compatibilidade com o mercado, não de vantajosidade.
        </p>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
          {/* Tabelas */}
          <div>
            <p className="label-text" style={{ marginBottom:8 }}>📋 Tabelas de preços (PDF)</p>
            <div onClick={() => refTabelas.current.click()}
              onDrop={e => { e.preventDefault(); handleTabelas(e.dataTransfer.files); }}
              onDragOver={e => e.preventDefault()}
              className="dropzone" style={{ minHeight:120 }}>
              <input ref={refTabelas} type="file" accept=".pdf" multiple style={{ display:"none" }}
                onChange={e => handleTabelas(e.target.files)} />
              {pdfTabelas.length > 0 ? (
                <div>
                  <div style={{ fontSize:22, marginBottom:6 }}>📄</div>
                  {pdfTabelas.map((f, i) => (
                    <p key={i} style={{ fontSize:12, fontWeight:600, color:"var(--accent)", margin:"2px 0" }}>{f.name}</p>
                  ))}
                  <p className="text-muted" style={{ fontSize:11, marginTop:4 }}>Clique para trocar</p>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:22, marginBottom:6 }}>📂</div>
                  <p style={{ fontSize:12, color:"var(--text-muted)", margin:0 }}>
                    Arraste ou clique<br/><strong style={{ color:"var(--accent)" }}>Aceita múltiplos PDFs</strong>
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Relatório */}
          <div>
            <p className="label-text" style={{ marginBottom:8 }}>📝 Relatório da Coord. de Compras (PDF)</p>
            <div onClick={() => refRelatorio.current.click()}
              onDrop={e => { e.preventDefault(); handleRelatorio(e.dataTransfer.files[0]); }}
              onDragOver={e => e.preventDefault()}
              className="dropzone" style={{ minHeight:120 }}>
              <input ref={refRelatorio} type="file" accept=".pdf" style={{ display:"none" }}
                onChange={e => handleRelatorio(e.target.files[0])} />
              {pdfRelatorio ? (
                <div>
                  <div style={{ fontSize:22, marginBottom:6 }}>📄</div>
                  <p style={{ fontSize:12, fontWeight:600, color:"var(--accent)", margin:0 }}>{pdfRelatorio.name}</p>
                  <p className="text-muted" style={{ fontSize:11, marginTop:4 }}>Clique para trocar</p>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:22, marginBottom:6 }}>📂</div>
                  <p style={{ fontSize:12, color:"var(--text-muted)", margin:0 }}>
                    Arraste ou clique<br/><strong style={{ color:"var(--accent)" }}>1 arquivo PDF</strong>
                  </p>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Info metodologia */}
        <div className="info-box" style={{ marginBottom:16 }}>
          <p style={{ fontSize:12, fontWeight:700, color:"var(--accent)", marginBottom:6 }}>📌 Metodologia aplicada (SES-RJ)</p>
          <div style={{ fontSize:12, color:"var(--text-secondary)", lineHeight:1.7 }}>
            <p style={{ margin:"0 0 4px" }}>✅ <strong>Compatível:</strong> valor da ARP ≤ maior valor da pesquisa de mercado (últimos 6 meses)</p>
            <p style={{ margin:"0 0 4px" }}>🔍 <strong>Verificar:</strong> valor acima do mercado — analisar se pesquisa considerou mercado do RJ e marca registrada</p>
            <p style={{ margin:0 }}>🔴 <strong>Renegociar:</strong> valor acima do mercado e pesquisa adequada confirma discrepância → renegociação necessária (art. 12, Dec. 48.821/2023)</p>
          </div>
        </div>

        {error && <div className="error-box" style={{ marginBottom:16 }}><p style={{ margin:0 }}>⚠ {error}</p></div>}

        {loading && progresso && (
          <div className="info-box" style={{ marginBottom:16 }}>
            <p style={{ fontSize:12, color:"var(--accent)", margin:0 }}>⏳ {progresso}</p>
          </div>
        )}

        <button onClick={analisar} disabled={loading || !b64Relatorio || b64Tabelas.length === 0 || !apiKeySet}
          className="btn-primary" style={{ width:"100%", padding:"13px" }}>
          {loading ? "Analisando documentos…" : "Analisar compatibilidade de preços"}
        </button>
      </div>

      {/* Resultado */}
      {resultado && (() => {
        const gcfg = sitCfg[resultado.situacao_geral] || sitCfg.atencao;
        return (
          <>
            {/* Resumo geral */}
            <div style={{ background:gcfg.bg, border:`1px solid ${gcfg.border}`, borderRadius:12, padding:20, marginBottom:16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <span style={{ fontSize:22 }}>{gcfg.icon}</span>
                <div>
                  <p style={{ fontSize:13, fontWeight:700, color:gcfg.color, margin:0 }}>
                    {resultado.arp_identificada || "ARP"} — Situação Geral: {gcfg.label}
                  </p>
                  {resultado.periodo_pesquisa && (
                    <p style={{ fontSize:11, color:"var(--text-muted)", margin:"2px 0 0" }}>
                      Período da pesquisa: {resultado.periodo_pesquisa}
                    </p>
                  )}
                </div>
              </div>
              <p style={{ fontSize:13, color:gcfg.color, margin:0, lineHeight:1.6 }}>{resultado.resumo_geral}</p>
            </div>

            {/* Contadores */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
              {[
                { label:"Compatíveis", valor:compativeis, ...sitCfg.compativel },
                { label:"A verificar",  valor:verificar,   ...sitCfg.verificar  },
                { label:"Renegociar",   valor:renegociar,  ...sitCfg.renegociar },
              ].map(({ label, valor, icon, bg, border, color }) => (
                <div key={label} style={{ textAlign:"center", padding:"16px 8px", borderRadius:10, background:bg, border:`1px solid ${border}` }}>
                  <p style={{ fontSize:24, fontWeight:800, color, margin:0 }}>{valor}</p>
                  <p style={{ fontSize:11, color:"var(--text-muted)", margin:"4px 0 0" }}>{icon} {label}</p>
                </div>
              ))}
            </div>

            {/* Cards por item */}
            {resultado.itens.map((item, i) => {
              const cfg = sitCfg[item.situacao] || sitCfg.verificar;
              const pct = item.percentual_diferenca;
              const acima = pct > 0;
              return (
                <div key={i} style={{ background:"var(--card-bg)", border:`1px solid var(--card-border)`, borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"var(--card-shadow)" }}>
                  {/* Header item */}
                  <div style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 18px", borderBottom:`1px solid var(--card-border)`, background:"var(--card-header-bg)" }}>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:13, fontWeight:700, color:"var(--text-primary)", margin:0 }}>
                        {item.item ? `Item ${item.item} — ` : ""}{item.descricao}
                      </p>
                      <div style={{ display:"flex", gap:16, marginTop:4 }}>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>
                          ARP: <strong style={{ color:"var(--text-primary)" }}>{item.valor_arp || "—"}</strong>
                        </span>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>
                          Maior valor pesquisa: <strong style={{ color:"var(--text-primary)" }}>{item.maior_valor_pesquisa || "—"}</strong>
                        </span>
                        {pct !== null && pct !== undefined && (
                          <span style={{ fontSize:12, fontWeight:700, color: acima ? "var(--danger-text)" : "var(--success-text)" }}>
                            {acima ? `▲ +${pct.toFixed(1)}% acima` : `▼ ${Math.abs(pct).toFixed(1)}% abaixo`}
                          </span>
                        )}
                      </div>
                    </div>
                    <span style={{ fontSize:11, fontWeight:700, padding:"4px 12px", borderRadius:20, background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}`, whiteSpace:"nowrap" }}>
                      {cfg.icon} {cfg.label}
                    </span>
                  </div>

                  {/* Corpo */}
                  <div style={{ padding:"14px 18px" }}>
                    {/* Flags localidade/marca */}
                    {(item.situacao === "verificar" || item.situacao === "renegociar") && (
                      <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
                        {[
                          { label:"Mercado RJ considerado", val:item.considerou_localidade_rj },
                          { label:"Marca registrada considerada", val:item.considerou_marca },
                        ].map(({ label, val }) => {
                          const color = val === true ? "var(--success-text)" : val === false ? "var(--danger-text)" : "var(--text-muted)";
                          const icon = val === true ? "✓" : val === false ? "✗" : "?";
                          return (
                            <span key={label} style={{ fontSize:11, fontWeight:600, color, background:"var(--surface-2)", padding:"3px 10px", borderRadius:20 }}>
                              {icon} {label}
                            </span>
                          );
                        })}
                      </div>
                    )}

                    {/* Análise */}
                    <div style={{ marginBottom:10 }}>
                      <p style={{ fontSize:11, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Análise</p>
                      <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0, lineHeight:1.6 }}>{item.analise}</p>
                    </div>

                    {/* Recomendação */}
                    <div style={{ background: cfg.bg, border:`1px solid ${cfg.border}`, borderRadius:8, padding:"10px 14px" }}>
                      <p style={{ fontSize:11, fontWeight:700, color:cfg.color, textTransform:"uppercase", letterSpacing:".05em", marginBottom:4 }}>Recomendação ao gestor</p>
                      <p style={{ fontSize:13, color:cfg.color, margin:0, lineHeight:1.5 }}>{item.recomendacao}</p>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Rodapé legal */}
            <div style={{ marginTop:8, padding:"12px 16px", background:"var(--surface-2)", borderRadius:8, border:"1px solid var(--card-border)" }}>
              <p style={{ fontSize:11, color:"var(--text-muted)", margin:0 }}>
                📖 Base legal: Decreto Estadual nº 48.821/2023, art. 12 (alterado pelo Decreto nº 49.956/2025) — Pesquisa semestral de preços para manutenção de ARPs. Critério adotado: compatibilidade com o mercado.
              </p>
            </div>
          </>
        );
      })()}
    </div>
  );
}

  
  
  
  
  </script>

  <script type="text/babel">




// ─────────────────────────────────────────────
// MÓDULO — REAJUSTE (ÍNDICE)
// ─────────────────────────────────────────────
function ReajusteModule() {
  const apiKey = useGeminiKey();
  const apiKeySet = apiKey.length > 10;


  // Etapas: 1=contrato, 2=complemento, 3=resultado
  const [etapa, setEtapa] = React.useState(1);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");

  // Etapa 1
  const [pdfContrato, setPdfContrato] = React.useState(null);
  const [b64Contrato, setB64Contrato] = React.useState(null);
  const [contratoInfo, setContratoInfo] = React.useState(null); // extração da IA

  // Etapa 2 — campos manuais
  const [campos, setCampos] = React.useState({
    dataAberturaPregao: "",
    dataProposta: "",        // 8666
    dataRapp: "",            // 14133
    indice: "IPCA",
    indiceCustom: "",
    dataPublicacaoIndice: "",
    dataUltimoReajuste: "",
    dataPedido: "",
  });

  // Etapa 3
  const [resultado, setResultado] = React.useState(null);

  const refContrato = React.useRef();

  const lerPdf = (file) => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });

  const handleContrato = async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setPdfContrato(file); setB64Contrato(await lerPdf(file));
    setError(""); setContratoInfo(null); setEtapa(1);
  };



  // ETAPA 1 → extrai info do contrato
  const analisarContrato = async () => {
    if (!b64Contrato) { setError("Carregue o contrato inicial."); return; }
    if (!apiKeySet) { setError("Configure a chave da API Gemini."); return; }
    setLoading(true); setError("");
    try {
      const prompt = `Analise este contrato administrativo e extraia as seguintes informações. Retorne APENAS JSON puro sem markdown:
{
  "lei_aplicavel": "8666" | "14133" | "indeterminado",
  "numero_contrato": "número do contrato",
  "objeto": "objeto resumido em até 10 palavras",
  "contratada": "nome da empresa contratada",
  "data_assinatura": "DD/MM/AAAA ou null",
  "data_inicio_vigencia": "DD/MM/AAAA ou null",
  "data_abertura_pregao": "DD/MM/AAAA ou null",
  "data_proposta": "DD/MM/AAAA ou null",
  "data_rapp": "DD/MM/AAAA ou null",
  "indice_reajuste": "nome do índice previsto contratualmente (ex: IPCA, INPC, IGP-M) ou null",
  "clausula_reajuste": "transcrição resumida da cláusula de reajuste, se existir, ou null",
  "tem_clausula_reajuste": true | false,
  "observacoes": "alertas ou inconsistências relevantes encontrados no contrato, ou null",
  "justificativa_lei": "por que identificou essa lei — cite elementos do contrato"
}`;
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
      const resp = await fetch(url, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [
          { inline_data: { mime_type: "application/pdf", data: b64Contrato } },
          { text: prompt }
        ]}], generationConfig: { temperature: 0.1, maxOutputTokens: 2048 } })
      });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || `Gemini ${resp.status}`); }
      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setContratoInfo(parsed);
      // Pré-preenche campos identificados
      setCampos(prev => ({
        ...prev,
        dataAberturaPregao: parsed.data_abertura_pregao || "",
        dataProposta: parsed.data_proposta || "",
        dataRapp: parsed.data_rapp || "",
        indice: parsed.indice_reajuste || "IPCA",
      }));
      setEtapa(2);
    } catch(e) { setError("Erro: " + e.message); }
    finally { setLoading(false); }
  };

  const set = (k, v) => setCampos(prev => ({ ...prev, [k]: v }));

  // ETAPA 2 → calcula direitos
  const calcular = () => {
    setError("");
    const lei = contratoInfo?.lei_aplicavel;

    // Data base
    let dataBaseStr = lei === "8666" ? campos.dataProposta : campos.dataRapp;
    if (!dataBaseStr) { setError(`Informe a ${lei === "8666" ? "data da proposta" : "data do RAPP"}.`); return; }

    const parseDate = (s) => {
      if (!s) return null;
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d,m,y] = s.split("/"); return new Date(`${y}-${m}-${d}`); }
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s);
      return null;
    };
    const fmtDate = (d) => d ? d.toLocaleDateString("pt-BR") : "—";
    const addMonths = (d, n) => { const r = new Date(d); r.setMonth(r.getMonth() + n); return r; };
    const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diffDays = (a, b) => Math.ceil((b - a) / 86400000);

    const dataBase = parseDate(dataBaseStr);
    if (!dataBase) { setError("Data base inválida. Use DD/MM/AAAA."); return; }

    const dataPedido = campos.dataPedido ? parseDate(campos.dataPedido) : hoje;
    const dataPublicacao = campos.dataPublicacaoIndice ? parseDate(campos.dataPublicacaoIndice) : null;
    const dataUltimo = campos.dataUltimoReajuste ? parseDate(campos.dataUltimoReajuste) : null;

    // Calcula todos os direitos (a cada 12 meses desde a data base)
    const direitos = [];
    let refBase = dataUltimo || dataBase;
    let periodo = 1;
    while (true) {
      const dataAquisicao = addMonths(refBase === dataBase ? dataBase : dataBase, periodo * 12);
      if (dataAquisicao > addMonths(hoje, 1)) break; // até 1 mês no futuro
      if (periodo > 10) break; // limite de segurança

      const prazoRetro = dataPublicacao ? addDays(dataPublicacao, 60) : null;
      const temRetro = dataPedido && prazoRetro ? dataPedido <= prazoRetro : null;
      const statusAquisicao = dataAquisicao <= hoje ? "adquirido" : "futuro";
      const diasParaAquisicao = diffDays(hoje, dataAquisicao);

      let statusPedido = null;
      if (statusAquisicao === "adquirido" && dataPedido) {
        statusPedido = dataPedido >= dataAquisicao ? "tempestivo" : "prematuro";
      }

      direitos.push({
        periodo,
        dataBase: fmtDate(dataBase),
        dataAquisicao: fmtDate(dataAquisicao),
        statusAquisicao,
        diasParaAquisicao,
        prazoRetroatividade: prazoRetro ? fmtDate(prazoRetro) : null,
        temRetroatividade: temRetro,
        statusPedido,
        efeitosFinanceiros: temRetro === true
          ? `A partir de ${fmtDate(dataAquisicao)} (retroativo)`
          : temRetro === false
            ? `A partir de ${fmtDate(dataPedido)} (sem retroatividade — prazo expirado)`
            : statusAquisicao === "futuro"
              ? `A partir de ${fmtDate(dataAquisicao)}`
              : "Verificar data do pedido",
      });

      // Próximo período usa data de aquisição anterior como referência
      refBase = parseDate(fmtDate(dataAquisicao).split("/").reverse().join("-"));
      periodo++;
    }

    if (direitos.length === 0) {
      // Direito ainda não adquirido
      const proxAquisicao = addMonths(dataBase, 12);
      direitos.push({
        periodo: 1,
        dataBase: fmtDate(dataBase),
        dataAquisicao: fmtDate(proxAquisicao),
        statusAquisicao: "futuro",
        diasParaAquisicao: diffDays(hoje, proxAquisicao),
        prazoRetroatividade: null,
        temRetroatividade: null,
        statusPedido: null,
        efeitosFinanceiros: `A partir de ${fmtDate(proxAquisicao)}`,
      });
    }

    setResultado({
      tipo: "reajuste",
      lei,
      contrato: contratoInfo,
      dataBase: fmtDate(dataBase),
      indice: campos.indice === "Outro" ? campos.indiceCustom : campos.indice,
      dataPublicacaoIndice: dataPublicacao ? fmtDate(dataPublicacao) : null,
      dataPedido: dataPedido ? fmtDate(dataPedido) : null,
      direitos,
      alertas: [
        !contratoInfo?.tem_clausula_reajuste && "⚠️ Contrato não possui cláusula de reajuste expressa — verificar previsão editalícia.",

    });
    setEtapa(3);
  };

  const Input = ({ label, k, placeholder, hint }) => (
    <div style={{ marginBottom: 14 }}>

  return (

      </div>

      {/* Stepper */}
      <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:28 }}>
        {["Contrato","Dados","Resultado"].map((s, i) => {
          const num = i + 1;
          const ativo = etapa === num;
          const feito = etapa > num;
          return (
            <React.Fragment key={s}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800,
                  background: feito ? "var(--success-text)" : ativo ? "var(--accent)" : "var(--surface-2)",
                  color: feito || ativo ? "#fff" : "var(--text-muted)" }}>
                  {feito ? "✓" : num}
                </div>
                <span style={{ fontSize:12, fontWeight: ativo ? 700 : 500, color: ativo ? "var(--text-primary)" : "var(--text-muted)" }}>{s}</span>
              </div>

            </React.Fragment>
          );
        })}
      </div>

      {/* API Key */}
            {error && <div className="error-box" style={{ marginBottom:16 }}><p style={{ margin:0 }}>⚠ {error}</p></div>}

      {/* ETAPA 1 */}
      {etapa >= 1 && (
        <div className="card" style={{ marginBottom:20, opacity: etapa > 1 ? .6 : 1 }}>
          <p className="card-title">Etapa 1 — Contrato inicial</p>
          <p className="card-subtitle" style={{ marginBottom:14 }}>O sistema identificará a lei aplicável, data base e cláusula de reajuste automaticamente.</p>
          <div onClick={() => refContrato.current.click()}
            onDrop={e => { e.preventDefault(); handleContrato(e.dataTransfer.files[0]); }}

            {pdfContrato ? (
              <><div style={{ fontSize:22 }}>📄</div>

              {contratoInfo.lei_aplicavel === "8666"  && "⚖️ Lei 8.666/93 — Data base: data da proposta apresentada no pregão"}

            {(contratoInfo.lei_aplicavel === "8666" || contratoInfo.lei_aplicavel === "indeterminado") && (

            )}

            <div style={{ marginBottom:14 }}>

              <select value={campos.indice} onChange={e => set("indice", e.target.value)} className="input-field">
                {["IPCA","INPC","IGP-M","IGP-DI","IPCA-E","Outro"].map(i => <option key={i}>{i}</option>)}
              </select>
              {campos.indice === "Outro" && <input value={campos.indiceCustom} onChange={e => set("indiceCustom", e.target.value)}

      {/* ETAPA 3 */}

  );

function ResultadoReajuste({ resultado, onVoltar }) {

    t += `DIREITOS IDENTIFICADOS: ${direitos.length}\n\n`;

    direitos.forEach((d, i) => {

      if (d.prazoRetroatividade) t += `   Prazo para retroatividade (60 dias): ${d.prazoRetroatividade}\n`;

Trata-se de pedido de reajuste contratual apresentado pela empresa ${contrato?.contratada || "___"}, referente ao Contrato nº ${contrato?.numero_contrato || "___"}, cujo objeto é ${contrato?.objeto || "___"}.

            <div style={{ marginTop:10, padding:"8px 12px", background:"rgba(255,255,255,.4)", borderRadius:8 }}>

              <p style={{ fontSize:13, color:"var(--text-primary)", margin:0, fontWeight:600 }}>{d.efeitosFinanceiros}</p>
            </div>
          </div>
        );
      })}

      {/* Textos */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginTop:8 }}>
        {[
          { label:"📋 Análise técnica", texto: gerarTexto() },
          { label:"📝 Minuta de despacho", texto: gerarDespacho() },

          <div key={label} className="card">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <p style={{ fontSize:13, fontWeight:700, color:"var(--text-primary)", margin:0 }}>{label}</p>
              <button onClick={() => copiar(texto)} className="btn-primary" style={{ fontSize:12, padding:"6px 14px" }}>
                {copiado ? "✓ Copiado" : "Copiar"}
              </button>

      </div>
    </div>
  );
}
